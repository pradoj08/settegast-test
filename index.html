// ═══════════════════════════════════════
const gridScroll=document.getElementById('grid-scroll');
const gridBody=document.getElementById('grid-body');
const colHdr=document.getElementById('col-hdr');
const ceditor=document.getElementById('ceditor');

let gridColWidths=[];
let gridTotalWidth=0;

function calcGridColumnWidths(){
  // DATA PAGE: columns now fit their actual text instead of being forced
  // into equal-width viewport columns. This keeps short fields tight and
  // allows wider text columns to take the space they need.
  const charPx=7.6;
  const padPx=22;
  gridColWidths=COLS.map((col,i)=>{
    const headerW=Math.ceil(String(col.l||'').length*charPx)+padPx;
    let maxLen=String(col.l||'').length;
    // Scan populated rows only; this is cheap at 1,000 rows x 14 columns and
    // prevents columns from clipping pasted train/table text.
    for(let r=0;r<data.length;r++){
      const v=data[r]&&data[r][i]!=null?String(data[r][i]):'';
      if(v.length>maxLen) maxLen=Math.min(v.length,36);
    }
    const contentW=Math.ceil(maxLen*charPx)+padPx;
    const minW=Math.max(44, Number(col.w||70));
    const maxW=(col.k==='arrival'||col.k==='timeInHold')?210:(col.k==='equipId'?150:170);
    return Math.max(minW, Math.min(maxW, Math.max(headerW, contentW)));
  });
  gridTotalWidth=RN_W+gridColWidths.reduce((a,w)=>a+w,0);
}
function getGridColWidth(c){
  if(!gridColWidths.length) calcGridColumnWidths();
  return gridColWidths[c]||Math.floor((gridScroll?.clientWidth||COLS.reduce((a,col)=>a+col.w,0))/NC);
}
function getGridColLeft(c){
  if(!gridColWidths.length) calcGridColumnWidths();
  let x=RN_W;
  for(let i=0;i<c;i++) x+=getGridColWidth(i);
  return x;
}

function buildHeaders(){
  calcGridColumnWidths();
  colHdr.innerHTML='';
  const rn=document.createElement('div');rn.className='rn-hdr';rn.textContent='#';colHdr.appendChild(rn);
  COLS.forEach((col,i)=>{
    const h=document.createElement('div');h.className='ch';
    const w=getGridColWidth(i);
    h.style.width=w+'px';h.style.minWidth='0px';
    h.style.flex='0 0 '+w+'px';
    h.textContent=col.l;h.title=col.l;colHdr.appendChild(h);
  });
  colHdr.style.width=gridTotalWidth+'px';
  colHdr.style.maxWidth='none';
  gridBody.style.height=(ROWS*ROW_H)+'px';
  gridBody.style.width=gridTotalWidth+'px';
  gridBody.style.maxWidth='none';
}

function vis(){
  const {scrollTop,clientHeight}=gridScroll;
  return{s:Math.max(0,Math.floor(scrollTop/ROW_H)-OVERSCAN),e:Math.min(ROWS-1,Math.ceil((scrollTop+clientHeight)/ROW_H)+OVERSCAN)};
}

function renderGrid(force){
  if(force){
    calcGridColumnWidths();
    buildHeaders();
    Object.values(rendered||{}).forEach(row=>row&&row.remove&&row.remove());
    rendered={};
  }
  const {s,e}=vis();
  const minR=Math.min(anchor.r,active.r),minC=Math.min(anchor.c,active.c);
  const maxR=Math.max(anchor.r,active.r),maxC=Math.max(anchor.c,active.c);
  Object.keys(rendered).forEach(r=>{const ri=+r;if(ri<s||ri>e){rendered[r].remove();delete rendered[r];}});
  for(let r=s;r<=e;r++){
    let row=rendered[r];
    if(!row||force){
      if(row)row.remove();
      row=document.createElement('div');row.className='g-row';
      row.style.top=(r*ROW_H)+'px';row.style.height=ROW_H+'px';
      row.style.width=gridTotalWidth+'px';row.style.maxWidth='none';row.style.overflow='visible';
      const rn=document.createElement('div');rn.className='rn-cell';rn.textContent=r+1;row.appendChild(rn);
      COLS.forEach((col,c)=>{
        const cell=document.createElement('div');cell.className='cell';
        const w=getGridColWidth(c);cell.style.width=w+'px';cell.style.minWidth='0px';cell.style.flex='0 0 '+w+'px';
        cell.dataset.r=r;cell.dataset.c=c;
        const sp=document.createElement('span');sp.textContent=data[r][c];cell.appendChild(sp);
        cell.addEventListener('mousedown',ev=>onMD(ev,r,c));
        cell.addEventListener('dblclick',()=>startEdit(r,c));
        row.appendChild(cell);
      });
      gridBody.appendChild(row);rendered[r]=row;
    }
    row.style.width=gridTotalWidth+'px';row.style.maxWidth='none';row.style.overflow='visible';
    const rnCell=row.querySelector('.rn-cell');
    if(rnCell){rnCell.style.width=RN_W+'px';rnCell.style.minWidth=RN_W+'px';rnCell.style.flex='0 0 '+RN_W+'px';}
    const cells=row.querySelectorAll('.cell');
    cells.forEach((cell,c)=>{
      const w=getGridColWidth(c);
      cell.style.width=w+'px';cell.style.minWidth='0px';cell.style.flex='0 0 '+w+'px';
      const act=r===active.r&&c===active.c;
      const rng=r>=minR&&r<=maxR&&c>=minC&&c<=maxC;
      cell.classList.toggle('sel',act);cell.classList.toggle('rng',rng&&!act);
    });
  }
  updateStatus();
  renderSSBanner();
}

function refreshCell(r,c){
  const row=rendered[r];if(!row)return;
  const cell=row.querySelectorAll('.cell')[c];
  if(cell)cell.querySelector('span').textContent=data[r][c];
}

// ═══════════════════════════════════════
//  SELECTION
// ═══════════════════════════════════════
function setSel(r1,c1,r2,c2){
  anchor={r:r1,c:c1};active={r:r2!=null?r2:r1,c:c2!=null?c2:c1};
  renderGrid(false);scrollTo(active.r,active.c);
}
function scrollTo(r,c){
  const top=r*ROW_H;const {scrollTop,clientHeight}=gridScroll;
  if(top<scrollTop)gridScroll.scrollTop=top;
  else if(top+ROW_H>scrollTop+clientHeight)gridScroll.scrollTop=top+ROW_H-clientHeight;
}
function onMD(e,r,c){e.preventDefault();stopEdit(false);if(e.shiftKey){active={r,c};renderGrid(false);}else setSel(r,c);}
function updateStatus(){
  // Status bar removed per UI cleanup request. Keep this no-op so grid selection logic remains stable.
}

// ═══════════════════════════════════════
//  EDIT
// ═══════════════════════════════════════
function startEdit(r,c,init){
  stopEdit(false);editMode=true;editCell={r,c};
  const wrap=document.getElementById('grid-wrap').getBoundingClientRect();
  const xOff=getGridColLeft(c)-gridScroll.scrollLeft;
  const yOff=HDR_H+r*ROW_H-gridScroll.scrollTop;
  ceditor.style.display='block';
  ceditor.style.left=(wrap.left+xOff)+'px';
  ceditor.style.top=(wrap.top+yOff)+'px';
  ceditor.style.width=getGridColWidth(c)+'px';
  ceditor.style.height=ROW_H+'px';
  ceditor.style.lineHeight=ROW_H+'px';
  ceditor.value=init!=null?init:data[r][c];
  ceditor.focus();
  if(init==null)ceditor.select();else ceditor.setSelectionRange(ceditor.value.length,ceditor.value.length);
}
function stopEdit(commit){
  if(!editMode)return;
  if(commit&&editCell){
    data[editCell.r][editCell.c]=ceditor.value;
    calcGridColumnWidths();
    buildHeaders();
    renderGrid(true);
  }
  editMode=false;editCell=null;ceditor.style.display='none';
}

// ═══════════════════════════════════════
//  KEYBOARD
// ═══════════════════════════════════════
document.addEventListener('keydown',e=>{
  if(document.activeElement.closest('#tb-modal'))return;
  if(document.activeElement.closest('#tab-outbound'))return;
  if(editMode){
    if(e.key==='Escape'){stopEdit(false);return;}
    if(e.key==='Enter'){stopEdit(true);move(1,0);e.preventDefault();return;}
    if(e.key==='Tab'){stopEdit(true);move(0,e.shiftKey?-1:1);e.preventDefault();return;}
    return;
  }
  switch(e.key){
    case'ArrowUp':e.preventDefault();move(-1,0,e.shiftKey);break;
    case'ArrowDown':e.preventDefault();move(1,0,e.shiftKey);break;
    case'ArrowLeft':e.preventDefault();move(0,-1,e.shiftKey);break;
    case'ArrowRight':e.preventDefault();move(0,1,e.shiftKey);break;
    case'Tab':e.preventDefault();move(0,e.shiftKey?-1:1);break;
    case'Enter':e.preventDefault();move(1,0);break;
    case'Delete':case'Backspace':clearSel();break;
    case'F2':startEdit(active.r,active.c);e.preventDefault();break;
    default:if(e.key.length===1&&!e.ctrlKey&&!e.metaKey)startEdit(active.r,active.c,e.key);
  }
});
function move(dr,dc,ext){
  const nr=Math.max(0,Math.min(ROWS-1,active.r+dr)),nc=Math.max(0,Math.min(NC-1,active.c+dc));
  if(ext){active={r:nr,c:nc};renderGrid(false);scrollTo(nr,nc);}else setSel(nr,nc);
}
function clearSel(){
  const r1=Math.min(anchor.r,active.r),c1=Math.min(anchor.c,active.c);
  const r2=Math.max(anchor.r,active.r),c2=Math.max(anchor.c,active.c);
  for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++){data[r][c]='';refreshCell(r,c);}
}


function switchToOutboundTabAfterImport(){
  // After paste/import, send the user directly to the Outbound page.
  // Keep the Data grid in memory, but make Outbound the only active view.
  requestAnimationFrame(()=>{
    if(typeof activateAppTab==='function') activateAppTab('outbound');
    else {
      document.querySelectorAll('.tab-view').forEach(x=>x.classList.remove('active'));
      const outboundView=document.getElementById('tab-outbound');
      if(outboundView) outboundView.classList.add('active');
      const picker=document.getElementById('page-switcher');
      if(picker) picker.value='outbound';
      if(typeof renderOB==='function') renderOB();
    }
    setTimeout(()=>{ if(typeof renderOB==='function') renderOB(); },0);
  });
}

document.addEventListener('paste',e=>{
  if(!document.getElementById('tab-input').classList.contains('active'))return;
  if(editMode)return;
  e.preventDefault();
  pasteText((e.clipboardData||window.clipboardData).getData('text'),active.r,active.c);
});
document.getElementById('btn-paste').addEventListener('click',async()=>{
  try{const t=await navigator.clipboard.readText();pasteText(t,active.r,active.c);}
  catch{toast('Allow clipboard access');}
});
function pasteText(txt,sr,sc){
  const rows=txt.replace(/\r\n/g,'\n').replace(/\r/g,'\n').trimEnd().split('\n');
  let mr=sr,mc=sc;
  rows.forEach((row,ri)=>{
    const tr=sr+ri;if(tr>=ROWS)return;
    parseTSV(row).forEach((v,ci)=>{const tc=sc+ci;if(tc<NC){data[tr][tc]=v.trim();mr=Math.max(mr,tr);mc=Math.max(mc,tc);}});
  });
  rendered={};renderGrid(true);setSel(sr,sc,mr,mc);updateDetectedTrainCacheFromData();toast('Pasted '+rows.length+' row(s)');switchToOutboundTabAfterImport();
}
function parseTSV(row){
  const cells=[];let i=0,cur='',len=row.length;
  while(i<len){
    if(row[i]==='"'){i++;while(i<len){if(row[i]==='"'&&row[i+1]==='"'){cur+='"';i+=2;}else if(row[i]==='"'){i++;break;}else cur+=row[i++];}if(i<len&&row[i]==='\t')i++;}
    else{const t=row.indexOf('\t',i);if(t===-1){cur+=row.slice(i);i=len;}else{cur+=row.slice(i,t);i=t+1;}}
    cells.push(cur);cur='';
  }
  if(row[row.length-1]==='\t')cells.push('');
  return cells;
}
document.addEventListener('keydown',e=>{
  if((e.ctrlKey||e.metaKey)&&e.key==='c'&&!editMode&&document.getElementById('tab-input').classList.contains('active')){
    e.preventDefault();copyGrid();
  }
  if((e.ctrlKey||e.metaKey)&&e.key==='a'&&!editMode&&document.getElementById('tab-input').classList.contains('active')){
    e.preventDefault();setSel(0,0,ROWS-1,NC-1);
  }
});
const btnCopySel=document.getElementById('btn-copy-sel');
if(btnCopySel) btnCopySel.addEventListener('click',copyGrid);
async function copyGrid(){
  const r1=Math.min(anchor.r,active.r),c1=Math.min(anchor.c,active.c);
  const r2=Math.max(anchor.r,active.r),c2=Math.max(anchor.c,active.c);
  const lines=[];for(let r=r1;r<=r2;r++)lines.push(data[r].slice(c1,c2+1).join('\t'));
  try{await navigator.clipboard.writeText(lines.join('\n'));toast('Copied');}catch{toast('Copy failed – use Ctrl+C');}
}
const btnClearSel=document.getElementById('btn-clear-sel');
if(btnClearSel) btnClearSel.addEventListener('click',clearSel);

const btnExport=document.getElementById('btn-export');
if(btnExport) btnExport.addEventListener('click',()=>{
  const hdr=COLS.map(c=>c.l).join(',');
  const lines=[hdr,...data.map(row=>row.map(v=>v.includes(',')||v.includes('"')?`"${v.replace(/"/g,'""')}"`:v).join(','))];
  const blob=new Blob([lines.join('\n')],{type:'text/csv'});
  const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='dwell_data.csv';a.click();
  toast('CSV exported');
});
document.getElementById('btn-import').addEventListener('click',()=>document.getElementById('csv-file').click());
document.getElementById('csv-file').addEventListener('change',e=>{
  const f=e.target.files[0];if(!f)return;
  const rd=new FileReader();
  rd.onload=ev=>{
    const rows=String(ev.target.result||'').replace(/\r\n/g,'\n').replace(/\r/g,'\n').split('\n').filter(r=>r.trim()!=='');
    const dataRows=rows.slice(1); // always ignore row 1 (headers)
    data=Array.from({length:ROWS},()=>Array(NC).fill(''));
    dataRows.forEach((row,ri)=>{if(ri>=ROWS)return;parseCSV(row).forEach((v,ci)=>{if(ci<NC)data[ri][ci]=v.trim();});});
    rendered={};renderGrid(true);updateDetectedTrainCacheFromData();toast('Imported '+Math.min(dataRows.length,ROWS)+' rows');e.target.value='';switchToOutboundTabAfterImport();
  };
  rd.readAsText(f);
});
// ── SAVE AS EXCEL ──
document.getElementById('btn-save-excel').addEventListener('click',()=>{
  const nameInput=document.getElementById('save-name-input');
  const rawName=(nameInput.value||'').trim();
  const fileName=(rawName?rawName:'dwell_data').replace(/\.xlsx$/i,'')+'.xlsx';

  function doExport(XLSX){
    // Build array-of-arrays: headers + data rows (skip trailing empty rows)
    const headers=COLS.map(c=>c.l);
    const rows=[headers];
    let lastNonEmpty=0;
    for(let r=0;r<ROWS;r++){
      if(data[r].some(v=>v.trim()!=='')) lastNonEmpty=r;
    }
    for(let r=0;r<=lastNonEmpty;r++) rows.push([...data[r]]);

    const ws=XLSX.utils.aoa_to_sheet(rows);
    // Auto-width columns
    const colWidths=headers.map((h,i)=>{
      let max=h.length;
      for(let r=1;r<rows.length;r++) max=Math.max(max,(rows[r][i]||'').toString().length);
      return{wch:Math.min(max+2,40)};
    });
    ws['!cols']=colWidths;

    const wb=XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,'Data');
    XLSX.writeFile(wb,fileName);
    toast('Saved as '+fileName);
  }

  if(window.XLSX){
    doExport(window.XLSX);
  } else {
    const s=document.createElement('script');
    s.src='https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js';
    s.onload=()=>doExport(window.XLSX);
    s.onerror=()=>toast('Could not load Excel library — check connection');
    document.head.appendChild(s);
  }
});

function parseCSV(row){
  const r=[];let i=0,cur='',len=row.length;
  while(i<=len){
    if(i===len||row[i]===','){r.push(cur);cur='';i++;}
    else if(row[i]==='"'){i++;while(i<len){if(row[i]==='"'&&row[i+1]==='"'){cur+='"';i+=2;}else if(row[i]==='"'){i++;break;}else cur+=row[i++];}}
    else cur+=row[i++];
  }
  return r;
}

gridScroll.addEventListener('scroll',()=>renderGrid(false));
let _gridResizeTimer=null;
function hardRefreshGridAfterResize(){
  // Window resizing can leave old virtualized row nodes and the floating editor
  // painted at stale coordinates. Hide the editor and rebuild on the next frame.
  if(editMode) stopEdit(false);
  if(ceditor){
    ceditor.style.display='none';
    ceditor.style.left='-9999px';
    ceditor.style.top='-9999px';
  }
  Object.values(rendered||{}).forEach(row=>row&&row.remove&&row.remove());
  rendered={};
  calcGridColumnWidths();
  buildHeaders();
  requestAnimationFrame(()=>{
    Object.values(rendered||{}).forEach(row=>row&&row.remove&&row.remove());
    rendered={};
    calcGridColumnWidths();
    buildHeaders();
    renderGrid(true);
  });
}
window.addEventListener('resize',()=>{
  clearTimeout(_gridResizeTimer);
  hardRefreshGridAfterResize();
  _gridResizeTimer=setTimeout(hardRefreshGridAfterResize,120);
});

function activateAppTab(tab){
  tab = tab || 'input';
  document.querySelectorAll('.tab-pill').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-view').forEach(x=>x.classList.remove('active'));
  const legacyBtn=document.querySelector('.tab-pill[data-tab="'+tab+'"]');
  if(legacyBtn) legacyBtn.classList.add('active');
  const picker=document.getElementById('page-switcher');
  if(picker && picker.value!==tab) picker.value=tab;
  const view=document.getElementById('tab-'+tab);
  if(view) view.classList.add('active');
  if(tab==='input'){ requestAnimationFrame(()=>renderGrid(false)); setTimeout(()=>renderGrid(false),0); }
  if(tab==='outbound'){ requestAnimationFrame(()=>renderOB()); setTimeout(renderOB,0); }
  if(tab==='inbound') hydrateInboundPageFrame();
  if(tab==='analytics') renderAnalytics();
  if(tab==='recon' && typeof renderRecon==='function') renderRecon();
}

document.querySelectorAll('.tab-pill').forEach(t=>{
  t.addEventListener('click',()=>activateAppTab(t.dataset.tab));
});

if(pageSwitcher){
  pageSwitcher.addEventListener('change',()=>activateAppTab(pageSwitcher.value));

function hydrateInboundPageFrame(){
  const frame=document.getElementById('inbound-page-frame');

  if(frame && tpl && !frame.dataset.loaded){
    frame.srcdoc = tpl.innerHTML.trim();
    frame.dataset.loaded = '1';
  }
}

// Manual future blocks displayed only in CURRENT RAMP BLOCKING AFTER OUTBOUND CONSISTS.
const MANUAL_AFTER_BLOCKS_KEY='dwellManualAfterOutboundBlocks';
function loadManualAfterBlocks(){
  try{
    const raw=localStorage.getItem(MANUAL_AFTER_BLOCKS_KEY);
    const arr=raw?JSON.parse(raw):[];
    return Array.isArray(arr)?arr:[];
  }catch{return [];}
}
function saveManualAfterBlocks(blocks){
  try{localStorage.setItem(MANUAL_AFTER_BLOCKS_KEY,JSON.stringify(Array.isArray(blocks)?blocks:[]));}catch{}
}
function normalizeManualNetDwell(raw){
  const s=String(raw||'').trim().toUpperCase().replace(/H/g,'').replace(/NET/g,'').trim();
  const n=parseFloat(s);
  return isFinite(n)?n:null;
}
function openManualAfterBlockEditor(track){
  const ftRaw=prompt(`Footage for new block on 06-${track}:`, '');
  if(ftRaw===null) return;
  const ft=parseFloat(String(ftRaw).replace(/,/g,''));
  if(!isFinite(ft)||ft<=0){toast('Enter a valid footage');return;}

  const train=prompt('Train / inbound name:', '') || '';
  if(!train.trim()){toast('Train is required');return;}

  const block=prompt('Future block:', '') || '';
  if(!block.trim()){toast('Future block is required');return;}

  const netRaw=prompt('Net dwell hours:', '');
  if(netRaw===null) return;
  const net=normalizeManualNetDwell(netRaw);
  if(net===null){toast('Enter a valid net dwell hour value');return;}

  const arrival=prompt('Arrival time / note:', '') || '';
  const outTrackRaw=prompt('Display track:', String(track));
  if(outTrackRaw===null) return;
  const outTrack=String(outTrackRaw||track).replace(/[^0-9]/g,'') || String(track);

  const blocks=loadManualAfterBlocks();
  blocks.push({
    id:'mb_'+Date.now()+'_'+Math.random().toString(36).slice(2,7),
    track:String(track),
    outTrack:String(outTrack),
    ft,
    train:train.trim().toUpperCase(),
    block:block.trim().toUpperCase(),
    netDwell:net,
    arrival:arrival.trim(),
    createdAt:new Date().toISOString()
  });
  saveManualAfterBlocks(blocks);
  if(document.getElementById('tab-outbound')&&document.getElementById('tab-outbound').classList.contains('active')) renderOB();
  toast('Manual block added to 06-'+track);
}
function deleteManualAfterBlock(id){
  const blocks=loadManualAfterBlocks().filter(b=>String(b.id)!==String(id));
  saveManualAfterBlocks(blocks);
  if(document.getElementById('tab-outbound')&&document.getElementById('tab-outbound').classList.contains('active')) renderOB();
  toast('Manual block removed');
}

  const storageTracks=new Set([803,805,806,807]);
  const ihosa=new Set(['FXSI','ICDS','ICTF','KCSM','LATC','LDDS','LTDS','MXFE','PFDS','PHNX','SADS','SANT','SIDS','TSDS','TUDS','WBDS','YTDS']);
  const mhoas=new Set(['ALS','DEDS','DUDS','G4DS','KCDS','MNDS','MQPG','OADS','SCDS','SEDS']);

  const shell=document.createElement('div');
  shell.className='bowl-page-shell';
  const hideDwellValues = (()=>{try{return localStorage.getItem('dwellHideBowlDwell')==='1';}catch{return false;}})();
  const hideTrackSuffix = (()=>{try{return localStorage.getItem('dwellHideBowlTrackSuffix')==='1';}catch{return false;}})();
  const hideFutureInboundTag = (()=>{try{return localStorage.getItem('dwellHideFutureInboundTag')==='1';}catch{return false;}})();
  const hideFutureInboundBlocks = (()=>{try{return localStorage.getItem('dwellHideFutureInboundBlocks_v4')==='1';}catch{return false;}})();
  const legacyHideAfterDepartingBlocks = (()=>{try{return localStorage.getItem('dwellHideAfterDepartingBlocks')==='1';}catch{return false;}})();
  const hidePreviousDepartingBlocks = (()=>{try{return localStorage.getItem('dwellHidePreviousIhosaMhoas')==='1' || legacyHideAfterDepartingBlocks;}catch{return false;}})();
  const hideTomorrowDepartingBlocks = (()=>{try{return localStorage.getItem('dwellHideTomorrowIhosaMhoas')==='1' || legacyHideAfterDepartingBlocks;}catch{return false;}})();
  const hideOldestInboundFlags = (()=>{try{return localStorage.getItem('dwellHideOldestInboundFlags')==='1';}catch{return false;}})();
  const afterSsFutureTimeValue = (()=>{try{return localStorage.getItem('dwellAfterSsFutureTime')||'';}catch{return '';}})();
  const parseAfterSsFutureTime=()=>{
    if(!afterSsFutureTimeValue) return null;
    const d=new Date(afterSsFutureTimeValue);
    return Number.isNaN(d.getTime()) ? null : d;
  };
  const afterSsDwellFromArrival=arrival=>{
    const futureDt=parseAfterSsFutureTime();
    if(!futureDt) return null;
    let arrDt=null;
    if(arrival instanceof Date){
      arrDt=arrival;
    }else if(typeof parseAnyDateTime==='function'){
      arrDt=parseAnyDateTime(arrival);
    }
    if(!arrDt){
      const d=new Date(arrival);
      if(!Number.isNaN(d.getTime())) arrDt=d;
    }
    if(!arrDt) return null;
    const hrs=(futureDt-arrDt)/3600000;
    return isFinite(hrs) ? Math.max(0,hrs) : null;
  };
  const escAttr=v=>String(v==null?'':v).replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  if(hideDwellValues) shell.classList.add('bowl-hide-dwell');
  if(hideTrackSuffix) shell.classList.add('bowl-hide-track-suffix');
  if(hideFutureInboundTag) shell.classList.add('bowl-hide-future-inbound-tag');
  if(hideFutureInboundBlocks) shell.classList.add('bowl-hide-future-inbound-blocks');
  if(hidePreviousDepartingBlocks) shell.classList.add('bowl-hide-previous-departing-blocks');
  if(hideTomorrowDepartingBlocks) shell.classList.add('bowl-hide-tomorrow-departing-blocks');
  if(hideOldestInboundFlags) shell.classList.add('bowl-hide-oldest-flags');

  const wrap=document.createElement('div');
  wrap.style.overflow='auto';

  const table=document.createElement('table');
  table.className='bowl-board';

  const thead=document.createElement('thead');
  thead.innerHTML=
    '<tr>'+
      '<th style="background:linear-gradient(180deg,#991b1b 0%, #450a0a 100%);color:#fee2e2;border-color:#7f1d1d;">TRACK</th>'+
      '<th style="background:linear-gradient(180deg,#991b1b 0%, #450a0a 100%);color:#fee2e2;border-color:#7f1d1d;">CURRENT</th>'+
      '<th colspan="12" class="bowl-ramp-head" style="background:linear-gradient(180deg,#991b1b 0%, #450a0a 100%);color:#fee2e2;border-color:#7f1d1d;text-align:center;">'+
        '<span>CURRENT RAMP BLOCKING</span>'+
      '</th>'+
      '<th style="background:linear-gradient(180deg,#991b1b 0%, #450a0a 100%);color:#fee2e2;border-color:#7f1d1d;font-weight:800;text-align:center;">Δ</th>'+
    '</tr>';
  table.appendChild(thead);

  const tbody=document.createElement('tbody');

  const clean=v=>{
    if(v===undefined||v===null) return '';
    const s=String(v).trim();
    return s && s.toLowerCase()!=='nan' ? s : '';
  };
  const num=v=>{
    const n=parseFloat(v);
    return isFinite(n)?n:0;
  };
  const chooseLabel=row=>{
    const raw=clean(row[CI.bk1]) || clean(row[CI.bk2]) || clean(row[CI.ydBlock]) || '—';
    // Current Ramp Blocking display rule:
    // if the block/status resolves to an inbound working block, show the inbound train name
    // so CU/RAMP pockets identify which inbound they belong to.
    const u=String(raw).trim().toUpperCase();
    if(u==='CU' || u==='__CU' || u==='RAMP' || u==='__RAMP'){
      return clean(row[CI.train]) || raw;
    }
    return raw;
  };
  const rawBlockStatus=row=>{
    return clean(row[CI.bk1]) || clean(row[CI.bk2]) || clean(row[CI.ydBlock]) || '';
  };
  const isInboundWorkingRow=row=>{
    const u=rawBlockStatus(row).toUpperCase();
    return !!clean(row[CI.train]) && (u==='CU' || u==='__CU' || u==='RAMP' || u==='__RAMP');
  };
  const netCurrentDwellHours=row=>{
    const train=clean(row[CI.train]);
    const arrDt=getArrival(train);
    if(!arrDt) return null;

    const status=clean(row[CI.bk1] || row[CI.bk2] || row[CI.ydBlock]).toUpperCase();
    const stillSS=status==='SS' || status.startsWith('SS ') || status.includes(' SS') || status.includes('SS');
    if(stillSS){
      const ssStart=parseCompactDate(clean(row[CI.timeInHold]));
      if(ssStart){
        const toSS=(ssStart-arrDt)/3600000;
        if(isFinite(toSS)) return Math.max(0,toSS);
      }
    }

    const ssHrs=(num(row[CI.holdDay])*24)+num(row[CI.holdHr]);
    const raw=(new Date()-arrDt)/3600000;
    if(!isFinite(raw)) return null;
    return Math.max(0, raw-ssHrs);
  };

  const isSSStatusLabel=status=>/(^|[^A-Z0-9])SS([^A-Z0-9]|$)/.test(String(status||'').toUpperCase());
  const netAfterOutboundDwellHours=row=>{
    const status=rawBlockStatus(row);
    if(isSSStatusLabel(status)){
      const train=clean(row[CI.train]);
      const arrDt=getArrival(train);
      const futureDt=parseAfterSsFutureTime();
      if(arrDt && futureDt){
        const hrs=(futureDt-arrDt)/3600000;
        if(isFinite(hrs)) return Math.max(0,hrs);
      }
    }
    return netCurrentDwellHours(row);
  };
  const dwellTextFromAvg=avg=>{
    if(avg===null || avg===undefined || !isFinite(avg)) return '';
    return `${avg.toFixed(1)}H NET`;
  };
  const dwellClassFromAvg=avg=>{
    if(avg===null || avg===undefined || !isFinite(avg)) return '';
    if(avg < 7) return 'dw-green';
    if(avg < 11) return 'dw-gold';
    return 'dw-red';
  };
  const classify=(label, hold, inbound=false)=>{
    const u=label.toUpperCase();
    const h=(hold||'').toUpperCase();
    if(inbound) return 'inbound-gold';
    if(h.includes('BO') || u.includes('BO')) return 'bo-black';
    if(u.includes('RAMP') || u==='CU' || u==='__CU') return 'rampcu';
    if(u==='SS' || u==='MTP' || u.includes(' MTP') || u.includes('SS ') || u.startsWith('SS') || u.startsWith('MTP')) return 'ssmtp';
    if(u==='SL' || u.includes('SL')) return 'slblue';
    if(ihosa.has(u)) return 'ihosa';
    if(mhoas.has(u)) return 'mhoas';
    return 'normal';
  };

  const isBadOrderRow=row=>{
    const vals=[row&&row[CI.bk1], row&&row[CI.bk2], row&&row[CI.ydBlock], row&&row[CI.timeInHold]].map(v=>clean(v).toUpperCase()).join(' | ');
    return /(^|[^A-Z0-9])(BO|BAD ORDER)([^A-Z0-9]|$)/.test(vals) || vals.includes('__BO');
  };

  const buildInboundAlertBanner=()=>{
    const byTrain=new Map();
    data.forEach(row=>{
      if(!isInboundWorkingRow(row) || isBadOrderRow(row)) return;
      const train=clean(row[CI.train]);
      if(!train) return;
      const key=(typeof normalizeTrainName === 'function') ? normalizeTrainName(train) : train.toUpperCase().replace(/[^A-Z0-9]/g,'');
      const track=clean(row[CI.track]);
      const ln=num(row[CI.ln]);
      const arr=getArrival(train);
      const rec=byTrain.get(key) || {train, tracks:new Set(), ft:0, arr:null};
      if(track) rec.tracks.add(track);
      rec.ft+=ln;
      if(arr && (!rec.arr || arr<rec.arr)) rec.arr=arr;
      byTrain.set(key, rec);
    });

    const rows=[...byTrain.values()]
      .filter(x=>x.arr)
      .sort((a,b)=>a.arr-b.arr)
      .slice(0,3);

    if(!rows.length) return null;

    const banner=document.createElement('div');
    banner.className='bowl-inbound-alert';
    const now=new Date();
    const chips=rows.map((x,i)=>{
      const age=(now-x.arr)/3600000;
      const ageTxt=isFinite(age) ? `${age.toFixed(1)}H OLD` : 'AGE N/A';
      const tracks=[...x.tracks].sort((a,b)=>Number(a)-Number(b)).map(t=>`06-${t}`).join(', ');
      return `<span class="bowl-inbound-alert-chip">#${i+1} ${x.train} <span class="age">${ageTxt}</span> <span class="tracks">${tracks}</span></span>`;
    }).join('');
    banner.innerHTML=
      `<div class="bowl-inbound-alert-titlebar">`+
        `<div class="bowl-inbound-alert-title">OLDEST INBOUNDS NOT UNLOADED</div>`+
        `<div class="bowl-inbound-alert-list">${chips}</div>`+
        `<button class="bowl-oldest-toggle-btn bowl-oldest-toggle-banner" data-bowl-oldest-toggle type="button">${hideOldestInboundFlags?'SHOW OLDEST':'HIDE OLDEST'}</button>`+
      `</div>`;
    return banner;
  };

  const normalizeFutureInboundBlockSafe=v=>{
    const s=String(v==null?'':v).trim().toUpperCase();
    if(s==='IHOSA') return 'IHOSA';
    if(s==='MHOAS') return 'MHOAS';
    if(s==='SS') return 'SS';
    return '';
  };


  const oldestInboundFlagByRowIdx=(()=>{
    // Flag only inbound working blocks that still need to be dropped/unloaded.
    // Bad orders are ignored so BO pockets do not steal the oldest flags.
    const byTrain=new Map();
    try{
      data.forEach((row,idx)=>{
        if(!isInboundWorkingRow(row) || isBadOrderRow(row)) return;
        const tr=parseInt(row[CI.track],10);
        if(!tracks.includes(tr)) return;
        const train=clean(row[CI.train]);
        const arr=train ? getArrival(train) : null;
        if(!train || !arr) return;
        const key=(typeof normalizeTrainName === 'function') ? normalizeTrainName(train) : train.toUpperCase().replace(/[^A-Z0-9]/g,'');
        const rec=byTrain.get(key) || {train, arr, rows:[]};
        if(arr < rec.arr) rec.arr=arr;
        rec.rows.push(idx);
        byTrain.set(key, rec);
      });
    }catch(err){ console.warn('Oldest inbound flag scan failed', err); }
    const ranked=[...byTrain.values()].sort((a,b)=>a.arr-b.arr).slice(0,2);
    const out=new Map();
    ranked.forEach((rec,i)=>rec.rows.forEach(idx=>out.set(idx, i+1)));
    return out;
  })();

  const selectedCarIdsForOutbound=()=>{
    // Build a precise selected-car assignment map for the AFTER OUTBOUND CONSISTS board.
    // Selected cars are no longer removed from the board by default. They remain visible
    // and are marked as IHOSA or MHOAS so the block can be split at the exact selected rows.
    // The HIDE IHOSA/MHOAS toggle can then hide only those explicitly tagged segments.
    const refs={ids:new Set(), rowIdxs:new Set(), assignByRowIdx:new Map(), assignById:new Map()};
    const addRef=(car,g,assigned)=>{
      const rowIdx=Number(car && car._rowIndex);
      if(Number.isFinite(rowIdx)){
        refs.rowIdxs.add(rowIdx);
        refs.assignByRowIdx.set(rowIdx, assigned);
      }
      const carId=clean(car && car.equipId);
      const trk=clean((car && car.track) || (g && g.track));
      if(carId && trk){
        const key=`${trk}||${carId}`;
        refs.ids.add(key);
        refs.assignById.set(key, assigned);
      }
    };
    try{
      buildGroups().forEach(g=>{
        if(!g || g.isForecast) return;
        (g.cars||[]).forEach(car=>{
          const trk=clean((car && car.track) || g.track);
          const carId=clean(car && car.equipId);
          if(!trk || !carId) return;
          let meta=null;
          try{ meta=getCarSelectionMeta(trk, carId, g); }catch{}
          const selected=!!(meta && meta.selected);
          const assigned=normalizeOutboundTrain(meta && meta.train);
          if(selected && assigned) addRef(car,g,assigned);
        });
      });
    }catch(err){ console.warn('After-outbound selected assignment build failed', err); }
    return refs;
  };

  const buildBoard=(title,currentLabel,excludedIds)=>{
    const board=document.createElement('table');
    const isAfterBoard=title==='AFTER OUTBOUND CONSISTS'||title==='POST OUTBOUND CONSIST';
    board.className=isAfterBoard ? 'bowl-board bowl-board-after' : 'bowl-board';

    const colGroup=document.createElement('colgroup');
    colGroup.innerHTML=
      '<col class="bowl-col-track">'+
      '<col class="bowl-col-current">'+
      Array.from({length:12},()=>'<col class="bowl-col-seg">').join('')+
      '<col class="bowl-col-delta">';
    board.appendChild(colGroup);

    const head=document.createElement('thead');
    const headBg=isAfterBoard
      ? 'background:linear-gradient(180deg,#1e3a8a 0%, #0f172a 100%);color:#dbeafe;border-color:#2563eb;'
      : 'background:linear-gradient(180deg,#991b1b 0%, #450a0a 100%);color:#fee2e2;border-color:#7f1d1d;';
    head.innerHTML=
      '<tr>'+ 
        '<th style="'+headBg+'">TRACK</th>'+ 
        '<th style="'+headBg+'">'+currentLabel+'</th>'+ 
        '<th colspan="12" class="bowl-ramp-head" style="'+headBg+'text-align:center;">'+ 
          '<span>'+title+'</span>'+
        '</th>'+ 
        '<th style="'+headBg+'font-weight:800;text-align:center;">Δ</th>'+ 
      '</tr>';
    board.appendChild(head);

    const body=document.createElement('tbody');

    tracks.forEach(track=>{
      const rows=[];
      for(let r=0;r<data.length;r++){
        const row=data[r];
        try{ row._bowlRowIndex=r; }catch{}
        const tr=parseInt(row[CI.track],10);
        if(tr!==track) continue;
        const equip=clean(row[CI.equipId]);
        const selectedByRow=excludedIds && excludedIds.assignByRowIdx && excludedIds.assignByRowIdx.get(r);
        const selectedById=excludedIds && excludedIds.assignById && equip && excludedIds.assignById.get(`${track}||${equip}`);
        const assignedDepart=normalizeOutboundTrain(selectedByRow || selectedById || '');
        const ln=num(row[CI.ln]);
        if(!ln && !clean(row[CI.bk1]) && !clean(row[CI.bk2]) && !clean(row[CI.ydBlock])) continue;
        // Keep selected cars visible on BOTH bowl boards, but tag the exact
        // source row as IHOSA/MHOAS so adjacent blocks split when the selected status changes.
        // This lets the first Current Ramp Blocking table show the same physical split as
        // the Post Outbound Consist table without subtracting those cars from CURRENT.
        if(assignedDepart){ row._afterDepartTrain=assignedDepart; }
        else if(row && row._afterDepartTrain){ try{ delete row._afterDepartTrain; }catch{} }
        rows.push(row);
      }

      let currentFt=0;
      const segments=[];
      let active=null;

      rows.forEach(row=>{
        const ln=num(row[CI.ln]);
        const rowOldestRank=!isAfterBoard ? (oldestInboundFlagByRowIdx.get(Number(row._bowlRowIndex)) || 0) : 0;
        const assignedDepart=normalizeOutboundTrain(row._afterDepartTrain || '');
        // Hide previous-day/current IHOSA/MHOAS departures from the AFTER board totals,
        // not just visually hide the pill after the math has already been calculated.
        if(isAfterBoard && hidePreviousDepartingBlocks && (assignedDepart==='IHOSA' || assignedDepart==='MHOAS')) return;
        currentFt+=ln;
        const label=chooseLabel(row);
        const netDwell=isAfterBoard ? netAfterOutboundDwellHours(row) : netCurrentDwellHours(row);
        const hold=clean(row[CI.timeInHold]);
        const inbound=isInboundWorkingRow(row);
        const key=label+'||'+(inbound?'INBOUND':'BLOCK')+'||'+assignedDepart;

        if(active && active.key===key){
          active.ft+=ln;
          if(rowOldestRank && (!active.oldestRank || rowOldestRank<active.oldestRank)) active.oldestRank=rowOldestRank;
          if(netDwell!==null){
            const w=ln||1;
            active.dwellWt+=netDwell*w;
            active.dwellFt+=w;
            active.dwellVal=active.dwellWt/active.dwellFt;
            active.dwell=dwellTextFromAvg(active.dwellVal);
            active.dwellCls=dwellClassFromAvg(active.dwellVal);
          }
        }else{
          if(active) segments.push(active);
          const w=ln||1;
          active={
            key, ft:ln, label, hold, inbound, departureTrain:assignedDepart, oldestRank:rowOldestRank, cls:(assignedDepart==='IHOSA'?'depart-ihosa':assignedDepart==='MHOAS'?'depart-mhoas':classify(label, hold, inbound)),
            dwellWt:netDwell!==null?netDwell*w:0,
            dwellFt:netDwell!==null?w:0,
            dwellVal:netDwell!==null?netDwell:null,
            dwell:netDwell!==null?dwellTextFromAvg(netDwell):'',
            dwellCls:netDwell!==null?dwellClassFromAvg(netDwell):''
          };
        }
      });
      if(active) segments.push(active);

      if(isAfterBoard){
        const manualBlocks=loadManualAfterBlocks().filter(b=>String(b.track)===String(track));
        manualBlocks.forEach(b=>{
          const ft=num(b.ft);
          const isFutureInbound=String(b.kind||b.type||'').toLowerCase()==='futureinbound';
          const futureBlock=isFutureInbound ? normalizeFutureInboundBlockSafe(b.futureBlock || b.block || 'IHOSA') : (normalizeOutboundTrain(b.futureBlock || b.block) || clean(b.block));
          // Hide FUTURE BLOCKS hides all future inbound blocks. The tomorrow IHOSA/MHOAS toggle
          // hides only future inbound/manual blocks marked to depart on IHOSA or MHOAS.
          if(isFutureInbound && hideFutureInboundBlocks) return;
          if(isFutureInbound && hideTomorrowDepartingBlocks && (futureBlock==='IHOSA' || futureBlock==='MHOAS')) return;
          if(!isFutureInbound && hidePreviousDepartingBlocks && (futureBlock==='IHOSA' || futureBlock==='MHOAS')) return;
          currentFt+=ft;
          const nd=isFutureInbound
            ? ((futureBlock==='SS') ? afterSsDwellFromArrival(b.arrival) : computeFutureInboundDwellPreview(b.arrival, futureBlock))
            : ((String(b.departureTrain||b.futureBlock||b.block||'').toUpperCase()==='SS') ? afterSsDwellFromArrival(b.arrival) : ((typeof computeManualFutureNetDwell==='function') ? computeManualFutureNetDwell(b) : normalizeManualNetDwell(b.netDwell)));
          segments.push({
            manual:true,
            futureInbound:isFutureInbound,
            id:b.id,
            groupId:b.groupId||'',
            departureTrain:futureBlock,
            futureBlock:futureBlock,
            ft,
            label:`${clean(b.train)} ${futureBlock}`.trim(),
            outTrack:clean(b.outTrack)||String(track),
            arrival:clean(b.arrival),
            shoveIndex:b.shoveIndex||b.overflowIndex||'',
            cls:isFutureInbound ? 'future-inbound' : 'manual-future',
            dwell:(nd!==null?`${nd.toFixed(1)} NET`:''),
            dwellCls:(nd!==null?dwellClassFromAvg(nd):'')
          });
        });
      }

      const tr=document.createElement('tr');
      if(storageTracks.has(track)) tr.classList.add('bowl-storage');
      if(!segments.length) tr.classList.add('bowl-empty-track-row');

      const delta=caps[track]-currentFt;
      const deltaCls=delta>=750?'good':delta>=300?'warn':'bad';

      const segmentHtml=segments.map(seg=>{
        const segDepart=normalizeFutureInboundBlockSafe(seg.departureTrain || seg.futureBlock || seg.outbound || '');
        if(isAfterBoard && (segDepart==='IHOSA' || segDepart==='MHOAS')){
          if(seg.futureInbound && hideTomorrowDepartingBlocks) return '';
          if(!seg.futureInbound && hidePreviousDepartingBlocks) return '';
        }
        const dwellHtml=seg.dwell ? ` <span class="bowl-dwell ${seg.dwellCls||''}">${seg.dwell}</span>` : '';
        const oldestBadge=(!isAfterBoard && seg.oldestRank) ? ` <span class="bowl-oldest-flag rank-${seg.oldestRank}">${seg.oldestRank===1?'OLDEST':'2ND OLDEST'}</span>` : '';
        const departBadge=(segDepart==='IHOSA'||segDepart==='MHOAS') ? ` <span class="after-depart-badge ${segDepart.toLowerCase()}">${segDepart}</span>` : '';
        const shoveBadge=(seg.futureInbound && seg.shoveIndex) ? ` <span class="future-shove-badge">[${String(seg.shoveIndex).replace(/[^0-9A-Za-z_-]/g,'')}]</span>` : '';
        const displayTrack=seg.outTrack||track;
        // Removed hidden track suffix from inside block pills. Track is already shown in the row header,
        // and the hidden `| [TRACK]` span was creating the apparent blank gap before the edit pen.
        const trackSuffix='';
        const manualTag=seg.manual ? `<span class="manual-tag ${seg.futureInbound?'future-inbound-tag':'manual-block-tag'}">${seg.futureInbound?'future inbound':'manual'}</span>` : '';
        const editBtn=seg.manual ? `<button class="bowl-manual-edit" data-bowl-edit="${seg.id}" title="Edit block" type="button">✎</button>` : '';
        const delBtn=seg.manual ? `<button class="bowl-manual-del" data-bowl-del="${seg.id}" title="Remove manual block" type="button">×</button>` : '';
        // For non-manual segments on the after-board, render the edit-pen up front
        // so it's there from first paint. Prevents the pen from appearing/disappearing
        // between the initial render and the post-render `enhanceAfterBoard` pass.
        const afterEditBtn=(isAfterBoard && !seg.manual) ? `<button class="after-block-edit-btn" type="button" title="Edit block">✎</button>` : '';
        const currentEditBtn=(!isAfterBoard && !seg.manual) ? `<button class="current-block-edit-btn" type="button" title="Edit block">✎</button>` : '';
        const arrivalTitle=seg.manual&&seg.arrival ? ` title="Arrival: ${String(seg.arrival).replace(/"/g,'&quot;')}"` : '';
        const fiAttrs=seg.futureInbound ? ` data-future-inbound-id="${String(seg.id||'').replace(/"/g,'&quot;')}" data-future-inbound-group="${String(seg.groupId||'').replace(/"/g,'&quot;')}" data-future-inbound-train="${String(seg.departureTrain||seg.futureBlock||'').replace(/"/g,'&quot;')}"` : '';
        return `<div class="bowl-block ${seg.cls}"${arrivalTitle}${fiAttrs}><span><b>${fmtN(seg.ft)}</b> | ${seg.label}${shoveBadge}${oldestBadge}${departBadge}${dwellHtml}${trackSuffix}${manualTag}${editBtn}${delBtn}${currentEditBtn}${afterEditBtn}</span></div>`;
      }).join('');

      tr.innerHTML=[
        `<td class="bowl-track">06-${track}${isAfterBoard?`<button class="bowl-track-add-btn" data-bowl-add-track="${track}" title="Add future block to 06-${track}" type="button">+</button>`:''}</td>`,

// Parse compact numeric date: 5190648 → 5/19 06:48, 10151423 → 10/15 14:23
function parseCompactDate(raw){
  const s=String(raw).trim().replace(/\D/g,'');
  if(s.length<7||s.length>8)return null;
  const yr=new Date().getFullYear();
  let mo,dd,hh,mm;
  if(s.length===7){mo=parseInt(s[0]);dd=parseInt(s.slice(1,3));hh=parseInt(s.slice(3,5));mm=parseInt(s.slice(5,7));}
  else{mo=parseInt(s.slice(0,2));dd=parseInt(s.slice(2,4));hh=parseInt(s.slice(4,6));mm=parseInt(s.slice(6,8));}
  if(mo<1||mo>12||dd<1||dd>31||hh>23||mm>59)return null;
  const d=new Date(yr,mo-1,dd,hh,mm,0,0);
  return isNaN(d)?null:d;
}

// Returns {dt, source:'bank'|'column'|'override'|null}
function getArrivalInfo(trainName){
  if(!trainName)return{dt:null,source:null};
  const key=trainName.trim().toUpperCase();
  // 1. session override
  if(window.arrOverrides&&window.arrOverrides[key])return{dt:new Date(window.arrOverrides[key]),source:'override'};
  // 2. train bank
  const found=Object.keys(trainBank).find(k=>k.toUpperCase()===key);
  if(found&&trainBank[found])return{dt:new Date(trainBank[found]),source:'bank'};
  // 3. ARRIVAL column — try compact format first, then standard parse
  for(let r=0;r<ROWS;r++){
    if((data[r][CI.train]||'').trim().toUpperCase()===key&&data[r][CI.arrival]){
      const raw=(data[r][CI.arrival]||'').trim();
      const compact=parseCompactDate(raw);
      if(compact)return{dt:compact,source:'column'};
      try{const d=new Date(raw);if(!isNaN(d))return{dt:d,source:'column'};}catch{}
    }
  }
  return{dt:null,source:null};
}

function getArrival(trainName){
  return getArrivalInfo(trainName).dt;
}

function toDatetimeLocalValue(dt){
  if(!dt) return '';

function rawTrainToken(name){
  return String(name||'').trim();
}
function normalizeTrainKey(name){
  let s=String(name||'').trim().toUpperCase();
  s=s.replace(/[\u00A0\t\r\n]+/g,' ');
  s=s.replace(/[_\-\/]+/g,' ');
  s=s.replace(/\s+/g,' ').trim();
  const compact=s.replace(/[^A-Z0-9]/g,'');
  const m=compact.match(/^([A-Z]{3,8})(\d{1,3})$/);
  if(m){
    const num=String(parseInt(m[2],10)).padStart(2,'0');
    return `${m[1]} ${num}`;
  }
  return s;
}
function prettyTrainName(name){
  const key=normalizeTrainKey(name);
  return key || String(name||'').trim();
}
function findTrainBankKey(name){
  const key=normalizeTrainKey(name);
  return Object.keys(trainBank||{}).find(k=>normalizeTrainKey(k)===key)||null;
}
function extractTrainNameFromRow(row){
  if(!row) return '';
  const direct=String(row[CI.train]||'').trim();
  if(direct) return prettyTrainName(direct);

  // Fallback: if a pasted/imported sheet has shifted columns, scan for a train-like token.
  for(const cell of row){
    const raw=String(cell||'').trim();
    if(!raw) continue;
    const compact=raw.toUpperCase().replace(/[^A-Z0-9]/g,'');
    if(/^Z[A-Z]{3,6}\d{1,3}$/.test(compact)) return prettyTrainName(raw);
  }
  return '';
}
function parseArrivalCandidate(raw){
  const v=String(raw||'').trim();
  if(!v) return null;
  const compact=parseCompactDate(v);
  if(compact) return compact;
  const d=new Date(v);
  if(!isNaN(d)) return d;
  return null;
}
function getRowArrivalCandidate(row){
  if(!row) return null;
  const preferred=parseArrivalCandidate(row[CI.arrival]);
  if(preferred) return preferred;
  // If columns are shifted, scan for date/time-like cells but ignore tiny integers.
  for(const cell of row){
    const raw=String(cell||'').trim();
    if(!raw) continue;
    if(!(/[/:\-T]/.test(raw) || /^\d{7,8}$/.test(raw))) continue;
    const d=parseArrivalCandidate(raw);
    if(d) return d;
  }
  return null;
}
function saveDetectedTrainCache(){
  try{ localStorage.setItem('dwellDetectedTrainCache', JSON.stringify(detectedTrainCache||{})); }catch{}
}
function clearDetectedTrainCache(){
  detectedTrainCache={};
  try{ localStorage.removeItem('dwellDetectedTrainCache'); }catch{}
}
function updateDetectedTrainCacheFromData(){
  const now=new Date().toISOString();
  let changed=false;
  detectedTrainCache=detectedTrainCache||{};

  for(let r=0;r<ROWS;r++){
    const row=data[r]||[];
    const train=extractTrainNameFromRow(row);
    const key=normalizeTrainKey(train);
    if(!key) continue;
    const arr=getRowArrivalCandidate(row);
    const existing=detectedTrainCache[key]||{};
    const next={
      name: existing.name || prettyTrainName(train),
      iso: existing.iso || (arr ? arr.toISOString() : ''),
      seenAt: now
    };
    if(arr) next.iso=arr.toISOString();
    if(JSON.stringify(existing)!==JSON.stringify(next)){
      detectedTrainCache[key]=next;
      changed=true;
    }
  }

  // Also cache trains already parsed into outbound groups, in case the raw grid shifted.
  try{
    buildGroups().forEach(g=>{
      const train=prettyTrainName(g.train);
      const key=normalizeTrainKey(train);
      if(!key) return;
      if(!detectedTrainCache[key]){
        detectedTrainCache[key]={name:train,iso:'',seenAt:now};
        changed=true;
      }
    });
  }catch{}

  if(changed) saveDetectedTrainCache();
}
function getActiveDataTrains(){
  // Re-scan the current import each time the Train Bank opens, then merge with the last-import cache.
  updateDetectedTrainCacheFromData();
  const seen=new Map();
  Object.entries(detectedTrainCache||{}).forEach(([key,obj])=>{
    const name=prettyTrainName((obj&&obj.name)||key);
    const nkey=normalizeTrainKey(name||key);
    if(nkey&&!seen.has(nkey)) seen.set(nkey,name||nkey);
  });
  return Array.from(seen.values()).sort((a,b)=>a.localeCompare(b,undefined,{numeric:true,sensitivity:'base'}));
}
function getDetectedArrivalFromData(trainName){
  const key=normalizeTrainKey(trainName);

  // First look at the live imported grid.
  for(let r=0;r<ROWS;r++){
    const row=data[r]||[];
    const rowTrain=extractTrainNameFromRow(row);
    if(normalizeTrainKey(rowTrain)!==key)continue;
    const d=getRowArrivalCandidate(row);
    if(d)return d;
  }

  // Then fall back to the last-import cache, so Train Bank is not empty after refresh/reopen.
  const cached=(detectedTrainCache||{})[key];
  if(cached&&cached.iso){
    const d=new Date(cached.iso);
    if(!isNaN(d))return d;
  }
  return null;
}
function getMissingTrainBankTrains(){
  return getActiveDataTrains().filter(train=>{
    const found=findTrainBankKey(train);
    return !found || !String(trainBank[found]||'').trim();
  });
}

      return `<span class="tb-missing-chip">${escapeHTML(label)}</span>`;
    }).join('')}</div>
  `;
}
function renderTBList(){
  const list=document.getElementById('tb-list');
  list.innerHTML='';

  updateDetectedTrainCacheFromData();
  const detected=getActiveDataTrains();
  const missing=getMissingTrainBankTrains();
  const missingKeys=new Set(missing.map(normalizeTrainKey));
  renderTrainBankMissingBanner(missing);

  const merged=new Map();

  // 1) Always list saved trains, including saved trains with blank times.
  Object.entries(trainBank||{}).forEach(([name,iso])=>{
    const key=normalizeTrainKey(name);
    if(key) merged.set(key,{name,iso:iso||'',detected:false});
  });

  // 2) Add detected trains from the current/last imported data. These are visible even before saving.
  detected.forEach(name=>{
    const key=normalizeTrainKey(name);
    if(!key) return;
    const found=findTrainBankKey(name);
    if(found){
      const fkey=normalizeTrainKey(found);
      const existing=merged.get(fkey)||{name:found,iso:trainBank[found]||''};
      existing.detected=true;
      merged.set(fkey,existing);
    }else{
      merged.set(key,{name,iso:'',detected:true});
    }
  });

  const entries=Array.from(merged.values()).sort((a,b)=>a.name.localeCompare(b.name,undefined,{numeric:true,sensitivity:'base'}));
  if(!entries.length){list.innerHTML='<div class="tb-empty">No saved trains or imported trains detected yet. Import/paste data, then reopen Train Bank.</div>';return;}

  entries.forEach(({name,iso,detected})=>{
    const key=normalizeTrainKey(name);
    const isMissing=missingKeys.has(key);
    const tempArrival=isMissing ? getDetectedArrivalFromData(name) : null;
    const tempValue=tempArrival ? toDatetimeLocalValue(tempArrival) : '';
    const item=document.createElement('div');
    item.className='tb-item'+(isMissing?' tb-missing':'');

    const nm=document.createElement('div');nm.className='ti-name';nm.textContent=name;nm.title=name;
    const ti=document.createElement('input');
    ti.type='datetime-local';
    if(iso)ti.value=iso.slice(0,16);
    else if(tempValue){ti.value=tempValue;ti.dataset.temp='1';}

    const badge=document.createElement('span');badge.className='tb-missing-badge';badge.textContent='MISSING BANK';
    const tempBadge=document.createElement('span');tempBadge.className='tb-temp-badge';tempBadge.textContent=tempValue?'TEMP FROM DATA':'NO DATA TIME';

    const sv=document.createElement('button');sv.className='ti-save';sv.textContent=isMissing?'ADD TO BANK':'SAVE';
    sv.addEventListener('click',()=>{
      const saveName=findTrainBankKey(name)||name;
      trainBank[saveName]=ti.value?new Date(ti.value).toISOString():'';
      saveTB();
      toast(saveName+(isMissing?' added to Train Bank':' saved to Train Bank'));
      renderTBList();
      if(document.getElementById('tab-outbound').classList.contains('active'))renderOB();
    });

    const dl=document.createElement('button');dl.className='ti-del';dl.textContent='✕';
    dl.addEventListener('click',()=>{
      const found=findTrainBankKey(name);
      if(found) delete trainBank[found];
      saveTB();renderTBList();
    });

    if(isMissing)item.append(nm,badge,tempBadge,ti,sv,dl);
    else item.append(nm,ti,sv,dl);
    list.appendChild(item);
  });
}

// ═══════════════════════════════════════
//  OUTBOUND LOGIC
// ═══════════════════════════════════════
function seqNumValue(v){
  const n=parseInt(String(v||'').trim(),10);
  return Number.isFinite(n) ? n : null;
}

function makeGroupSequenceLabel(g){
  if(!g) return '';
  const a=g.seqStart;
  const b=g.seqEnd;
  if(a!==undefined && a!==null && b!==undefined && b!==null){
    return a===b ? `SEQ ${a}` : `SEQ ${a}-${b}`;
  }
  return '';
}

function physicalBlockToken(car){
  // Physical outbound cuts must split when the block/status changes in sequence.
  // Priority is BK1 first, then BK2, then YD BLOCK.
  // Example: BK1 SL-SS-SL on the same inbound/track is three separate physical groups,
  // because the two SL cuts are not directly next to each other.
  const raw = String((car && (car.bk1 || car.bk2 || car.ydBlock)) || '').trim().toUpperCase();
  return raw || 'NO_BLOCK';
}

function finishPhysicalGroup(list, cur){
  if(!cur) return;
  cur.totalLn=cur.cars.reduce((a,c)=>a+(parseFloat(c.ln)||0),0);
  cur.totalTons=cur.cars.reduce((a,c)=>a+(parseFloat(c.tons)||0),0);
  const first=cur.cars[0]||{};
  const last=cur.cars[cur.cars.length-1]||first;
  const firstSeq=seqNumValue(first.trackSeq);
  const lastSeq=seqNumValue(last.trackSeq);
  cur.seqStart=firstSeq!==null ? firstSeq : cur.firstRow+1;
  cur.seqEnd=lastSeq!==null ? lastSeq : cur.lastRow+1;
  cur.seqLabel=makeGroupSequenceLabel(cur);
  cur.key=[cur.train, cur.track, 'SEQ', cur.seqStart, cur.seqEnd, 'R', cur.firstRow, cur.lastRow].join('||');
  list.push(cur);
}

function buildGroups(){
  const rows=[];
  for(let r=0;r<ROWS;r++){
    const row=data[r];
    const train=(row[CI.train]||'').trim();
    const track=(row[CI.track]||'').trim();
    const ln=parseFloat(row[CI.ln])||0;
    const tons=parseFloat(row[CI.tons])||0;
    if(!train&&!track)continue;
    if(!train&&ln===0&&tons===0)continue;
    rows.push({
      rowIndex:r,
      seq:seqNumValue(row[CI.trackSeq]),
      train,
      track,
      car:{
        _rowIndex:r,
        yd:(row[CI.yd]||'').trim(),
        track:(row[CI.track]||'').trim(),
        trackSeq:(row[CI.trackSeq]||'').trim(),
        equipId:(row[CI.equipId]||'').trim(),
        tons,
        ln,
        bk1:(row[CI.bk1]||'').trim(),
        bk2:(row[CI.bk2]||'').trim(),
        timeInHold:(row[CI.timeInHold]||'').trim(),
        holdDay:parseInt(row[CI.holdDay])||0,
        holdHr:parseFloat(row[CI.holdHr])||0,
        train,
        arrivalRaw:(row[CI.arrival]||'').trim(),
        ydBlock:(row[CI.ydBlock]||'').trim(),
      }
    });
    rows[rows.length-1].blockToken = physicalBlockToken(rows[rows.length-1].car);
  }

  // Physical grouping rule:
  // cars only stay in the same outbound group when they are the same inbound train,
  // on the same track, the same physical block/status (SL, SS, etc.), and directly
  // adjacent by TRACK SEQ. If another block sits between matching cars (SL-SS-SL),
  // or the sequence jumps, a new group is created.
  rows.sort((a,b)=>{
    const at=parseInt(a.track,10), bt=parseInt(b.track,10);
    const ta=Number.isFinite(at)?at:999999;
    const tb=Number.isFinite(bt)?bt:999999;
    if(ta!==tb) return ta-tb;
    const as=a.seq!==null?a.seq:a.rowIndex;
    const bs=b.seq!==null?b.seq:b.rowIndex;
    if(as!==bs) return as-bs;
    return a.rowIndex-b.rowIndex;
  });

  const groups=[];
  let cur=null;
  let last=null;

  rows.forEach(item=>{
    const sameTrainTrack=cur && item.train===cur.train && item.track===cur.track;
    const samePhysicalBlock=cur && item.blockToken===cur.blockToken;
    const bothSeq=last && item.seq!==null && last.seq!==null;
    const adjacentSeq=bothSeq ? item.seq===last.seq+1 : (last ? item.rowIndex===last.rowIndex+1 : false);
    const keepTogether=!!(sameTrainTrack && samePhysicalBlock && adjacentSeq);

    if(!keepTogether){
      finishPhysicalGroup(groups, cur);
      cur={
        key:'',
        train:item.train,
        track:item.track,
        cars:[],
        totalLn:0,
        totalTons:0,
        firstRow:item.rowIndex,
        lastRow:item.rowIndex,
        blockToken:item.blockToken,
        blockLabel:item.blockToken==='NO_BLOCK' ? '' : item.blockToken,
        seqStart:null,
        seqEnd:null,
        seqLabel:''
      };
    }

    cur.cars.push(item.car);
    cur.lastRow=item.rowIndex;
    last=item;
  });

  finishPhysicalGroup(groups, cur);
  return groups;
}

function calcCarDwell(arrDt,depDt,holdDay,holdHr){
  if(!arrDt||!depDt)return null;
  const raw=(depDt-arrDt)/3600000;
  if(holdDay>0||holdHr>0)return raw-(holdDay*24+holdHr);
  return raw;
}

// Returns the operational block/status used for SS logic.
// Priority must stay BK1 → BK2 → Yard Block.
function getCarBlockStatus(car){
  return String((car && (car.bk1 || car.bk2 || car.ydBlock)) || '').trim().toUpperCase();
}

function isActiveSSCar(car){
  const status=getCarBlockStatus(car);
  return status==='SS' || status.startsWith('SS ') || status.includes(' SS') || status.includes('SS');
}

function getCarSSStart(car){
  if(!car) return null;
  const dt=parseCompactDate((car.timeInHold||'').trim());
  return dt && !isNaN(dt) ? dt : null;
}

function calcCarDwellWithSSState(arrDt,depDt,car,group){
  if(!arrDt||!depDt||!car)return null;

  // If the car is still sitting in SS, dwell-to-SS is Arrival → SS start.
  // Do not calculate Arrival → Departure minus projected/future SS time for active SS cars.
  if(isActiveSSCar(car)){
    const entry=group && ssStore[group.key] ? ssStore[group.key] : null;
    const manualStart=entry && entry.start ? entry.start : null;
    const manualEnd=entry && entry.end ? entry.end : null;
    const ssStart=manualStart || getCarSSStart(car);
    if(ssStart && !manualEnd){
      const hrs=(ssStart-arrDt)/3600000;
      return isFinite(hrs) ? Math.max(0,hrs) : null;
    }
  }

  return calcCarDwell(arrDt,depDt,car.holdDay,car.holdHr);
}

function getGroupAutoSSStart(group){
  if(!group || group.isForecast) return null;
  let earliest=null;
  (group.cars||[]).forEach(car=>{
    if(!isActiveSSCar(car)) return;
    const dt=getCarSSStart(car);
    if(dt && (!earliest || dt<earliest)) earliest=dt;
  });
  return earliest;
}

function calcGroupDwell(group,depDt){
  const excl=carExclusions[group.key]||new Set();
  let wt=0,tot=0;
  const arrDt=group.isForecast ? (group.forecastArrival || new Date()) : getArrival(group.train);
  if(!arrDt)return null;
  if(group.isForecast){
    const d=calcCarDwell(arrDt,depDt,0,0);
    const ft=group.totalLn||0;
    return ft>0 && d!==null ? d : null;
  }
  if(group.isManual){
    // Manual groups are keyed by train+track so just use group.train
    group.cars.forEach(car=>{
      if(excl.has(car.equipId))return;
      const d=calcCarDwellWithSSState(arrDt,depDt,car,group);
      if(d!==null){wt+=d*car.ln;tot+=car.ln;}
    });
  } else {
    group.cars.forEach(car=>{
      if(excl.has(car.equipId))return;
      const d=calcCarDwellWithSSState(arrDt,depDt,car,group);
      if(d!==null){wt+=d*car.ln;tot+=car.ln;}
    });
  }
  return tot>0?wt/tot:null;
}

function calcGroupSS(group){
  if(group.isForecast) return 0;
  const excl=carExclusions[group.key]||new Set();
  let wt=0,tot=0;
  group.cars.forEach(car=>{
    if(excl.has(car.equipId))return;
    if(car.holdDay>0||car.holdHr>0){const ss=car.holdDay*24+car.holdHr;wt+=ss*car.ln;tot+=car.ln;}
  });
  return tot>0?wt/tot:0;
}

function getSSTotalValue(group){
  if(group.isForecast) return 0;
  const entry=ssStore[group.key];
  if(entry && entry.start){
    const end = entry.end ? entry.end : new Date();
    const hrs=(end - entry.start)/3600000;
    return hrs>0 ? hrs : 0;
  }
  return calcGroupSS(group) || 0;
}


function getArrToSSValue(group){
  const arr=getArrival(group.train);
  if(!arr) return null;
  const entry=ssStore[group.key];
  const start=(entry && entry.start) ? entry.start : getGroupAutoSSStart(group);
  if(!start) return null;
  const hrs=(start - arr)/3600000;
  return isFinite(hrs) && hrs >= 0 ? hrs : null;
}

function getArrToSSClass(v){
  if(v===null || v===undefined || isNaN(v)) return 'a2s-na';
  if(v<=6) return 'a2s-green';
  if(v<=10) return 'a2s-yellow';
  return 'a2s-red';
}

function isCarInSSStatus(car){
  if(!car) return false;
  const v=String(car.bk1 || car.bk2 || car.ydBlock || '').trim().toUpperCase();
  return /(^|[^A-Z0-9])SS([^A-Z0-9]|$)/.test(v) || v === 'SS' || v.includes('_SS');
}

function getNoSSFlagHtml(){
  return '<span class="ss-cross-flag" title="Not currently in SS">NO SS</span>';
}

function getCarArrivalToNowValue(car, group){
  const trainName = (car && (car.train || (group && group.train))) || '';
  const arr = getArrival(trainName);
  if(!arr) return null;
  const hrs=(new Date()-arr)/3600000;
  return isFinite(hrs) && hrs >= 0 ? hrs : null;
}

function getCarArrToSSValue(car, group){
  if(!car) return null;
  const trainName = (car.train || (group && group.train) || '');
  const arr = getArrival(trainName);
  if(!arr) return null;
  let start = null;
  if(group && group.key && ssStore[group.key] && ssStore[group.key].start){
    start = ssStore[group.key].start;
  }
  if(!start && typeof getCarSSStart === 'function') start = getCarSSStart(car);
  if(!start) return null;
  const hrs=(start-arr)/3600000;
  return isFinite(hrs) && hrs >= 0 ? hrs : null;
}

function getSSTotalClass(v){
  if(v===null || v===undefined || isNaN(v) || v<=0) return 'sst-na';
  if(v>=24) return 'sst-green';
  if(v>=19) return 'sst-amber';
  return 'sst-red';
}

function getSSBannerAlerts(){
  const groups=buildGroups().slice().sort((a,b)=>(parseInt(a.track)||0)-(parseInt(b.track)||0)||(a.seqStart||0)-(b.seqStart||0)||a.train.localeCompare(b.train));
  const alerts=[];
  groups.forEach(g=>{
    const ss=getSSTotalValue(g);
    if(ss>=18){
      const remaining=Math.max(0,24-ss);
      const level = ss>=24 ? 'green' : (remaining<=6 ? 'yellow' : 'red');
      alerts.push({
        key:g.key,
        train:g.train||'—',
        track:g.track||'—',
        ft:g.totalLn||0,
        cars:(g.cars||[]).length,
        ss:ss,
        remaining:remaining,
        level:level
      });
    }
  });
  alerts.sort((a,b)=>{
    const order={green:0,yellow:1,red:2};
    return order[a.level]-order[b.level] || a.remaining-b.remaining || b.ft-a.ft;
  });
  return alerts;
}

function wtAvg(groups,depDt){
  let wt=0,tot=0;
  groups.forEach(g=>{
    const d=calcGroupDwell(g,depDt);
    if(d!==null&&g.totalLn>0){wt+=d*g.totalLn;tot+=g.totalLn;}
  });
  return tot>0?wt/tot:null;
}
function simpleAvg(groups,depDt){
  const vals=groups.map(g=>calcGroupDwell(g,depDt)).filter(d=>d!==null);
  return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
}

// Returns true if any car has a BK value with MTP, SL, or any 4-letter code
function hasSSHistoryTrigger(group){
  const fourRe=/[A-Za-z]{4}/;
  return group.cars.some(car=>{
    return[car.bk1,car.bk2,car.ydBlock].some(bk=>{
      if(!bk)return false;
      const v=bk.trim().toUpperCase();
      if(v.includes('MTP')||v.includes('SL'))return true;
      if(fourRe.test(v))return true;
      return false;
    });
  });
}


function getSSHeatInfo(group){
  const excl=carExclusions[group.key]||new Set();
  let ssCount=0, nearCount=0, overCount=0, maxAge=0;
  group.cars.forEach(car=>{
    if(excl.has(car.equipId))return;
    if(car.holdDay>0||car.holdHr>0){
      const age=car.holdDay*24+car.holdHr;
      ssCount++;
      if(age>maxAge) maxAge=age;
      if(age>=24) overCount++;
      else if(age>=19) nearCount++;
    }
  });

  const trainName=String(group.train||'').toUpperCase();
  if(trainName.startsWith('ZPBHO')){
    const alpha = Math.min(0.08, 0.03 + ssCount*0.008);
    let title = `${ssCount} SS car${ssCount!==1?'s':''}`;
    if(ssCount) title += ` · ZPBHO accent`;
    return {cls:'ss-zpbho',count:ssCount,nearCount,overCount,maxAge,alpha,title};
  }

  if(!ssCount)return {cls:'',count:0,nearCount:0,overCount:0,maxAge:0,alpha:0,title:''};
  const cls = overCount ? 'ss-heat-red' : nearCount ? 'ss-heat-amber' : 'ss-heat-green';
  const alpha = Math.min(0.14, 0.04 + ssCount*0.02 + (overCount?0.02:0));
  let title = `${ssCount} SS car${ssCount!==1?'s':''}`;
  if(overCount) title += ` · ${overCount} at/over 24h`;
  else if(nearCount) title += ` · ${nearCount} within 5h of 24h`;
  else title += ` · safe`;
  title += ` · max ${maxAge.toFixed(1)}h`;
  return {cls,count:ssCount,nearCount,overCount,maxAge,alpha,title};
}

function dwellCls(d){if(d===null)return'';if(d<=21)return'dw-grn';if(d<=24)return'dw-yel';return'dw-red';}
function fmt2(n){return n===null?'—':n.toFixed(2);}
function fmtN(n){return n.toLocaleString();}
function fmtDwell(n){return n===null?'—':n.toFixed(1)+' hr';}
function addDaysForProjection(dt,days){
  if(!dt)return null;
  const d=new Date(dt);
  d.setDate(d.getDate()+days);
  return d;
}
function fixedProjectedDeparture(train, inboundDayOffset){
  // Today's inbound window:
  //   IHOSA departs today at 20:30.
  //   MHOAS departs tomorrow at 03:00.
  // Tomorrow's inbound window is the same pair shifted +24 hours.
  const d=new Date();
  const t=String(train||'').trim().toUpperCase();
  d.setSeconds(0,0);
  if(t==='MHOAS'){
    d.setDate(d.getDate()+1+inboundDayOffset);
    d.setHours(3,0,0,0);
  }else{
    d.setDate(d.getDate()+inboundDayOffset);
    d.setHours(20,30,0,0);
  }
  return d;
}
function projectedDwellStatus(avg){
  if(avg===null||!isFinite(avg))return 'na';
  return avg<24?'good':'risk';
}
function buildProjectedDwellStrip(ihosaGroups,mhoasGroups){
  const wrap=document.createElement('div');
  wrap.className='projected-dwell-strip';
  if(!projectedDwellVisible) wrap.style.display='none';

  const esc=v=>String(v==null?'':v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
  const activeCarsForGroup=g=>{
    const excl=carExclusions[g.key]||new Set();
    return (g.cars||[]).filter(car=>car && !excl.has(car.equipId));
  };
  const netDwellForCar=(g,car,dep)=>{
    if(!g || !car || !dep) return null;
    let arrDt=null;
    if(g.isForecast) arrDt=g.forecastArrival || new Date();
    else if(g._manualArrDt) arrDt=g._manualArrDt;
    else arrDt=getArrival(g.train);
    if(!arrDt) return null;
    return calcCarDwellWithSSState(arrDt,dep,car,g);
  };
  const carRowsForCard=(groups,dep)=>{
    const rows=[];
    (groups||[]).forEach(g=>{
      if(g.isForecast){
        const d=calcGroupDwell(g,dep);
        rows.push({
          id:String(g.train||'FORECAST'),
          track:String(g.track||'—'),
          ft:parseFloat(g.totalLn)||0,
          block:normalizeOutboundTrain(g.outbound)||'FORECAST',
          net:d
        });
        return;
      }
      activeCarsForGroup(g).forEach(car=>{
        const block=String(car.ydBlock || car.bk2 || car.bk1 || g.blockLabel || '').trim().toUpperCase() || '—';
        rows.push({
          id:String(car.equipId || car.carId || car.id || 'CAR'),
          track:String(car.track || g.track || '—'),
          ft:parseFloat(car.ln)||0,
          block,
          net:netDwellForCar(g,car,dep)
        });
      });
    });
    return rows;
  };
  const weightedNetAvg=(groups,dep)=>{
    let wt=0,tot=0;
    (groups||[]).forEach(g=>{
      if(g.isForecast){
        const d=calcGroupDwell(g,dep);
        const ft=parseFloat(g.totalLn)||0;
        if(d!==null && ft>0){ wt+=d*ft; tot+=ft; }
        return;
      }
      activeCarsForGroup(g).forEach(car=>{
        const ft=parseFloat(car.ln)||0;
        const w=ft||1;
        const d=netDwellForCar(g,car,dep);
        if(d!==null){ wt+=d*w; tot+=w; }
      });
    });
    return tot>0?wt/tot:null;
  };

  const baseSpecs=[
    {train:'IHOSA',groups:ihosaGroups},
    {train:'MHOAS',groups:mhoasGroups}
  ];

  const renderCard=(x,inboundDayOffset)=>{
    const dep=fixedProjectedDeparture(x.train,inboundDayOffset);
    const avg=weightedNetAvg(x.groups,dep);
    const cls=projectedDwellStatus(avg);
    const rows=carRowsForCard(x.groups,dep);
    const ft=rows.reduce((a,r)=>a+(parseFloat(r.ft)||0),0);
    const badge=avg===null?'NO DATA':(cls==='good'?'GOAL':'OVER 24');
    const value=avg===null?'—':avg.toFixed(1)+'H';
    const dayLabel=inboundDayOffset===0?'TODAY':'TOMORROW';
    const carHtml=rows.length ? rows.map(r=>{
      const net=(r.net===null||!isFinite(r.net))?'—':r.net.toFixed(1)+'H';
      return `<div class="pd-car-row"><span class="pd-car-id">${esc(r.id)}</span><span class="pd-car-meta">${esc(r.block)}</span><span class="pd-car-meta">${esc(r.track)}</span><span class="pd-car-net">${net}</span></div>`;
    }).join('') : '<div class="pd-car-empty">NO CARS SELECTED FOR THIS OUTBOUND</div>';
    return `<details class="projected-dwell-card ${cls}">
      <summary>
        <div class="pd-top"><span class="pd-train">${x.train}</span><span class="pd-day">${dayLabel}</span></div>
        <div class="pd-value">${value}</div>
        <div class="pd-meta"><span class="pd-badge">${badge}</span> · WT AVG NET · ${fmtN(ft)} FT · DEP ${fmtDT(dep)}</div>
        <div class="pd-click">CLICK TO SHOW RIDING CARS</div>
      </summary>
      <div class="pd-car-list">${carHtml}</div>
    </details>`;
  };

  // ── TOMORROW cards source their cars from POST OUTBOUND CONSIST future-inbound
  //    blocks tagged with the train (IHOSA / MHOAS). The TODAY cards above still
  //    pull from ihosaGroups/mhoasGroups (cars selected for today's outbound).
  //    Bug fix: previously the tomorrow card reused today's selected cars, which
  //    counted cars that will have already departed before tomorrow's outbound.
  const renderTomorrowCard=(train)=>{
    const TRAIN=String(train||'').trim().toUpperCase();
    // Pull every future-inbound manual block tagged with this train.
    let blocks=[];
    try{
      const all=(typeof window.loadManualAfterBlocks==='function'?window.loadManualAfterBlocks():(typeof loadManualAfterBlocks==='function'?loadManualAfterBlocks():[]))||[];
      blocks=all.filter(b=>{
        if(!b) return false;
        const isFuture=String(b.kind||b.type||'').toLowerCase()==='futureinbound';
        if(!isFuture) return false;
        const norm=(typeof normalizeFutureInboundBlockSafe==='function')
          ? normalizeFutureInboundBlockSafe(b.futureBlock || b.block || '')
          : String(b.futureBlock || b.block || '').trim().toUpperCase();
        return norm===TRAIN;
      });
    }catch(e){ blocks=[]; }

    // Use the same release date the after-board itself uses for these blocks.
    let dep=null;
    try{ dep=(typeof getManualFutureReleaseDate==='function')?getManualFutureReleaseDate(TRAIN):null; }catch(e){ dep=null; }
    if(!dep) dep=fixedProjectedDeparture(TRAIN,1);

    // Per-block net dwell using the same helper the after-board uses for badges.
    const computed=blocks.map(b=>{
      let nd=null;
      try{
        nd=(typeof computeFutureInboundDwellPreview==='function')
          ? computeFutureInboundDwellPreview(b.arrival, TRAIN)
          : (typeof computeManualFutureNetDwell==='function' ? computeManualFutureNetDwell(b) : null);
      }catch(e){ nd=null; }
      return {
        id:String(b.train||b.id||'FUTURE'),
        track:String(b.outTrack||b.track||'—'),
        ft:parseFloat(b.ft)||0,
        block:'FUTURE INBOUND',
        net:(nd===null||!isFinite(nd))?null:nd
      };
    });

    // Weighted average net dwell by footage.
    let wt=0,tot=0;
    computed.forEach(r=>{
      if(r.net===null) return;
      const w=r.ft||1;
      wt+=r.net*w; tot+=w;
    });
    const avg=tot>0?wt/tot:null;
    const cls=projectedDwellStatus(avg);
    const ft=computed.reduce((a,r)=>a+(parseFloat(r.ft)||0),0);
    const badge=avg===null?'NO DATA':(cls==='good'?'GOAL':'OVER 24');
    const value=avg===null?'—':avg.toFixed(1)+'H';
    const carHtml=computed.length ? computed.map(r=>{
      const net=(r.net===null||!isFinite(r.net))?'—':r.net.toFixed(1)+'H';
      return `<div class="pd-car-row"><span class="pd-car-id">${esc(r.id)}</span><span class="pd-car-meta">${esc(r.block)}</span><span class="pd-car-meta">${esc(r.track)}</span><span class="pd-car-net">${net}</span></div>`;
    }).join('') : `<div class="pd-car-empty">NO ${TRAIN}-TAGGED FUTURE INBOUND BLOCKS ON POST OUTBOUND CONSIST</div>`;
    return `<details class="projected-dwell-card ${cls}">
      <summary>
        <div class="pd-top"><span class="pd-train">${TRAIN}</span><span class="pd-day">TOMORROW</span></div>
        <div class="pd-value">${value}</div>
        <div class="pd-meta"><span class="pd-badge">${badge}</span> · WT AVG NET · ${fmtN(ft)} FT · DEP ${fmtDT(dep)}</div>
        <div class="pd-click">CLICK TO SHOW FUTURE INBOUND BLOCKS</div>
      </summary>
      <div class="pd-car-list">${carHtml}</div>
    </details>`;
  };

  const todayCards=baseSpecs.map(x=>renderCard(x,0)).join('');
  const tomorrowCards=baseSpecs.map(x=>renderTomorrowCard(x.train)).join('');

  wrap.innerHTML=`
    <div class="projected-dwell-head">
      <div class="projected-dwell-title">PROJECTED NET DWELL BY OUTBOUND</div>
      <div class="projected-dwell-sub">TARGET &lt; 24.0 HR · WT AVG NET DWELL BY FOOTAGE</div>
    </div>
    <div class="projected-dwell-sections">
      <section class="projected-dwell-section">
        <div class="projected-dwell-section-title"><span>TODAY'S OUTBOUNDS</span><span>IHOSA 20:30 · MHOAS +1 03:00</span></div>
        <div class="projected-dwell-grid">${todayCards}</div>
      </section>
      <section class="projected-dwell-section">
        <div class="projected-dwell-section-title"><span>TOMORROW'S OUTBOUNDS</span><span>FUTURE INBOUND BLOCKS ON POST OUTBOUND CONSIST</span></div>
        <div class="projected-dwell-grid">${tomorrowCards}</div>
      </section>
    </div>`;
  return wrap;
}

const OB_HEADS=['RIDE?','OUTBOUND','INBOUND / SEQ / TRACK','ARRIVAL','ACTUAL DEPART','FT','DWELL w/SS','SS START','SS END','SS TOTAL','ARR TO SS','TRAIN AVG','BO'];


function getOutboundHistoryTextForGroup(g,depDt){
  const today=new Date();today.setHours(0,0,0,0);
  const {dt:arrDt}=getArrivalInfo(g.train);
  const arrDay=arrDt?new Date(arrDt):null;
  if(arrDay)arrDay.setHours(0,0,0,0);
  const isMainInbound=/^(ZLBHO|ZPBHO)/i.test(g.train);

  const cars=(g.cars||[]).map(car=>{
    const bk1=(car.bk1||'').toUpperCase().trim();
    const bk2=(car.bk2||'').toUpperCase().trim();
    const yd=(car.ydBlock||'').toUpperCase().trim();
    const isSSCar=bk2.includes('SS');
    const isBO=bk2.includes('BO')||bk1.includes('BO')||yd.includes('BO');
    const dwell=calcCarDwell(arrDt,depDt,car.holdDay,car.holdHr);
    return {
      car,dwell,isSSCar,isBO,
      arrivedToday:!!(arrDay&&arrDay.getTime()===today.getTime()),
      isPrevInbound:!!(arrDay&&arrDay.getTime()<today.getTime()),
      isCrossHaul:!isMainInbound
    };
  });

  const hasManualBO=boSet&&boSet.has(g.key);

  const categories=[
    {
      id:'bo',
      filter:e=>e.isBO||hasManualBO,
      text:count=>`${count} car${count!==1?'s':''} flagged BO${hasManualBO?' (manual BO checked)':''}. Verify status and confirm clearance before departure.`
    },
    {
      id:'ss_high',
      filter:e=>e.isPrevInbound&&e.isSSCar&&e.dwell!==null&&e.dwell>21,
      text:(count,matches)=>{
        const avg=matches.length?matches.reduce((a,e)=>a+e.dwell,0)/matches.length:0;
        return `${count} SS car${count!==1?'s':''} already exceed 21 hrs dwell (avg ${avg.toFixed(1)} hr). Highest KPI exposure on the consist.`;
      }
    },
    {
      id:'prev_ss',
      filter:e=>e.isPrevInbound&&e.isSSCar,
      text:count=>`${count} car${count!==1?'s':''} from prior inbound are in SS hold. Cars with 24+ hrs are dwell-protected; others are still aging.`
    },
    {
      id:'prev_no_ss',
      filter:e=>e.isPrevInbound&&!e.isSSCar&&!e.isBO,
      text:count=>`${count} car${count!==1?'s':''} from previous inbound carry no active hold. Full dwell from arrival is counting against the KPI.`
    },
    {
      id:'turned',
      filter:e=>e.arrivedToday,
      text:count=>`${count} car${count!==1?'s':''} from today's inbound are being turned directly. Dwell clock is actively running with no SS protection.`
    },
    {
      id:'crosshaul',
      filter:e=>e.isCrossHaul,
      text:count=>`${count} car${count!==1?'s':''} from non-standard inbound may be prescheduled cross-haul — confirm billing and block assignment.`
    }
  ];

  for(const cat of categories){
    const matches=cars.filter(cat.filter);
    if(matches.length){
      return cat.text(matches.length,matches,g);
    }
  }
  return '';
}
