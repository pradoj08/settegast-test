<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DWELL FORECASTER</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700&family=Inter:wght@400;500;600;700&display=swap');

*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --green:#22c55e; --green-dim:#16a34a; --green-bg:rgba(34,197,94,.1);
  --blue:#3b82f6; --blue-dim:#2563eb;
  --red:#ef4444; --red-bg:rgba(239,68,68,.12);
  --amber:#f59e0b; --amber-bg:rgba(245,158,11,.1);
  --surface:#0f1117; --surface2:#161b27; --surface3:#1e2435;
  --border:rgba(255,255,255,.08); --border-bright:rgba(255,255,255,.15);
  --text:#f1f5f9; --text-dim:#94a3b8; --text-muted:#475569;
  --mono:'JetBrains Mono',monospace; --sans:'Inter',sans-serif;
  --rn-w:48px; --row-h:24px; --hdr-h:32px;
}
body{font-family:var(--sans);font-size:12px;color:var(--text);background:var(--surface);height:100vh;display:flex;flex-direction:column;overflow:hidden;user-select:none;}

/* ── TOPBAR ── */
#topbar{
  height:56px;
  background:linear-gradient(180deg,#161b27 0%, #11151f 100%);
  display:flex;
  align-items:center;
  justify-items:center;
  padding:0 14px;
  gap:10px;
  flex-shrink:0;
  border-bottom:1px solid rgba(255,255,255,.08);
  box-shadow:0 2px 14px rgba(0,0,0,.22);
}

.topbar-actions{
  display:flex;
  align-items:center;
  justify-items:center;
  gap:6px;
  padding:6px;
  border:1px solid rgba(255,255,255,.06);
  border-radius:12px;
  background:rgba(255,255,255,.03);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
#topbar .logo{
  display:flex;align-items:center;margin-right:18px;
  font-family:var(--mono);font-size:14px;font-weight:700;letter-spacing:1px;
  border-right:1px solid var(--border);padding-right:18px;gap:2px;
}
#topbar .logo .l-dwell{color:var(--text);}
#topbar .logo .l-track{color:var(--green);}
#topbar .logo .l-dot{width:5px;height:5px;border-radius:50%;background:var(--green);margin:0 4px;box-shadow:0 0 6px var(--green);flex-shrink:0;}
.tab-pill{
  padding:7px 14px;
  border-radius:10px;
  cursor:pointer;
  font-size:11px;font-weight:600;letter-spacing:.5px;
  color:var(--text-muted);background:transparent;border:none;
  transition:all .15s;font-family:var(--sans);
}
.tab-pill.active{color:var(--text);background:var(--surface3);border:1px solid var(--border-bright);}
.tab-pill:hover:not(.active){color:var(--text-dim);}
#topbar .spacer{flex:1;}
#topbar .dep-group{
  display:flex;
  background:rgba(255,255,255,.03);
  border-radius:12px;
  padding:4px;
  gap:4px;
  border:1px solid rgba(255,255,255,.06);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
.dep-btn{
  padding:5px 14px;border-radius:5px;border:none;
  font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  cursor:pointer;font-family:var(--mono);transition:all .15s;
  color:var(--text-muted);background:transparent;
}
.dep-btn.active{
  background:linear-gradient(180deg,#16a34a,#14532d);
  color:#fff;
  box-shadow:0 0 14px rgba(34,197,94,.35),inset 0 1px 0 rgba(255,255,255,.15);
}
.dep-btn:hover:not(.active){color:var(--text);background:rgba(255,255,255,.05);}
.topbar-btn{
  padding:6px 11px;
  border-radius:9px;
  border:1px solid rgba(255,255,255,.08);
  font-size:9px;
  font-weight:700;
  letter-spacing:.7px;
  text-transform:uppercase;
  cursor:pointer;background:var(--surface3);color:var(--text-dim);
  font-family:var(--mono);transition:all .15s;
  box-shadow:0 1px 3px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.04);
  position:relative;overflow:hidden;
}
.topbar-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.04) 0%,transparent 60%);
  pointer-events:none;border-radius:inherit;
}
.topbar-btn:hover{
  background:var(--surface2);color:var(--text);
  border-color:var(--border-bright);
  box-shadow:0 2px 6px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.07);
  transform:translateY(-1px);
}
.topbar-btn:active{transform:translateY(0);}
.topbar-btn.accent{
  background:linear-gradient(180deg,rgba(34,197,94,.22),rgba(22,163,74,.18));
  border-color:rgba(34,197,94,.4);color:var(--green);
  box-shadow:0 1px 3px rgba(0,0,0,.3),0 0 8px rgba(34,197,94,.1),inset 0 1px 0 rgba(255,255,255,.06);
}
.topbar-btn.accent:hover{
  background:linear-gradient(180deg,rgba(34,197,94,.35),rgba(22,163,74,.28));
  color:#fff;border-color:rgba(34,197,94,.6);
  box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 14px rgba(34,197,94,.2),inset 0 1px 0 rgba(255,255,255,.1);
}



.topbar-btn.freeze-blue{
  width:76px;
  min-width:76px;
  max-width:76px;
  text-align:center;
  padding-left:0;
  padding-right:0;
  background:linear-gradient(180deg,rgba(59,130,246,.24),rgba(37,99,235,.18));
  border-color:rgba(59,130,246,.48);
  color:#93c5fd;
  box-shadow:0 1px 3px rgba(0,0,0,.3),0 0 8px rgba(59,130,246,.12),inset 0 1px 0 rgba(255,255,255,.06);
}
.topbar-btn.freeze-blue:hover{
  background:linear-gradient(180deg,rgba(59,130,246,.38),rgba(37,99,235,.30));
  color:#fff;
  border-color:rgba(59,130,246,.70);
  box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 14px rgba(59,130,246,.22),inset 0 1px 0 rgba(255,255,255,.10);
}


/* Equal-size topbar action buttons */
.topbar-actions .topbar-btn{
  width:94px;
  min-width:94px;
  max-width:94px;
  height:42px;
  min-height:42px;
  padding:0 8px;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  white-space:normal;
  line-height:1.15;
}
.topbar-actions .topbar-btn.freeze-blue{
  width:94px;
  min-width:94px;
  max-width:94px;
  padding:0 8px;
}


/* SS banner button red */
.topbar-actions #btn-ss-banner{
  background:linear-gradient(180deg,rgba(239,68,68,.26),rgba(127,29,29,.22));
  border-color:rgba(239,68,68,.52);
  color:#fecaca;
  box-shadow:0 1px 3px rgba(0,0,0,.3),0 0 8px rgba(239,68,68,.13),inset 0 1px 0 rgba(255,255,255,.06);
}
.topbar-actions #btn-ss-banner:hover{
  background:linear-gradient(180deg,rgba(239,68,68,.42),rgba(127,29,29,.34));
  color:#fff;
  border-color:rgba(239,68,68,.74);
  box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 14px rgba(239,68,68,.24),inset 0 1px 0 rgba(255,255,255,.10);
}
.topbar-actions #btn-ss-banner.active-toggle{
  background:linear-gradient(180deg,rgba(239,68,68,.48),rgba(127,29,29,.40));
  border-color:rgba(239,68,68,.82);
  color:#fff;
}

#toggle-bowl-turnover.active-toggle{
  border-color:rgba(59,130,246,.45);
  background:rgba(59,130,246,.16);
  color:#93c5fd;
}


/* Freeze stays blue in both Freeze and Unfreeze states */
.topbar-actions #btn-freeze-ob,
.topbar-actions #btn-freeze-ob.warn,
.topbar-actions #btn-freeze-ob.active-toggle{
  background:linear-gradient(180deg,rgba(59,130,246,.28),rgba(37,99,235,.22));
  border-color:rgba(59,130,246,.58);
  color:#bfdbfe;
  box-shadow:0 1px 3px rgba(0,0,0,.3),0 0 8px rgba(59,130,246,.14),inset 0 1px 0 rgba(255,255,255,.06);
}
.topbar-actions #btn-freeze-ob:hover,
.topbar-actions #btn-freeze-ob.warn:hover,
.topbar-actions #btn-freeze-ob.active-toggle:hover{
  background:linear-gradient(180deg,rgba(59,130,246,.44),rgba(37,99,235,.34));
  color:#fff;
  border-color:rgba(59,130,246,.78);
  box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 14px rgba(59,130,246,.24),inset 0 1px 0 rgba(255,255,255,.10);
}

/* Bowl Turnover button yellow in both show/hide states */
.topbar-actions #toggle-bowl-turnover,
.topbar-actions #toggle-bowl-turnover.active-toggle{
  background:linear-gradient(180deg,rgba(245,158,11,.28),rgba(146,64,14,.23));
  border-color:rgba(245,158,11,.58);
  color:#fde68a;
  box-shadow:0 1px 3px rgba(0,0,0,.3),0 0 8px rgba(245,158,11,.14),inset 0 1px 0 rgba(255,255,255,.06);
}
.topbar-actions #toggle-bowl-turnover:hover,
.topbar-actions #toggle-bowl-turnover.active-toggle:hover{
  background:linear-gradient(180deg,rgba(245,158,11,.44),rgba(146,64,14,.35));
  color:#fff;
  border-color:rgba(245,158,11,.78);
  box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 14px rgba(245,158,11,.24),inset 0 1px 0 rgba(255,255,255,.10);
}

/* ── MAIN ── */
#content-scale{
  flex:1;
  min-height:0;
  display:flex;
  flex-direction:column;
  transform-origin:top left;
  will-change:transform;
}

#main{flex:1;overflow:hidden;display:flex;flex-direction:column;}

#ss-banner-wrap{
  flex-shrink:0;
  display:flex;
  align-items:stretch;
  gap:0;
  padding:10px 14px;
  background:linear-gradient(180deg, rgba(18,22,33,.96), rgba(14,17,24,.98));
  border-bottom:1px solid rgba(255,255,255,.08);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
#ss-banner-wrap.hidden{display:none;}
#ss-banner-label{display:none!important;}
#ss-banner-label{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  justify-content:center;
  min-width:118px;
  padding:8px 12px;
  border-radius:10px;
  border:1px solid rgba(251,191,36,.22);
  background:rgba(251,191,36,.08);
  color:#fde68a;
  font-family:var(--mono);
  font-size:10px;
  font-weight:800;
  letter-spacing:2px;
  text-transform:uppercase;
  white-space:nowrap;
}
#ss-banner-cards{
  flex:1;
  display:flex;
  gap:8px;
  overflow-x:auto;
  padding-bottom:1px;
}
#ss-banner-cards::-webkit-scrollbar{height:7px;}
#ss-banner-cards::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:999px;}

.ss-alert-card{
  flex:0 0 auto;
  min-width:245px;
  border-radius:12px;
  padding:10px 11px 9px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  box-shadow:0 6px 18px rgba(0,0,0,.16), inset 0 1px 0 rgba(255,255,255,.03);
}
.ss-alert-card.green{border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.06);}
.ss-alert-card.yellow{border-color:rgba(245,158,11,.28);background:rgba(245,158,11,.08);}
.ss-alert-card.red{border-color:rgba(239,68,68,.30);background:rgba(239,68,68,.08);}
.ss-alert-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:10px;
}
.ss-alert-track{
  font-family:var(--mono);
  font-size:13px;
  font-weight:800;
  color:var(--text);
  letter-spacing:.2px;
  white-space:nowrap;
}
.ss-alert-card.green .ss-alert-track{color:#86efac;}
.ss-alert-card.yellow .ss-alert-track{color:#fcd34d;}
.ss-alert-card.red .ss-alert-track{color:#fecaca;}
.ss-alert-badge{
  flex:0 0 auto;
  font-family:var(--mono);
  font-size:8px;
  font-weight:800;
  letter-spacing:1px;
  text-transform:uppercase;
  padding:2px 6px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.1);
  color:var(--text-muted);
  background:rgba(255,255,255,.03);
}
.ss-alert-card.green .ss-alert-badge{color:#86efac;border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.10);}
.ss-alert-card.yellow .ss-alert-badge{color:#fde68a;border-color:rgba(245,158,11,.28);background:rgba(245,158,11,.12);}
.ss-alert-card.red .ss-alert-badge{color:#fecaca;border-color:rgba(239,68,68,.28);background:rgba(239,68,68,.12);}
.ss-alert-train{
  margin-top:3px;
  font-family:var(--sans);
  font-size:12px;
  font-weight:600;
  color:var(--text-dim);
  overflow:hidden;
  text-overflow:ellipsis;
  white-space:nowrap;
}
.ss-alert-meta{
  margin-top:8px;
  display:grid;
  grid-template-columns:repeat(3,minmax(0,1fr));
  gap:6px;
}
.ss-alert-mini{
  border-radius:9px;
  padding:6px 7px 5px;
  border:1px solid rgba(255,255,255,.06);
  background:rgba(255,255,255,.03);
}
.ss-alert-mini .k{
  display:block;
  font-family:var(--mono);
  font-size:7px;
  letter-spacing:1.1px;
  text-transform:uppercase;
  color:var(--text-muted);
}
.ss-alert-mini .v{
  display:block;
  margin-top:3px;
  font-family:var(--mono);
  font-size:12px;
  font-weight:800;
  color:var(--text);
  font-variant-numeric:tabular-nums;
}
.ss-alert-card.green .ss-alert-mini .v{color:#86efac;}
.ss-alert-card.yellow .ss-alert-mini .v{color:#fde68a;}
.ss-alert-card.red .ss-alert-mini .v{color:#fecaca;}

.topbar-btn.active-toggle{
  border-color:rgba(251,191,36,.38);
  background:rgba(251,191,36,.14);
  color:#fde68a;
}
.topbar-btn.active-toggle:hover{
  background:rgba(251,191,36,.20);
  color:#fff;
}
.tab-view{display:none;flex:1;min-height:0;flex-direction:column;overflow:hidden;}
.tab-view.active{display:flex;}

/* ── INPUT TOOLBAR ── */
#input-bar{background:var(--surface2);border-bottom:1px solid var(--border);padding:6px 14px;display:flex;align-items:center;gap:5px;flex-shrink:0;}
.ibar-sep{width:1px;height:16px;background:var(--border);margin:0 2px;flex-shrink:0;}
.ibar-btn{
  padding:5px 13px;border-radius:6px;cursor:pointer;
  font-size:10px;font-weight:600;letter-spacing:.5px;text-transform:uppercase;
  background:var(--surface3);color:var(--text-dim);
  border:1px solid var(--border);
  transition:all .15s;font-family:var(--mono);
  box-shadow:0 1px 3px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.04);
  position:relative;overflow:hidden;
}
.ibar-btn::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(255,255,255,.04) 0%,transparent 60%);
  pointer-events:none;border-radius:inherit;
}
.ibar-btn:hover{
  background:var(--surface2);color:var(--text);
  border-color:var(--border-bright);
  box-shadow:0 2px 6px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.07);
  transform:translateY(-1px);
}
.ibar-btn:active{transform:translateY(0);}
.ibar-btn.green{
  background:linear-gradient(180deg,rgba(34,197,94,.22),rgba(22,163,74,.18));
  color:var(--green);border-color:rgba(34,197,94,.4);
  box-shadow:0 1px 3px rgba(0,0,0,.3),0 0 8px rgba(34,197,94,.1),inset 0 1px 0 rgba(255,255,255,.06);
}
.ibar-btn.green:hover{
  background:linear-gradient(180deg,rgba(34,197,94,.35),rgba(22,163,74,.28));
  color:#fff;border-color:rgba(34,197,94,.6);
  box-shadow:0 2px 8px rgba(0,0,0,.4),0 0 14px rgba(34,197,94,.2),inset 0 1px 0 rgba(255,255,255,.1);
}
#ibar-hint{margin-left:8px;font-size:9px;letter-spacing:.3px;color:var(--text-muted);font-family:var(--mono);}

/* ── GRID ── */
#grid-wrap{flex:1;overflow:hidden;position:relative;background:var(--surface);}
#grid-scroll{position:absolute;inset:0;overflow:auto;}
#grid-scroll::-webkit-scrollbar{width:8px;height:8px;}
#grid-scroll::-webkit-scrollbar-track{background:var(--surface);}
#grid-scroll::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px;}
#grid-scroll::-webkit-scrollbar-thumb:hover{background:#2e3a4e;}
#col-hdr{display:flex;position:sticky;top:0;z-index:10;background:var(--surface2);}
.rn-hdr{width:var(--rn-w);min-width:var(--rn-w);height:var(--hdr-h);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--text-muted);border-right:1px solid var(--border);flex-shrink:0;font-family:var(--mono);}
.ch{height:var(--hdr-h);display:flex;align-items:center;justify-content:center;padding:0 6px;font-size:10px;font-weight:600;letter-spacing:.5px;color:var(--text-dim);text-transform:uppercase;border-right:1px solid var(--border);flex-shrink:0;white-space:nowrap;cursor:default;font-family:var(--mono);}
#grid-body{position:relative;width:100%;max-width:100%;overflow:hidden;}
.g-row{display:flex;position:absolute;left:0;}
.rn-cell{width:var(--rn-w);min-width:var(--rn-w);height:var(--row-h);display:flex;align-items:center;justify-content:flex-end;padding-right:8px;font-size:9px;color:var(--text-muted);background:var(--surface2);border-right:1px solid var(--border);border-bottom:1px solid rgba(255,255,255,.03);flex-shrink:0;font-family:var(--mono);}
.cell{height:var(--row-h);display:flex;align-items:center;padding:0 7px;border-right:1px solid rgba(255,255,255,.04);border-bottom:1px solid rgba(255,255,255,.03);background:var(--surface);overflow:hidden;flex-shrink:0;cursor:cell;font-size:11px;color:var(--text);font-family:var(--mono);}
.cell:nth-child(even){background:var(--surface2);}
.cell span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;width:100%;}
.cell.sel{outline:none;box-shadow:inset 0 0 0 2px var(--green);z-index:2;background:var(--green-bg)!important;color:#fff;}
.cell.rng{background:rgba(34,197,94,.05)!important;}
#ceditor{display:none;position:fixed;z-index:50;background:var(--surface2);border:2px solid var(--green);padding:0 7px;font-size:11px;font-family:var(--mono);color:var(--text);outline:none;resize:none;overflow:hidden;}

/* ── OUTBOUND ── */
#ob-frozen{
  flex-shrink:0;
  background:var(--surface);
  border-bottom:2px solid rgba(251,191,36,.25);
  z-index:20;
  overflow:visible;
}
#ob-frozen.hidden{display:none;}
.topbar-btn.warn{
  background:linear-gradient(180deg,rgba(245,158,11,.18),rgba(180,83,9,.15));
  border-color:rgba(245,158,11,.35);
  color:#fbbf24;
}
.topbar-btn.warn:hover{
  background:linear-gradient(180deg,rgba(245,158,11,.28),rgba(180,83,9,.22));
  color:#fff;
}
#ob-frozen .consist-wrap{
  position:static;
  border-bottom:none;
}
#ob-frozen .ob-tbl-wrap{overflow-x:auto;}
#ob-frozen .ob-tbl{width:100%;border-collapse:collapse;}
/* OUTBOUND (green) frozen header */
/* Frozen mode: lock only the top Current Ramp Blocking table */
#ob-frozen .bowl-page-shell{margin:0;}
#ob-frozen .bowl-inline-shell{margin:0!important;}
#ob-frozen .bowl-board{margin:0!important;}
#ob-frozen .bowl-after-title{display:none!important;}


#ob-view{flex:1;min-height:0;overflow-y:auto;overflow-x:auto;background:var(--surface);}
#ob-view::-webkit-scrollbar{width:8px;height:8px;}
#ob-view::-webkit-scrollbar-track{background:var(--surface);}
#ob-view::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:4px;}

/* ── PANEL SHELL ── */
.ob-panel{margin:16px 16px 0;border-radius:10px;overflow:hidden;box-shadow:0 4px 24px rgba(0,0,0,.4);border:1px solid var(--border);}

.ob-panel.sel-panel{margin-top:12px;margin-bottom:16px;border:1px solid rgba(251,191,36,.3);box-shadow:0 4px 24px rgba(0,0,0,.4),0 0 0 1px rgba(251,191,36,.15);}

/* Train-specific consist panel backgrounds */
.ob-panel.sel-panel.ihosa-consist-panel{
  border-color:rgba(34,197,94,.42);
  background:linear-gradient(180deg, rgba(10,35,22,.72), rgba(7,20,14,.96));
  box-shadow:0 4px 24px rgba(0,0,0,.42),0 0 0 1px rgba(34,197,94,.18),0 0 24px rgba(34,197,94,.08);
}
.ob-panel.sel-panel.mhoas-consist-panel{
  border-color:rgba(59,130,246,.44);
  background:linear-gradient(180deg, rgba(10,24,50,.72), rgba(7,14,28,.96));
  box-shadow:0 4px 24px rgba(0,0,0,.42),0 0 0 1px rgba(59,130,246,.18),0 0 24px rgba(59,130,246,.08);
}
.ob-panel.sel-panel.ihosa-consist-panel .sel-banner{
  background:linear-gradient(135deg,#052e16 0%,#064e3b 52%,#052e16 100%);
  border-bottom-color:#22c55e;
  box-shadow:inset 0 1px 0 rgba(134,239,172,.16),0 8px 22px rgba(34,197,94,.08);
}
.ob-panel.sel-panel.mhoas-consist-panel .sel-banner{
  background:linear-gradient(135deg,#082f49 0%,#1d4ed8 52%,#0b1f3a 100%);
  border-bottom-color:#3b82f6;
  box-shadow:inset 0 1px 0 rgba(147,197,253,.16),0 8px 22px rgba(59,130,246,.08);
}
.ob-panel.sel-panel.ihosa-consist-panel .banner-label,
.ob-panel.sel-panel.ihosa-consist-panel .banner-dep-val,
.ob-panel.sel-panel.ihosa-consist-panel .banner-stat-val{
  color:#bbf7d0;
  text-shadow:0 0 12px rgba(34,197,94,.26);
}
.ob-panel.sel-panel.mhoas-consist-panel .banner-label,
.ob-panel.sel-panel.mhoas-consist-panel .banner-dep-val,
.ob-panel.sel-panel.mhoas-consist-panel .banner-stat-val{
  color:#dbeafe;
  text-shadow:0 0 12px rgba(59,130,246,.26);
}
.ob-panel.sel-panel.ihosa-consist-panel .ob-tbl-wrap{
  background:linear-gradient(180deg,rgba(6,78,59,.20),rgba(8,18,14,.96));
}
.ob-panel.sel-panel.mhoas-consist-panel .ob-tbl-wrap{
  background:linear-gradient(180deg,rgba(29,78,216,.18),rgba(8,15,28,.96));
}
.ob-panel.sel-panel.ihosa-consist-panel .ob-tbl thead tr,
.ob-panel.sel-panel.ihosa-consist-panel .ob-tbl th{
  background:linear-gradient(135deg,#064e3b,#052e16);
  color:#86efac;
  border-bottom-color:rgba(34,197,94,.32);
}
.ob-panel.sel-panel.mhoas-consist-panel .ob-tbl thead tr,
.ob-panel.sel-panel.mhoas-consist-panel .ob-tbl th{
  background:linear-gradient(135deg,#1e3a8a,#0f172a);
  color:#93c5fd;
  border-bottom-color:rgba(59,130,246,.32);
}
.ob-panel.sel-panel.ihosa-consist-panel .ob-tbl tbody tr:hover td{background:rgba(34,197,94,.08)!important;}
.ob-panel.sel-panel.mhoas-consist-panel .ob-tbl tbody tr:hover td{background:rgba(59,130,246,.08)!important;}


/* ── BANNER ── */
.ob-banner{display:flex;align-items:center;min-height:58px;padding:0 20px;position:relative;}
.ob-banner.full-banner{background:var(--surface2);border-bottom:2px solid var(--green-dim);}
.ob-banner.sel-banner{background:linear-gradient(135deg,#1a1506 0%,#1c1a08 50%,#161410 100%);border-bottom:2px solid #b45309;box-shadow:inset 0 1px 0 rgba(251,191,36,.08);}
.banner-accent{display:none;}
.banner-main{display:flex;align-items:center;flex:1;gap:0;min-width:0;}
.banner-label{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:3px;color:var(--text-dim);text-transform:uppercase;padding-right:20px;border-right:1px solid var(--border);margin-right:20px;}
.full-banner .banner-label{color:var(--green);}
.sel-banner .banner-label{color:#fbbf24;text-shadow:0 0 12px rgba(251,191,36,.4);}
.banner-dep{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;min-width:128px;text-align:center;}
.banner-dep-label{font-size:9px;font-weight:700;letter-spacing:2px;color:var(--text-muted);font-family:var(--mono);text-transform:uppercase;text-align:center;}
.banner-dep-val{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--text);text-align:center;line-height:1.2;white-space:nowrap;}
.banner-spacer{flex:1;}
.banner-stat{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:0 20px;border-left:1px solid var(--border);text-align:center;}
.banner-stat-label{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--text-muted);font-family:var(--mono);text-transform:uppercase;margin-bottom:1px;}
.banner-stat-val{font-family:var(--mono);font-size:15px;font-weight:700;color:var(--text);}
.banner-avg{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  padding-left:14px;
  border-left:1px solid rgba(255,255,255,.10);
  margin-left:auto;
  flex-wrap:wrap;
}

.metric-card{
  min-width:88px;
  padding:6px 9px 5px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,.10), transparent 38%),
    linear-gradient(180deg, rgba(22,27,39,.96), rgba(12,15,22,.99));
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  box-shadow:
    0 10px 24px rgba(0,0,0,.22),
    inset 0 1px 0 rgba(255,255,255,.05);
  backdrop-filter:blur(8px);
  position:relative;
  overflow:hidden;
}

.metric-card::before{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(180deg, rgba(255,255,255,.04), transparent 55%);
  pointer-events:none;
}

.metric-card.weighted{
  border-color:rgba(251,191,36,.22);
  background:
    radial-gradient(circle at 50% 0%, rgba(251,191,36,.10), transparent 42%),
    linear-gradient(180deg, rgba(36,28,8,.88), rgba(16,14,8,.97));
  box-shadow:
    0 10px 24px rgba(0,0,0,.24),
    0 0 0 1px rgba(251,191,36,.08),
    inset 0 1px 0 rgba(255,255,255,.05);
}

.metric-card.simple{
  border-color:rgba(59,130,246,.18);
  background:
    radial-gradient(circle at 50% 0%, rgba(59,130,246,.10), transparent 42%),
    linear-gradient(180deg, rgba(10,18,35,.92), rgba(10,14,24,.97));
  box-shadow:
    0 10px 24px rgba(0,0,0,.22),
    0 0 0 1px rgba(59,130,246,.06),
    inset 0 1px 0 rgba(255,255,255,.05);
}

.metric-label{
  font-size:6px;
  font-weight:800;
  letter-spacing:2.2px;
  color:var(--text-muted);
  font-family:var(--mono);
  text-transform:uppercase;
  margin-bottom:3px;
}

.metric-value{
  font-family:var(--mono);
  font-size:14px;
  font-weight:800;
  line-height:1;
  letter-spacing:0;
  white-space:nowrap;
  font-variant-numeric:tabular-nums;
}

.metric-card.weighted .metric-value{color:#fde68a;text-shadow:0 0 12px rgba(251,191,36,.30);}
.metric-card.simple .metric-value{color:#93c5fd;text-shadow:0 0 12px rgba(59,130,246,.18);}

.metric-unit{
  margin-top:3px;
  font-size:6px;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--text-muted);
  font-family:var(--mono);
  text-align:center;
}

.metric-value.na{
  color:var(--text-muted);
  font-size:13px;
}

.projected-dwell-strip{
  margin:14px 16px 0;
  padding:12px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:14px;
  background:linear-gradient(180deg,rgba(22,27,39,.96),rgba(10,13,20,.98));
  box-shadow:0 14px 32px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.05);
}
.projected-dwell-head{
  display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:10px;
}
.projected-dwell-title{
  font-family:var(--mono);font-size:10px;font-weight:900;letter-spacing:2px;text-transform:uppercase;color:#e2e8f0;
}
.projected-dwell-sub{
  font-family:var(--mono);font-size:8px;font-weight:800;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);
}
.projected-dwell-sections{
  display:grid;
  grid-template-columns:repeat(2,minmax(260px,1fr));
  gap:12px;
}
.projected-dwell-section{
  border:1px solid rgba(255,255,255,.07);
  border-radius:13px;
  background:rgba(255,255,255,.025);
  padding:10px;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
.projected-dwell-section-title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:9px;
  font-family:var(--mono);
  font-size:9px;
  font-weight:900;
  letter-spacing:1.7px;
  text-transform:uppercase;
  color:#cbd5e1;
}
.projected-dwell-section-title span:last-child{
  color:var(--text-muted);
  font-size:7px;
  letter-spacing:1px;
}
.projected-dwell-grid{
  display:grid;grid-template-columns:repeat(2,minmax(130px,1fr));gap:10px;
}
.projected-dwell-card{
  border-radius:14px;padding:10px 11px;border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.035);box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
  position:relative;overflow:hidden;
}
.projected-dwell-card::before{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.05),transparent 60%);pointer-events:none;}
.projected-dwell-card.good{border-color:rgba(34,197,94,.38);background:rgba(34,197,94,.10);}
.projected-dwell-card.risk{border-color:rgba(239,68,68,.42);background:rgba(239,68,68,.12);}
.projected-dwell-card.na{border-color:rgba(148,163,184,.18);background:rgba(148,163,184,.05);}
.projected-dwell-card .pd-top{display:flex;align-items:center;justify-content:space-between;gap:8px;position:relative;}
.projected-dwell-card .pd-train{font-family:var(--mono);font-size:11px;font-weight:900;letter-spacing:1.4px;color:var(--text);}
.projected-dwell-card .pd-day{font-family:var(--mono);font-size:8px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);}
.projected-dwell-card .pd-value{margin-top:7px;font-family:var(--mono);font-size:22px;font-weight:900;line-height:1;color:var(--text);font-variant-numeric:tabular-nums;position:relative;}
.projected-dwell-card.good .pd-value{color:#86efac;text-shadow:0 0 14px rgba(34,197,94,.26);}
.projected-dwell-card.risk .pd-value{color:#fca5a5;text-shadow:0 0 14px rgba(239,68,68,.28);}
.projected-dwell-card.na .pd-value{color:var(--text-muted);}
.projected-dwell-card .pd-meta{margin-top:6px;font-family:var(--mono);font-size:8px;font-weight:800;letter-spacing:.6px;text-transform:uppercase;color:var(--text-muted);position:relative;}
.projected-dwell-card .pd-badge{padding:2px 7px;border-radius:999px;border:1px solid rgba(255,255,255,.1);background:rgba(255,255,255,.04);font-family:var(--mono);font-size:7px;font-weight:900;letter-spacing:1px;text-transform:uppercase;}
.projected-dwell-card.good .pd-badge{color:#86efac;border-color:rgba(34,197,94,.30);background:rgba(34,197,94,.10);}
.projected-dwell-card.risk .pd-badge{color:#fecaca;border-color:rgba(239,68,68,.32);background:rgba(239,68,68,.12);}
.projected-dwell-card.na .pd-badge{color:var(--text-muted);}
.projected-dwell-card summary{list-style:none;cursor:pointer;position:relative;outline:none;}
.projected-dwell-card summary::-webkit-details-marker{display:none;}
.projected-dwell-card summary:focus-visible{box-shadow:0 0 0 2px rgba(59,130,246,.55);border-radius:10px;}
.projected-dwell-card .pd-click{margin-top:6px;font-family:var(--mono);font-size:7px;font-weight:900;letter-spacing:1.2px;text-transform:uppercase;color:rgba(226,232,240,.42);position:relative;}
.projected-dwell-card[open] .pd-click{color:#e2e8f0;}
.pd-car-list{margin-top:10px;padding-top:9px;border-top:1px dashed rgba(255,255,255,.13);display:flex;flex-direction:column;gap:6px;position:relative;}
.pd-car-row{display:grid;grid-template-columns:minmax(92px,1.2fr) 54px 54px 66px;gap:6px;align-items:center;padding:6px 7px;border-radius:10px;border:1px solid rgba(255,255,255,.07);background:rgba(0,0,0,.16);font-family:var(--mono);font-size:9px;color:#cbd5e1;}
.pd-car-row .pd-car-id{font-weight:900;color:#f8fafc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.pd-car-row .pd-car-meta{text-align:center;color:var(--text-muted);font-weight:800;}
.pd-car-row .pd-car-net{text-align:right;font-weight:900;color:#e2e8f0;font-variant-numeric:tabular-nums;}
.projected-dwell-card.good .pd-car-row .pd-car-net{color:#86efac;}
.projected-dwell-card.risk .pd-car-row .pd-car-net{color:#fecaca;}
.pd-car-empty{padding:8px;border-radius:10px;border:1px solid rgba(255,255,255,.07);background:rgba(0,0,0,.14);font-family:var(--mono);font-size:9px;color:var(--text-muted);text-align:center;}
#topbar .topbar-actions #btn-projected-dwell{border-color:rgba(34,197,94,.28)!important;color:#bbf7d0!important;}
#topbar .topbar-actions #btn-projected-dwell.active-toggle{background:linear-gradient(180deg,rgba(34,197,94,.32),rgba(22,101,52,.26));border-color:rgba(34,197,94,.62)!important;color:#fff!important;}
@media (max-width: 1100px){
  .projected-dwell-sections{grid-template-columns:1fr;}
}
@media (max-width: 620px){
  .projected-dwell-grid{grid-template-columns:1fr;}
}

@media (max-width: 1100px){
  .ob-banner{flex-wrap:wrap;padding:11px 14px;gap:8px;}
  .banner-main{width:100%;order:0;justify-content:center;}
  .banner-stat{padding:0 12px;}
  .banner-avg{width:100%;margin-left:0;padding-left:0;border-left:none;justify-content:center;}
  .metric-card{min-width:84px;}
}

/* ── TABLE CONTAINER ── */
.ob-tbl-wrap{background:var(--surface2);overflow-x:auto;overflow-y:visible;}
.ob-tbl-wrap::-webkit-scrollbar{height:6px;}
.ob-tbl-wrap::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px;}

/* ── TABLE ── */
.ob-tbl{width:100%;border-collapse:collapse;font-size:12px;}
.ob-tbl thead tr{background:var(--surface3);}.ob-panel.sel-panel .ob-tbl thead tr{background:linear-gradient(135deg,#1c1a08,#161410);}
.ob-tbl th{padding:8px 12px;font-size:10px;font-weight:700;letter-spacing:.8px;text-align:center;white-space:nowrap;color:var(--text-dim);border-bottom:1px solid var(--border-bright);border-right:1px solid var(--border);font-family:var(--mono);text-transform:uppercase;background:var(--surface3);}.ob-panel.sel-panel .ob-tbl th{border-bottom:1px solid rgba(251,191,36,.2);color:#d4a017;background:linear-gradient(135deg,#1c1a08,#161410);}.ob-panel.sel-panel .ob-tbl th{border-bottom:1px solid rgba(251,191,36,.2);color:#d4a017;}
.ob-tbl tbody tr{transition:background .1s;}
.ob-tbl tbody tr.track-break td{border-top:2px solid rgba(255,255,255,.12) !important;}
.ob-tbl tbody tr:hover td{background:rgba(255,255,255,.03)!important;}

.ob-tbl td{padding:7px 12px;text-align:center;font-size:11px;font-family:var(--mono);color:var(--text-dim);white-space:nowrap;border-right:1px solid var(--border);}
.ob-tbl td.td-train{text-align:left;font-family:var(--sans);font-size:12px;font-weight:600;color:var(--text);padding-left:14px;min-width:180px;}
.ob-tbl td.td-train.warn{color:var(--amber);}
/* Train-family text accents only (row backgrounds stay uniform) */
.ob-tbl tbody tr.ss-zlbho td.td-train{
  color:#93c5fd!important;
}
.ob-panel.sel-panel .ob-panel.sel-panel .ob-tbl tbody tr.ss-zlbho td.td-train{
  color:#93c5fd!important;
}

.td-train-wrap{display:flex;flex-direction:column;gap:2px;}
.td-train-ss-note{font-size:8px;letter-spacing:.6px;color:#a78bfa;font-family:var(--mono);font-weight:700;white-space:nowrap;}
.ob-tbl td.td-arr{color:var(--text-dim);font-size:11px;}
.ob-tbl td.td-arr.miss{color:var(--red);font-weight:600;}
.ob-tbl td.td-arr.unconfirmed{color:var(--amber);}
.arr-unconfirmed-wrap{display:flex;flex-direction:column;align-items:center;gap:1px;}
.arr-unconfirmed-note{font-size:8px;letter-spacing:.5px;color:var(--amber);font-family:var(--mono);}
.ob-tbl td.td-dep{color:var(--text-muted);font-size:11px;}
.ob-tbl td.td-ft{color:var(--text-dim);}

/* dwell pills */
.dw-cell{border-radius:5px;font-weight:700;font-size:12px;padding:3px 10px;display:inline-block;min-width:54px;text-align:center;letter-spacing:.3px;}
.dw-red .dw-cell{background:rgba(239,68,68,.18);color:#fca5a5;border:1px solid rgba(239,68,68,.35);}
.dw-yel .dw-cell{background:rgba(245,158,11,.18);color:#fcd34d;border:1px solid rgba(245,158,11,.35);}
.dw-grn .dw-cell{background:rgba(34,197,94,.15);color:#86efac;border:1px solid rgba(34,197,94,.3);}
.dw-na .dw-cell{background:var(--surface3);color:var(--text-muted);border:1px solid var(--border);}

/* train avg */
.td-tavg{font-family:var(--mono);font-size:16px;font-weight:800;color:var(--green);}.sel-panel .td-tavg{color:#fbbf24;text-shadow:0 0 8px rgba(251,191,36,.3);}
.sel-panel .td-tavg{color:var(--blue);}
.td-tavg-empty{color:transparent;}

/* ss columns */
.td-ss{color:var(--text-muted);font-size:11px;}
.td-sst{font-family:var(--mono);font-size:12px;font-weight:800;}
.sst-pill{
  display:inline-block;
  min-width:54px;
  padding:3px 10px;
  border-radius:5px;
  text-align:center;
  font-variant-numeric:tabular-nums;
  letter-spacing:.3px;
  border:1px solid var(--border);
}
.sst-na .sst-pill{background:var(--surface3);color:var(--text-muted);}
.sst-green .sst-pill{background:rgba(34,197,94,.16);color:#86efac;border-color:rgba(34,197,94,.34);box-shadow:0 0 12px rgba(34,197,94,.08);}
.sst-amber .sst-pill{background:rgba(245,158,11,.18);color:#fde68a;border-color:rgba(245,158,11,.34);box-shadow:0 0 12px rgba(245,158,11,.08);}
.sst-red .sst-pill{background:rgba(239,68,68,.18);color:#fecaca;border-color:rgba(239,68,68,.34);box-shadow:0 0 12px rgba(239,68,68,.08);}

.a2s-na{color:var(--text-muted)!important;}
.a2s-green{color:#86efac!important;font-weight:700!important;}
.a2s-yellow{color:#fcd34d!important;font-weight:700!important;}
.a2s-red{color:#fca5a5!important;font-weight:700!important;}

/* ZPBHO accent (light pink instead of red) */
.ob-panel.sel-panel 
.ss-pill{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 9px;border-radius:20px;cursor:pointer;
  font-family:var(--mono);font-size:10px;font-weight:600;
  transition:all .15s;white-space:nowrap;
  border:1px solid var(--border);background:var(--surface3);color:var(--text-muted);
}
.ss-pill:hover{border-color:rgba(245,158,11,.5);background:rgba(245,158,11,.08);color:var(--amber);}
.ss-pill.has-val{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.4);color:#f59e0b;}
.ss-pill.auto-detected{background:rgba(253,230,138,.08);border-color:rgba(253,230,138,.4);color:#fde68a;}
.ss-pill.editing{background:rgba(245,158,11,.08);border-color:var(--amber);border-radius:6px;gap:0;}
.ss-pill-input{
  background:transparent;border:none;outline:none;
  font-family:var(--mono);font-size:10px;color:var(--amber);
  width:120px;padding:0 2px;
}
.ss-pill-input::placeholder{color:var(--text-muted);}
.ss-auto-badge{display:inline-block;font-size:8px;font-weight:700;letter-spacing:1px;background:rgba(245,158,11,.2);color:var(--amber);border:1px solid rgba(245,158,11,.35);border-radius:3px;padding:1px 4px;margin-left:4px;vertical-align:middle;font-family:var(--mono);}

/* expand toggle */
.td-expand-btn{width:20px;height:20px;border-radius:4px;border:1px solid var(--border);background:var(--surface3);color:var(--text-muted);cursor:pointer;font-size:11px;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;font-family:var(--mono);}
.td-expand-btn:hover{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.td-expand-btn.open{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.td-train-inner{display:flex;align-items:center;gap:8px;}

/* expanded rows */
.exp-row td{background:rgba(15,17,23,.9)!important;border-bottom:1px solid var(--border)!important;padding:0!important;font-size:10px!important;}
.exp-row:last-child td{border-bottom:2px solid rgba(34,197,94,.15)!important;}
.exp-row.hidden{display:none;}.exp-hdr.hidden{display:none;}.exp-total-row.hidden{display:none;}
.exp-hdr td{background:var(--surface)!important;font-size:9px!important;letter-spacing:1px!important;color:var(--text-muted)!important;text-transform:uppercase;padding:0!important;border-bottom:1px solid var(--border)!important;}
.exp-car-id{color:var(--text)!important;font-weight:600!important;text-align:left!important;}
.exp-car-row-excluded td{opacity:.35!important;}
.exp-row.row-selected td{background:rgba(59,130,246,.1)!important;}
/* outbound assignment highlighting */
.exp-row.row-sa-ihosa td,.exp-row.row-sa-mhoas td{opacity:1!important;}
.exp-row.row-sa-ihosa.exp-car-row-excluded td,.exp-row.row-sa-mhoas.exp-car-row-excluded td{opacity:1!important;}

/* IHOSA = green SA, MHOAS = blue AS */
.exp-row.row-sa-ihosa td{background:rgba(34,197,94,.18)!important;border-color:rgba(34,197,94,.34)!important;}
.exp-row.row-sa-mhoas td{background:rgba(59,130,246,.18)!important;border-color:rgba(59,130,246,.34)!important;}
.exp-row.row-sa-ihosa .exp-car-id{color:#bbf7d0!important;}
.exp-row.row-sa-mhoas .exp-car-id{color:#bfdbfe!important;}
.cp-car-row.sa-ihosa{background:linear-gradient(90deg,rgba(34,197,94,.24) 0%,rgba(12,24,17,.60) 100%)!important;border-left-color:#22c55e!important;box-shadow:inset 4px 0 14px rgba(34,197,94,.18)!important;}
.cp-car-row.sa-mhoas{background:linear-gradient(90deg,rgba(59,130,246,.24) 0%,rgba(12,18,30,.58) 100%)!important;border-left-color:#3b82f6!important;box-shadow:inset 4px 0 14px rgba(59,130,246,.18)!important;}
.cp-car-row.sa-ihosa .cp-car-id{color:#bbf7d0!important;}
.cp-car-row.sa-mhoas .cp-car-id{color:#bfdbfe!important;}

.exp-car-chk{width:14px;height:14px;cursor:pointer;accent-color:var(--green);flex-shrink:0;}

.exp-row.row-sa-mhoas .exp-car-chk,.cp-car-row.sa-mhoas .cp-car-chk{accent-color:#3b82f6!important;}
.exp-copy-btn{opacity:0;width:20px;height:18px;border-radius:3px;border:1px solid var(--border);background:var(--surface3);color:var(--text-muted);cursor:pointer;font-size:9px;display:inline-flex;align-items:center;justify-content:center;transition:all .15s;vertical-align:middle;margin-left:4px;font-family:var(--mono);}
.exp-inner-row:hover .exp-copy-btn{opacity:1;}
.exp-copy-btn:hover{background:var(--green-bg);border-color:var(--green);color:var(--green);}
.exp-copy-btn.copied{background:var(--green-bg);border-color:var(--green);color:var(--green);opacity:1;}
.exp-num{color:var(--text-dim)!important;text-align:right!important;}
.exp-bk{color:var(--green)!important;font-weight:600!important;}
.exp-bk-flag{
  display:inline-flex;align-items:center;gap:4px;
}
.exp-bk-flag .flag-icon{
  font-size:9px;color:#a78bfa;flex-shrink:0;

}
.exp-bk-trigger{color:#c4b5fd!important;font-weight:700!important;}
.sa-flag{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  margin-left:6px;
  padding:1px 5px;
  border-radius:999px;
  border:1px solid rgba(245,158,11,.32);
  background:rgba(245,158,11,.12);
  color:#fde68a;
  font-family:var(--mono);
  font-size:8px;
  font-weight:800;
  letter-spacing:1px;
  line-height:1;
  vertical-align:middle;
}
.sa-flag.ihosa{
  border-color:rgba(34,197,94,.30);
  background:rgba(34,197,94,.10);
  color:#86efac;
}
.sa-flag.mhoas{
  border-color:rgba(59,130,246,.30);
  background:rgba(59,130,246,.10);
  color:#93c5fd;
}
.exp-hold{color:var(--amber)!important;}
.exp-total-row td{background:var(--surface)!important;color:var(--text-muted)!important;font-size:9px!important;letter-spacing:.5px!important;border-top:1px solid rgba(34,197,94,.15)!important;padding:0!important;}

/* checkboxes */
.ob-tbl input[type=checkbox]{width:15px;height:15px;cursor:pointer;accent-color:var(--blue);}
.sel-panel .ob-tbl input[type=checkbox]{accent-color:var(--blue);}
.td-ride{background:rgba(59,130,246,.06);}
.td-bo{background:rgba(239,68,68,.06);}
.bo-select{background:var(--red-bg);border:1px solid rgba(239,68,68,.3);border-radius:4px;padding:3px 8px;color:var(--text-dim);font-family:var(--mono);font-size:10px;cursor:pointer;outline:none;transition:all .15s;color-scheme:dark;}

.bo-select option{background:#1a0a0a;color:#fff;font-family:monospace;font-size:13px;padding:6px;}



.td-outbound{
  background:rgba(239,68,68,.06);
}
.outbound-select{
  background:var(--red-bg);
  border:1px solid rgba(239,68,68,.3);
  border-radius:4px;
  padding:3px 8px;
  color:var(--text-dim);
  font-family:var(--mono);
  font-size:10px;
  cursor:pointer;
  outline:none;
  transition:all .15s;
  color-scheme:dark;
  appearance:auto;
  -webkit-appearance:menulist;
  -moz-appearance:menulist;
}
.outbound-select:hover{
  border-color:rgba(239,68,68,.3);

  color:var(--text-dim);
}
.outbound-select:focus{
  border-color:var(--red);
}
.outbound-select option{
  background:#1a0a0a;

  font-family:monospace;
  font-size:13px;
  padding:6px;
}

.train-warn-wrap{
  display:flex;
  flex-direction:column;
  gap:8px;
  padding:0 14px 10px;
}
.train-warn-card{
  border-radius:10px;
  padding:9px 11px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
.train-warn-card.red{
  border-color:rgba(239,68,68,.28);
  background:rgba(239,68,68,.08);
}
.train-warn-card.yellow{
  border-color:rgba(245,158,11,.28);
  background:rgba(245,158,11,.08);
}
.train-warn-title{
  font-family:var(--mono);
  font-size:9px;
  font-weight:800;
  letter-spacing:1.6px;
  text-transform:uppercase;

}
.train-warn-card.red .train-warn-title{color:#fca5a5;}
.train-warn-card.yellow .train-warn-title{color:#fde68a;}
.train-warn-ignore{
  margin-top:6px;
  padding:2px 10px;
  border-radius:4px;
  border:1px solid rgba(255,255,255,.1);

  color:rgba(255,255,255,.3);

}
.train-warn-ignore:hover{background:rgba(255,255,255,.06);color:rgba(255,255,255,.6);border-color:rgba(255,255,255,.2);}
.train-warn-unignore{
  font-family:var(--mono);font-size:9px;color:rgba(255,255,255,.25);
  cursor:pointer;text-decoration:underline;letter-spacing:.5px;margin-left:8px;
}
.train-warn-unignore:hover{color:rgba(255,255,255,.5);}
.train-warn-text{
  font-family:var(--sans);

}
.train-warn-loc{

  margin-top:4px;
  font-family:var(--mono);
  font-size:9px;
  letter-spacing:.8px;

}

/* empty state */
.ob-empty{text-align:center;padding:48px;color:var(--text-muted);font-family:var(--mono);font-size:12px;letter-spacing:1px;background:var(--surface2);}
.ob-empty .ob-empty-icon{font-size:32px;margin-bottom:12px;opacity:.3;}

/* ── SELECTED CONSIST STRIP ── */
.consist-wrap{
  padding:12px 14px 14px;
  background:linear-gradient(180deg, rgba(13,17,26,.98), rgba(10,13,20,.99));
  border-bottom:1px solid rgba(255,255,255,.08);
}

.consist-strip{
  display:flex;
  align-items:stretch;
  gap:0;
  overflow-x:auto;
  padding:3px 2px 4px;
}

.consist-strip::-webkit-scrollbar{height:8px;}
.consist-strip::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:999px;}

.consist-car{
  position:relative;
  flex:0 0 auto;
  min-width:150px;
  border:1px solid rgba(255,255,255,.10);
  border-radius:14px;
  background:
    radial-gradient(circle at 50% 0%, rgba(255,255,255,.10), transparent 38%),
    linear-gradient(180deg, rgba(28,34,48,.96), rgba(15,19,27,.98));
  box-shadow:
    0 10px 22px rgba(0,0,0,.28),
    inset 0 1px 0 rgba(255,255,255,.04);
  overflow:hidden;
  margin-right:8px;
  backdrop-filter:blur(6px);
}

.consist-car:last-child{margin-right:0;}

.consist-car::before{
  content:"";
  position:absolute;
  left:0;top:0;right:0;
  height:4px;
  background:var(--car-accent, var(--blue));
}

.consist-car.good{--car-accent:var(--green);}
.consist-car.warn{--car-accent:var(--amber);}
.consist-car.risk{--car-accent:var(--red);}
.consist-car.na{--car-accent:var(--text-muted);}

.consist-coupler{
  flex:0 0 14px;
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  margin-right:8px;
  margin-left:-2px;
}

.consist-coupler::before{
  content:"";
  width:10px;height:10px;
  border-radius:50%;
  border:2px solid rgba(148,163,184,.7);
  background:rgba(15,17,23,.95);
  box-shadow:0 0 0 3px rgba(255,255,255,.02);
}

.consist-body{
  padding:9px 10px 8px;
}

.consist-top{
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:8px;
}

.consist-title{
  min-width:0;
  text-align:center;
  justify-self:center;
}

.consist-train{
  font-size:13px;
  font-weight:800;
  letter-spacing:.2px;
  color:var(--text);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}

.consist-track{
  margin-top:2px;
  font-family:var(--mono);
  font-size:8px;
  letter-spacing:1.1px;
  text-transform:uppercase;
  color:var(--text-muted);
}

.consist-pill{
  flex:0 0 auto;
  padding:3px 7px;
  border-radius:999px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
  font-family:var(--mono);
  font-size:8px;
  font-weight:800;
  letter-spacing:1px;
  text-transform:uppercase;
  color:var(--text-muted);
}

.consist-pill.good{color:#86efac;border-color:rgba(34,197,94,.25);background:rgba(34,197,94,.12);}
.consist-pill.warn{color:#fde68a;border-color:rgba(245,158,11,.25);background:rgba(245,158,11,.12);}
.consist-pill.risk{color:#fecaca;border-color:rgba(239,68,68,.25);background:rgba(239,68,68,.12);}
.consist-pill.na{color:var(--text-muted);}

.consist-meta{
  margin-top:8px;
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:6px;
}

.consist-mini{
  border:1px solid rgba(255,255,255,.07);
  border-radius:9px;
  background:rgba(255,255,255,.03);
  padding:5px 6px 4px;
}

.consist-mini .label{
  display:block;
  font-family:var(--mono);
  font-size:6px;
  letter-spacing:1.2px;
  text-transform:uppercase;
  color:var(--text-muted);
}

.consist-mini .value{
  display:block;
  margin-top:2px;
  font-family:var(--mono);
  font-size:11px;
  font-weight:700;
  color:var(--text);
  font-variant-numeric:tabular-nums;
}

.consist-mini.good .value{color:var(--green);}
.consist-mini.warn .value{color:var(--amber);}
.consist-mini.risk .value{color:var(--red);}

.consist-readouts{
  margin-top:7px;
  display:flex;
  flex-direction:column;
  gap:4px;
  max-height:74px;
  overflow:auto;
  padding-right:2px;
}

.consist-readouts::-webkit-scrollbar{width:6px;}
.consist-readouts::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:999px;}



.consist-foot{
  margin-top:8px;
  padding-top:8px;
  border-top:1px dashed rgba(255,255,255,.08);
  font-family:var(--mono);
  font-size:9px;
  color:var(--text-dim);
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
}
.consist-pct-wrap{
  margin-top:8px;
  display:flex;
  align-items:center;
  gap:7px;
}
.consist-pct-bar-bg{
  flex:1;
  height:5px;
  border-radius:999px;
  background:rgba(255,255,255,.07);
  overflow:hidden;
}
.consist-pct-bar-fill{
  height:100%;
  border-radius:999px;
  transition:width .3s ease;
}
.consist-car.good .consist-pct-bar-fill{background:linear-gradient(90deg,var(--green),#86efac);}
.consist-car.warn .consist-pct-bar-fill{background:linear-gradient(90deg,var(--amber),#fcd34d);}
.consist-car.risk .consist-pct-bar-fill{background:linear-gradient(90deg,var(--red),#fca5a5);}
.consist-car.na  .consist-pct-bar-fill{background:rgba(255,255,255,.2);}
.consist-pct-label{
  font-family:var(--mono);
  font-size:9px;
  font-weight:700;
  color:var(--text-muted);
  min-width:30px;
  text-align:right;
  white-space:nowrap;
}

.consist-history{
  margin-top:8px;
  padding:8px 10px;
  border:1px solid rgba(167,139,250,.18);
  border-radius:10px;
  background:rgba(167,139,250,.06);
  color:#ddd6fe;
  font-size:9px;
  line-height:1.35;
  font-family:var(--sans);
  white-space:normal;
}
.consist-history .hist-label{
  display:block;
  font-family:var(--mono);
  font-size:7px;
  font-weight:800;
  letter-spacing:1.2px;
  text-transform:uppercase;
  color:#c4b5fd;
  margin-bottom:4px;
}
.consist-history.empty{display:none;}


.consist-inline-add{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  width:24px;
  height:24px;
  margin-left:10px;
  border-radius:6px;
  border:1px solid rgba(59,130,246,.28);
  background:rgba(59,130,246,.10);
  color:#93c5fd;
  cursor:pointer;
  font-family:var(--mono);
  font-size:16px;
  font-weight:800;
  transition:all .15s;
}
.consist-inline-add:hover{
  background:rgba(59,130,246,.22);
  color:#fff;
}
.consist-hypo-row{
  background:rgba(59,130,246,.05)!important;
}
.consist-hypo-row td{
  border-top:1px dashed rgba(59,130,246,.22)!important;
}
.consist-hypo-input{
  width:100%;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(59,130,246,.18);
  border-radius:4px;
  padding:5px 8px;
  color:var(--text);
  font-family:var(--mono);
  font-size:11px;
  outline:none;
}
.consist-hypo-input:focus{
  border-color:#60a5fa;
}

.consist-empty{
  padding:16px;
  font-family:var(--mono);
  font-size:11px;
  color:var(--text-muted);
  letter-spacing:.5px;
}

/* ── OUTBOUND FILTER TABS ── */
.ob-filter-group{display:flex;align-items:center;gap:8px;padding:0 8px;flex-wrap:wrap;justify-content:flex-end;}
.ob-filter-btn{
  padding:5px 12px;
  min-width:98px;
  min-height:26px;
  border-radius:6px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.04);
  color:#64748b;
  font-family:var(--mono);
  font-size:9px;
  font-weight:800;
  cursor:pointer;
  letter-spacing:1px;
  text-transform:uppercase;
  transition:all .15s;
  box-shadow:none;
}
.ob-filter-btn:hover{background:rgba(255,255,255,.08);color:#cbd5e1;border-color:rgba(255,255,255,.15);}
.ob-filter-btn.active{
  background:linear-gradient(135deg,rgba(34,197,94,.2),rgba(22,163,74,.15));
  color:#4ade80;
  border-color:rgba(34,197,94,.35);

/* ══════════════════════════════════════════
   CAR PICKER — PREMIUM REDESIGN
══════════════════════════════════════════ */
.cp-wrap{
  margin:0 16px 16px;
  border-radius:12px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,.07);
  background:linear-gradient(180deg,#0e1118 0%,#090c12 100%);
  box-shadow:0 24px 64px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.06);
}

.cp-header{
  background:linear-gradient(180deg,#141825 0%,#0f1420 100%);
  padding:14px 18px;
  display:flex;align-items:center;gap:10px;
  border-bottom:1px solid rgba(255,255,255,.06);
  box-shadow:0 1px 0 rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.04);
}
.cp-title{
  font-family:var(--mono);font-size:11px;font-weight:800;letter-spacing:3px;
  color:#f1f5f9;text-transform:uppercase;
  text-shadow:0 0 20px rgba(34,197,94,.3);
}
.cp-subtitle{font-size:10px;color:#334155;font-family:var(--mono);letter-spacing:.5px;}
.cp-target-group{
  display:flex;
  align-items:center;
  gap:4px;
  margin-left:10px;
  padding:3px;
  border:1px solid rgba(255,255,255,.08);
  border-radius:9px;
  background:rgba(255,255,255,.03);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.04);
}
.cp-target-label{
  padding:0 6px;
  font-family:var(--mono);
  font-size:8px;
  font-weight:800;
  letter-spacing:1.4px;
  text-transform:uppercase;
  color:#64748b;
  white-space:nowrap;
}
.cp-target-btn{
  min-width:58px;
  padding:5px 9px;
  border-radius:7px;
  border:1px solid rgba(255,255,255,.09);
  background:rgba(15,23,42,.72);
  color:#94a3b8;
  font-family:var(--mono);
  font-size:9px;
  font-weight:900;
  letter-spacing:1px;
  text-transform:uppercase;
  cursor:pointer;
  transition:all .14s;
}
.cp-target-btn:hover{color:#fff;border-color:rgba(255,255,255,.18);background:rgba(30,41,59,.78);}
.cp-target-btn.ihosa.active{background:linear-gradient(180deg,rgba(34,197,94,.34),rgba(22,101,52,.34));color:#bbf7d0;border-color:rgba(34,197,94,.55);box-shadow:0 0 14px rgba(34,197,94,.18),inset 0 1px 0 rgba(255,255,255,.08);}
.cp-target-btn.mhoas.active{background:linear-gradient(180deg,rgba(59,130,246,.34),rgba(30,64,175,.34));color:#bfdbfe;border-color:rgba(59,130,246,.55);box-shadow:0 0 14px rgba(59,130,246,.18),inset 0 1px 0 rgba(255,255,255,.08);}
.cp-sel-badge{
  background:linear-gradient(135deg,rgba(34,197,94,.2),rgba(22,163,74,.15));
  color:#4ade80;
  border:1px solid rgba(34,197,94,.35);border-radius:6px;
  padding:3px 10px;font-size:10px;font-weight:800;font-family:var(--mono);
  letter-spacing:.8px;
  box-shadow:0 0 12px rgba(34,197,94,.15);
}
.cp-clear-btn{
  margin-left:auto;padding:5px 12px;border-radius:6px;
  border:1px solid rgba(239,68,68,.25);background:rgba(239,68,68,.08);
  color:#fca5a5;font-family:var(--mono);font-size:9px;font-weight:800;
  cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .15s;
}
.cp-clear-btn:hover{background:rgba(239,68,68,.18);color:#fff;border-color:rgba(239,68,68,.5);box-shadow:0 0 12px rgba(239,68,68,.15);}
.cp-collapse-btn{
  padding:5px 12px;border-radius:6px;
  border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.04);
  color:#64748b;font-family:var(--mono);font-size:9px;font-weight:800;
  cursor:pointer;letter-spacing:1px;text-transform:uppercase;transition:all .15s;
}
.cp-collapse-btn:hover{background:rgba(255,255,255,.08);color:#cbd5e1;border-color:rgba(255,255,255,.15);}
.cp-body{display:block;}
.cp-body.collapsed{display:none;}

/* Track sections */
.cp-track-section{
  border-bottom:1px solid rgba(255,255,255,.04);
}
.cp-track-section:last-child{border-bottom:none;}

.cp-track-hdr{
  display:flex;align-items:center;gap:10px;
  padding:10px 18px;
  background:linear-gradient(90deg,rgba(15,19,30,.95) 0%,rgba(10,13,20,.95) 100%);
  cursor:pointer;user-select:none;
  transition:background .12s;
  border-left:3px solid rgba(255,255,255,.06);
  position:relative;
}
.cp-track-hdr::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,rgba(255,255,255,.06) 0%,transparent 60%);
}
.cp-track-hdr:hover{
  background:linear-gradient(90deg,rgba(20,26,42,.95) 0%,rgba(14,18,28,.95) 100%);
  border-left-color:rgba(100,116,139,.5);
}
.cp-track-hdr.has-sel{
  border-left-color:#22c55e;
  background:linear-gradient(90deg,rgba(15,30,22,.95) 0%,rgba(10,13,20,.95) 100%);
}
.cp-track-hdr.has-sel::before{
  content:'';position:absolute;left:0;top:0;bottom:0;width:3px;
  background:linear-gradient(180deg,#4ade80,#16a34a);
  box-shadow:0 0 8px rgba(34,197,94,.4);
}
.cp-track-label{
  font-family:var(--mono);font-size:12px;font-weight:800;letter-spacing:2px;
  color:#e2e8f0;text-transform:uppercase;
}
.cp-track-ft{
  font-size:10px;color:#334155;font-family:var(--mono);font-weight:600;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
  border-radius:4px;padding:1px 7px;
}
.cp-track-count{font-size:10px;color:#475569;font-family:var(--mono);}
.cp-track-sel-count{
  font-size:10px;font-weight:800;color:#4ade80;font-family:var(--mono);
  background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.25);
  border-radius:4px;padding:1px 8px;letter-spacing:.5px;
}
.cp-track-toggle{
  margin-left:auto;font-size:11px;color:#334155;font-family:var(--mono);
  width:20px;height:20px;display:flex;align-items:center;justify-content:center;
  border-radius:4px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);
}

.cp-track-body{background:transparent;}
.cp-track-body.collapsed{display:none;}

/* Column header row */
.cp-col-hdr{
  display:grid;
  grid-template-columns:27px 56px 64px 70px 112px 56px 56px 70px 70px 96px 96px 116px 160px 86px;
  column-gap:10px;
  align-items:center;
  padding:5px 18px 5px 21px;
  background:linear-gradient(180deg,#7f1d1d 0%, #450a0a 100%);
  border-bottom:1px solid rgba(255,255,255,.05);
  position:sticky;top:0;z-index:2;
  backdrop-filter:blur(4px);
}
.cp-col-lbl{
  text-align:center;
  justify-self:center;
  align-self:center;
  font-size:9px;font-weight:800;letter-spacing:1.2px;
  color:#fecaca;
  font-family:var(--mono);text-transform:uppercase;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  text-align:center;
  justify-self:center;
}

/* Car rows */
.cp-car-row{
  display:grid;
  grid-template-columns:27px 56px 64px 70px 112px 56px 56px 70px 70px 96px 96px 116px 160px 86px;
  column-gap:10px;
  align-items:center;
  padding:6px 18px 6px 18px;
  border-bottom:1px solid rgba(255,255,255,.025);
  cursor:pointer;
  transition:background .08s;
  border-left:3px solid transparent;
  position:relative;
}
.cp-car-row:last-child{border-bottom:none;}
.cp-car-row:nth-child(even){background:rgba(255,255,255,.012);}
.cp-car-row:hover{
  background:rgba(255,255,255,.035) !important;
  border-left-color:rgba(100,116,139,.4);
}
.cp-car-row.selected{
  background:linear-gradient(90deg,rgba(20,45,30,.7) 0%,rgba(12,20,16,.5) 100%) !important;
  border-left-color:#22c55e;
  box-shadow:inset 4px 0 12px rgba(34,197,94,.08);
}
.cp-car-row.selected::after{
  content:'';position:absolute;right:0;top:0;bottom:0;width:1px;
  background:rgba(34,197,94,.12);
}
.cp-car-row.row-selected{
  outline:2px solid rgba(251,191,36,.65);
  outline-offset:-2px;
}
.cp-car-chk{
  width:13px;height:13px;cursor:pointer;
  accent-color:#22c55e;flex-shrink:0;
}

/* Cell base */
.cp-car-yd,.cp-car-track,.cp-car-seq,.cp-car-id,.cp-car-tons,.cp-car-ln,
.cp-car-bk1,.cp-car-bk2,.cp-car-tih,.cp-car-a2s,.cp-car-train,.cp-car-arr,.cp-car-bk{
  text-align:center;
  justify-self:center;
  align-self:center;
  font-family:var(--mono);font-size:11px;color:#94a3b8;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  min-width:0;
}

/* Per-column overrides */
.cp-car-yd   {color:#334155;}
.cp-car-track{color:#334155;}
.cp-car-seq  {color:#475569;}
.cp-car-id   {font-size:13px;font-weight:800;color:#f1f5f9;letter-spacing:.3px;}
.cp-car-tons {text-align:right;color:#475569;}
.cp-car-ln   {text-align:right;color:#93c5fd;font-weight:700;}
.cp-car-bk1,.cp-car-bk2{color:#34d399;font-weight:600;}
.cp-car-tih  {}
.cp-car-a2s{font-weight:800;font-variant-numeric:tabular-nums;}
.ss-cross-flag{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:52px;
  margin-left:6px;
  padding:2px 7px;
  border-radius:999px;
  border:1px solid rgba(239,68,68,.34);

  font-family:var(--mono);
  font-size:9px;
  font-weight:900;
  letter-spacing:.8px;
  text-transform:uppercase;
  text-decoration:line-through;
  text-decoration-thickness:2px;
  text-decoration-color:#ef4444;
}
.arr-ss-wrap{display:inline-flex;align-items:center;justify-content:center;gap:0;white-space:nowrap;}
.cp-car-train{color:#334155;}
.cp-car-arr  {color:#94a3b8;}
.cp-car-bk   {color:#fbbf24;font-weight:700;}

/* Hold / SS badge chips */
.cp-car-hold{
  display:inline-block;
  font-size:10px;font-weight:800;font-family:var(--mono);
  background:rgba(245,158,11,.12);color:#fbbf24;
  border-radius:4px;padding:1px 7px;
  border:1px solid rgba(245,158,11,.25);
}
.cp-car-ss{
  display:inline-block;
  font-size:10px;font-weight:800;font-family:var(--mono);
