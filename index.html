<script id="sticky-notes-drawer-reparent-js">
/* Reparent the daily-notes drawer to <body> so it escapes #content-scale
   (which uses CSS `zoom` and was causing the page to reflow for one frame
   when the drawer opened: fixed-positioned descendants of a zoom-scaled
   ancestor briefly influence layout while transitioning). Once parented
   to <body>, the drawer is a true viewport overlay and the toolbar/grid
   no longer flinch on open. Also wires the close × button + ESC to close. */
(function(){
  'use strict';
  function reparentDrawer(){
    var panel=document.getElementById('daily-notes-panel');
    if(!panel) return;
    if(panel.parentNode === document.body) return;
    if(panel.__notesReparented) return;
    panel.__notesReparented=true;
    document.body.appendChild(panel);
  }

  function closeDrawer(){
    var panel=document.getElementById('daily-notes-panel');
    if(!panel) return;
    if(panel.classList.contains('hidden')) return;
    // Prefer the app's own toggler so the topbar button text + active state stay in sync.
    if(typeof window.setNotesOpen === 'function'){
      window.setNotesOpen(false);
    } else {
      panel.classList.add('hidden');
      var btn=document.getElementById('btn-notes');
      if(btn){
        btn.classList.remove('active-toggle');
        btn.textContent='Notes';
        btn.setAttribute('aria-expanded','false');
      }
    }
  }

  function wireCloseControls(){
    var closeBtn=document.getElementById('daily-notes-close');
    if(closeBtn && closeBtn.dataset.bound!=='1'){
      closeBtn.dataset.bound='1';
      closeBtn.addEventListener('click', function(e){
        e.preventDefault();
        e.stopPropagation();
        closeDrawer();
      });
    }
  }

  // ESC closes the drawer whenever it's open. Capture-phase so we get
  // first crack before any other ESC handler.
  document.addEventListener('keydown', function(e){
    if(e.key !== 'Escape') return;
    var panel=document.getElementById('daily-notes-panel');
    if(!panel || panel.classList.contains('hidden')) return;
    // If a modal/dialog is open, let it handle ESC instead.
    var modalOpen=document.querySelector('.modal.open, .modal-open, #after-block-edit-modal.open');
    if(modalOpen) return;
    e.preventDefault();
    e.stopPropagation();
    closeDrawer();
  }, true);

  if(document.readyState === 'loading'){
    document.addEventListener('DOMContentLoaded', function(){
      reparentDrawer();
      wireCloseControls();
    });
  } else {
    reparentDrawer();
    wireCloseControls();
  }
  // Belt-and-suspenders in case the panel is created later or moved.
  setTimeout(function(){ reparentDrawer(); wireCloseControls(); }, 0);
  setTimeout(function(){ reparentDrawer(); wireCloseControls(); }, 250);
  setTimeout(function(){ reparentDrawer(); wireCloseControls(); }, 1000);

  // Expose for debugging / manual control
  window.closeNotesDrawer = closeDrawer;
})();
</script>

<script id="bowl-hide-engaged-indicator-js">
/* ---------------------------------------------------------------
   Toggles an `.is-hiding` class on each hide button based on the
   matching `bowl-hide-*` class on the shell (or the localStorage
   key for the OLDEST button, which lives on the BEFORE board).
   Runs on load, after any click on a hide toggle, and periodically
   in case re-renders re-create the buttons.
---------------------------------------------------------------- */
(function(){
  'use strict';

  function lsOn(key){
    try { return localStorage.getItem(key) === '1'; } catch(e) { return false; }
  }

  function shellHas(cls){
    return !!document.querySelector('.'+cls);
  }

  function apply(){
    // For each button, prefer reading localStorage (source of truth at render
    // time) AND check shell class as a belt-and-suspenders fallback. The PREV
    // and TOMORROW buttons also honor the legacy `dwellHideAfterDepartingBlocks`
    // key — match the same logic the renderer uses around line 5575.
    const legacyAfterDepart = lsOn('dwellHideAfterDepartingBlocks');
    const checks = [
      ['[data-bowl-dwell-toggle]',           lsOn('dwellHideBowlDwell')          || shellHas('bowl-hide-dwell')],
      ['[data-bowl-track-suffix-toggle]',    lsOn('dwellHideBowlTrackSuffix')    || shellHas('bowl-hide-track-suffix')],
      ['[data-bowl-future-tag-toggle]',      lsOn('dwellHideFutureInboundTag')   || shellHas('bowl-hide-future-inbound-tag')],
      ['[data-bowl-future-block-toggle]',    lsOn('dwellHideFutureInboundBlocks_v4') || shellHas('bowl-hide-future-inbound-blocks')],
      ['[data-bowl-prev-depart-toggle]',     lsOn('dwellHidePreviousIhosaMhoas') || legacyAfterDepart || shellHas('bowl-hide-previous-departing-blocks')],
      ['[data-bowl-tomorrow-depart-toggle]', lsOn('dwellHideTomorrowIhosaMhoas') || legacyAfterDepart || shellHas('bowl-hide-tomorrow-departing-blocks')],
      ['[data-bowl-oldest-toggle]',          lsOn('dwellHideOldestInboundFlags') || shellHas('bowl-hide-oldest-flags')],
    ];

    checks.forEach(function(pair){
      const sel = pair[0], engaged = !!pair[1];
      document.querySelectorAll(sel).forEach(function(btn){
        btn.classList.toggle('is-hiding', engaged);
        if(engaged){
          btn.setAttribute('aria-pressed','true');
          if(!btn.dataset.engagedTitleSet){
            btn.dataset.originalTitle = btn.getAttribute('title') || '';
            btn.dataset.engagedTitleSet = '1';
          }
          btn.setAttribute('title','HIDE IS ACTIVE — click to show again');
        } else {
          btn.setAttribute('aria-pressed','false');
          if(btn.dataset.engagedTitleSet){
            if(btn.dataset.originalTitle) btn.setAttribute('title', btn.dataset.originalTitle);
            else btn.removeAttribute('title');
            delete btn.dataset.engagedTitleSet;
            delete btn.dataset.originalTitle;
          }
        }
      });
    });
  }

  // Run on load and shortly after, since the bowl renders asynchronously.
  document.addEventListener('DOMContentLoaded', apply);
  [0, 80, 250, 600, 1200, 2500].forEach(function(d){ setTimeout(apply, d); });

  // Re-apply after any click on a hide toggle (capture phase, after handlers run).
  document.addEventListener('click', function(e){
    const t = e.target;
    if(!t || !t.closest) return;
    const sel = '[data-bowl-dwell-toggle],[data-bowl-track-suffix-toggle],[data-bowl-future-tag-toggle],[data-bowl-future-block-toggle],[data-bowl-prev-depart-toggle],[data-bowl-tomorrow-depart-toggle],[data-bowl-oldest-toggle]';
    if(!t.closest(sel)) return;

<script id="ob-render-scroll-anchor-js">
/* ---------------------------------------------------------------
   PRESERVE SCROLL POSITION ACROSS renderOB()
   When renderOB() wipes #ob-inner (innerHTML='') and rebuilds it,
   the scroll container #ob-view briefly has no content to scroll
   past, so scrollTop clamps to 0 — that's the "jump to top" the
   user sees. This wrapper captures scrollTop before the render
   and restores it after. No fingerprinting, no anchoring — the
   user's viewport stays at the same raw scroll position, which
   is what they asked for.
---------------------------------------------------------------- */
(function(){
  'use strict';
  function getScroller(){ return document.getElementById('ob-view'); }

  function wrapRenderOB(){
    if(typeof window.renderOB !== 'function') return false;
    if(window.renderOB.__scrollAnchorWrapped) return true;
    var orig = window.renderOB;
    var wrapped = function(){
      var outTab = document.getElementById('tab-outbound');
      var shouldPreserve = !!(outTab && outTab.classList.contains('active'));
      var scroller = shouldPreserve ? getScroller() : null;
      var savedTop = scroller ? scroller.scrollTop : null;
      var result = orig.apply(this, arguments);
      if(scroller && savedTop !== null){
        // Restore immediately so the browser never paints scrollTop=0.
        scroller.scrollTop = savedTop;
        // And once on the next frame in case layout shifted scroll bounds.
        requestAnimationFrame(function(){
          if(scroller.scrollTop !== savedTop) scroller.scrollTop = savedTop;
        });
      }
      return result;
    };
    wrapped.__scrollAnchorWrapped = true;
    window.renderOB = wrapped;
    return true;
  }

  if(!wrapRenderOB()){
    var tries = 0;
    var iv = setInterval(function(){
      tries++;
      if(wrapRenderOB() || tries > 40){ clearInterval(iv); }
    }, 50);
  }
})();
</script>

<script id="current-board-edit-icons-js">
(function(){
  const STORE='dwellCurrentBoardBlockEditsV1';
  let activeBlock=null, activeKey='';
  function clean(v){return String(v==null?'':v).trim();}
  function esc(s){return clean(s).replace(/[&<>\"]/g,function(m){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m];});}
  function n(v){const x=parseFloat(clean(v).replace(/,/g,''));return Number.isFinite(x)?x:0;}
  function fmt(v){return Math.round(n(v)).toLocaleString();}
  function load(){try{return JSON.parse(localStorage.getItem(STORE)||'{}')||{};}catch(e){return {};}}
  function save(o){try{localStorage.setItem(STORE,JSON.stringify(o||{}));}catch(e){console.warn('current board edit save failed',e);}}
  function toastMsg(msg){try{ if(typeof toast==='function') toast(msg); else console.log(msg); }catch(e){console.log(msg);} }
  function normalize(txt){return clean(txt).replace(/[✎×]/g,'').replace(/EDITED/gi,'').replace(/\s+/g,' ').slice(0,180);}
  function getTrackFromRow(tr){const m=clean(tr.querySelector('.bowl-track')?.textContent||'').match(/06-(\d{3})/);return m?m[1]:'';}
  function blockKey(block){const tr=block.closest('tr');return [getTrackFromRow(tr),normalize(block.textContent)].join('||');}
  function parseBlock(block){
    const clone=block.cloneNode(true);
    clone.querySelectorAll('button,.current-edit-badge').forEach(x=>x.remove());
    const ft=n(clone.querySelector('b')?clone.querySelector('b').textContent:'0');
    const dwellEl=clone.querySelector('.bowl-dwell');
    const dwell=clean(dwellEl?dwellEl.textContent:'');
    if(dwellEl) dwellEl.remove();
    clone.querySelectorAll('b,.bowl-oldest-flag,.after-depart-badge').forEach(x=>x.remove());
    let txt=clean(clone.textContent).replace(/^\|\s*/,'').replace(/\|\s*\[\d{3}\]\s*$/,'').replace(/\s+/g,' ');
    txt=txt.replace(/\|\s*$/,'').trim();
    return {ft,label:txt,dwell:dwell};
  }
  function dwellClassFromText(txt){
    const v=parseFloat(clean(txt));
    if(!Number.isFinite(v)) return '';
    if(v<7) return 'dw-green';
    if(v<11) return 'dw-gold';
    return 'dw-red';
  }
  function renderBlock(block,ov){
    const ft=fmt(ov.ft);
    const label=esc(ov.label||'—');
    const dwell=clean(ov.dwell);
    const dwellHtml=dwell?` <span class="bowl-dwell ${dwellClassFromText(dwell)}">${esc(dwell).toUpperCase().includes('NET')?esc(dwell):esc(dwell+' NET')}</span>`:'';
    block.innerHTML=`<span><b>${ft}</b> | ${label}${dwellHtml}<span class="current-edit-badge">edited</span><button class="current-block-edit-btn" type="button" title="Edit first table block">✎</button></span>`;
    block.dataset.currentEditKey=blockKey(block);
  }
  function recalcRow(tr){
    if(!tr) return;
    let total=0;
    tr.querySelectorAll('.bowl-segments-cell .bowl-block').forEach(b=>{ const bold=b.querySelector('b'); total += n(bold?bold.textContent:0); });
    const cur=tr.querySelector('.bowl-current');
    if(cur) cur.textContent=fmt(total);
    const capMap={801:1050,802:1050,803:1750,804:2500,805:2500,806:2600,807:2750,808:2500,809:2500};
    const track=getTrackFromRow(tr);
    const delta=(capMap[track]||0)-total;
    const d=tr.querySelector('.bowl-delta');
    if(d){ d.textContent=fmt(delta); d.classList.remove('good','warn','bad'); d.classList.add(delta>=750?'good':delta>=300?'warn':'bad'); }
  }
  function enhance(){
    const edits=load();
    document.querySelectorAll('.bowl-board:not(.bowl-board-after) tbody tr').forEach(tr=>{
      tr.querySelectorAll('.bowl-segments-cell .bowl-block').forEach(block=>{
        if(block.querySelector('.manual-tag')) return;
        let key=block.dataset.currentEditKey || blockKey(block);
        block.dataset.currentEditKey=key;
        if(edits[key]){ renderBlock(block,edits[key]); key=block.dataset.currentEditKey; }
        if(!block.querySelector('.current-block-edit-btn')){
          const span=block.querySelector('span')||block;
          span.insertAdjacentHTML('beforeend','<button class="current-block-edit-btn" type="button" title="Edit first table block">✎</button>');
        }
      });
      recalcRow(tr);
    });
  }
  function ensureModal(){
    let m=document.getElementById('current-block-edit-modal');
    if(m) return m;
    m=document.createElement('div');
    m.id='current-block-edit-modal';
    m.innerHTML=`<div class="current-edit-card" role="dialog" aria-modal="true" aria-label="Edit current ramp block">
      <div class="current-edit-head"><div class="current-edit-title">EDIT FIRST TABLE BLOCK</div><button class="current-edit-close" type="button" data-current-edit-cancel>×</button></div>
      <div class="current-edit-body">
        <div class="current-edit-help">Display-level edit for the first Current Ramp Blocking table. This does not change the raw imported car rows or Supabase schema.</div>
        <div class="current-edit-field"><label>Footage</label><input id="current-edit-ft" inputmode="numeric"></div>
        <div class="current-edit-field"><label>Dwell</label><input id="current-edit-dwell" placeholder="13.1H NET"></div>
        <div class="current-edit-field full"><label>Block / Inbound Label</label><input id="current-edit-label"></div>
        <div class="current-edit-actions"><button class="current-edit-btn danger" type="button" id="current-edit-reset">Reset</button><button class="current-edit-btn" type="button" data-current-edit-cancel>Cancel</button><button class="current-edit-btn primary" type="button" id="current-edit-save">Save Changes</button></div>
      </div></div>`;
    document.body.appendChild(m);
    m.addEventListener('click',e=>{if(e.target===m || e.target.closest('[data-current-edit-cancel]')) closeModal();});
    m.querySelector('#current-edit-save').addEventListener('click',saveModal);
    m.querySelector('#current-edit-reset').addEventListener('click',resetModal);
    return m;
  }
  function openModal(block){
    activeBlock=block; activeKey=block.dataset.currentEditKey || blockKey(block);
    const edits=load(); const base=edits[activeKey] || parseBlock(block);
    const m=ensureModal();
    m.querySelector('#current-edit-ft').value=fmt(base.ft).replace(/,/g,'');
    m.querySelector('#current-edit-label').value=base.label||'';
    m.querySelector('#current-edit-dwell').value=base.dwell||'';
    m.classList.add('open');
    setTimeout(()=>m.querySelector('#current-edit-ft')?.focus(),30);
  }
  function closeModal(){const m=document.getElementById('current-block-edit-modal'); if(m) m.classList.remove('open'); activeBlock=null; activeKey='';}
  function saveModal(){
    if(!activeBlock||!activeKey) return;
    const m=document.getElementById('current-block-edit-modal');
    const ov={ft:n(m.querySelector('#current-edit-ft').value),label:clean(m.querySelector('#current-edit-label').value)||'—',dwell:clean(m.querySelector('#current-edit-dwell').value)};
    const edits=load(); edits[activeKey]=ov; save(edits);
    renderBlock(activeBlock,ov); recalcRow(activeBlock.closest('tr'));
    closeModal(); toastMsg('First table block updated');
  }
  function resetModal(){
    if(!activeBlock||!activeKey) return;
    const edits=load(); delete edits[activeKey]; save(edits); closeModal(); toastMsg('First table edit reset');
    try{ if(typeof renderOutbound==='function') renderOutbound(); else enhance(); }catch(e){ enhance(); }
  }
  document.addEventListener('click',function(e){
    const btn=e.target.closest && e.target.closest('.current-block-edit-btn');
    if(!btn) return;
    const block=btn.closest('.bowl-block'); if(!block) return;
    e.preventDefault(); e.stopPropagation(); e.stopImmediatePropagation(); openModal(block);
  },true);
  const mo=new MutationObserver(()=>{clearTimeout(window.__currentBoardEditEnhanceTimer); window.__currentBoardEditEnhanceTimer=setTimeout(enhance,80);});
  function start(){try{mo.observe(document.body,{childList:true,subtree:true});}catch(e){} enhance();}
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',start); else start();
  window.enhanceCurrentBoardEditIcons=enhance;
})();
</script>

<script id="outbound-column-turbo-fix">
(function(){
  'use strict';
  if(window.__outboundColumnTurboFixInstalled) return;
  window.__outboundColumnTurboFixInstalled=true;

  let storageTimer=null;
  let renderTimer=null;

  function norm(v){
    try{
      if(typeof normalizeOutboundTrain==='function') return normalizeOutboundTrain(v);
    }catch(e){}
    v=String(v||'').trim().toUpperCase();
    return (v==='IHOSA'||v==='MHOAS') ? v : '';
  }

  function idle(fn, timeout){
    if('requestIdleCallback' in window){
      requestIdleCallback(fn,{timeout:timeout||2500});
    }else{
      setTimeout(fn, timeout||900);
    }
  }

  function queueStorageSave(){
    clearTimeout(storageTimer);
    storageTimer=setTimeout(function(){
      idle(function(){
        try{ localStorage.setItem('dwellOutboundSel', JSON.stringify(window.outboundSelStore||outboundSelStore||{})); }catch(e){}
        try{ localStorage.setItem('dwellRideTrainSel', JSON.stringify(window.rideTrainStore||rideTrainStore||{})); }catch(e){}
        try{ if(Array.isArray(window.forecastRows||forecastRows)) localStorage.setItem('dwellForecastRows', JSON.stringify(window.forecastRows||forecastRows)); }catch(e){}
      },1200);
    },120);
  }

  function queueQuietRender(){
    /* Do not render while the user is actively changing OUTBOUND values.
       The old path rebuilt the entire outbound page after every change, which caused the delay.
       This refresh happens only after a long pause and only when the browser is idle. */
    clearTimeout(renderTimer);
    renderTimer=setTimeout(function(){
      idle(function(){
        try{
          const active=document.activeElement;
          if(active && active.classList && active.classList.contains('outbound-select')) return;
          const tab=document.getElementById('tab-outbound');
          if(tab && tab.classList.contains('active') && typeof renderOB==='function') renderOB();
        }catch(e){}
      },3500);
    },2200);
  }

  function setMemory(key,value){
    if(!key) return;
    const out=norm(value);
    try{
      if(typeof outboundSelStore==='object'){
        if(out) outboundSelStore[key]=out;
        else delete outboundSelStore[key];
      }
    }catch(e){}

    // Forecast/manual rows need rideTrainStore too because downstream selected-consist logic reads it.
    if(String(key).indexOf('FORECAST||')===0 || String(key).indexOf('MANUAL')>=0){
      try{
        if(typeof rideTrainStore==='object'){
          if(out) rideTrainStore[key]=out;
          else delete rideTrainStore[key];
        }
      }catch(e){}
    }

    if(String(key).indexOf('FORECAST||')===0){
      try{
        const id=String(key).replace('FORECAST||','');
        if(Array.isArray(forecastRows)){
          const row=forecastRows.find(r=>String(r.id)===id);
          if(row) row.outbound=out;
        }
      }catch(e){}
    }
  }

  function flash(select){
    try{
      select.classList.add('outbound-select-committed');
      const tr=select.closest('tr');
      if(tr) tr.classList.add('outbound-row-committed');
      clearTimeout(select.__obFlashTimer);
      select.__obFlashTimer=setTimeout(function(){
        select.classList.remove('outbound-select-committed');
        if(tr) tr.classList.remove('outbound-row-committed');
      },700);
    }catch(e){}
  }

  document.addEventListener('change',function(e){
    const select=e.target && e.target.closest ? e.target.closest('#tab-outbound .outbound-select') : null;
    if(!select) return;
    const tr=select.closest('tr');
    const key=(tr && tr.dataset && tr.dataset.gkey) || select.dataset.gkey || '';
    if(!key) return;

    // Kill the older per-row listeners before they call renderOB().
    e.stopImmediatePropagation();

    setMemory(key,select.value);
    queueStorageSave();
    flash(select);
    // Do not rebuild the outbound page from an OUTBOUND dropdown change.
    // Rebuilding here made native dropdowns feel frozen/delayed.
  },true);

  // Also neutralize any older scheduled immediate render helpers if they exist.
  try{
    window.scheduleDwellOutboundColumnRender=function(){ /* no-op for OUTBOUND dropdown responsiveness */ };
  }catch(e){}
})();
</script>

<script id="outbound-select-native-response-authority-js">
(function(){
  'use strict';

  function norm(v){
    v=String(v||'').trim().toUpperCase();
    return (v==='IHOSA'||v==='MHOAS') ? v : '';
  }

  function getKey(sel){
    if(!sel) return '';
    var tr=sel.closest && sel.closest('tr');
    return (sel.dataset && sel.dataset.gkey) || (tr && tr.dataset && tr.dataset.gkey) || '';
  }

  function setStore(key,value){
    if(!key) return;
    var out=norm(value);

    try{
      if(typeof outboundSelStore==='object'){
        if(out) outboundSelStore[key]=out;
        else delete outboundSelStore[key];
      }
    }catch(e){}

    try{
      if(String(key).indexOf('FORECAST||')===0){
        if(typeof rideTrainStore==='object'){
          if(out) rideTrainStore[key]=out;
          else delete rideTrainStore[key];
        }
        var id=String(key).replace('FORECAST||','');
        if(Array.isArray(forecastRows)){
          var row=forecastRows.find(function(r){ return String(r && r.id)===id; });
          if(row) row.outbound=out;
        }
      }
    }catch(e){}
  }

  var saveTimer=null;
  function saveLater(){
    clearTimeout(saveTimer);
    saveTimer=setTimeout(function(){
      try{ localStorage.setItem('dwellOutboundSel', JSON.stringify(outboundSelStore||{})); }catch(e){}
      try{ localStorage.setItem('dwellRideTrainSel', JSON.stringify(rideTrainStore||{})); }catch(e){}
      try{ if(Array.isArray(forecastRows)) localStorage.setItem('dwellForecastRows', JSON.stringify(forecastRows)); }catch(e){}
    },40);
  }

  function commit(sel){
    var key=getKey(sel);
    if(!key) return false;
    setStore(key, sel.value);
    saveLater();
    sel.classList.add('instant-committed');
    clearTimeout(sel.__instantCommitTimer);
    sel.__instantCommitTimer=setTimeout(function(){ sel.classList.remove('instant-committed'); },550);
    return true;
  }

  // Make sure generated selects always carry the key the capture handler needs.
  function hydrate(){
    document.querySelectorAll('#tab-outbound .outbound-select').forEach(function(sel){
      var tr=sel.closest('tr');
      if(tr && tr.dataset && tr.dataset.gkey && !sel.dataset.gkey) sel.dataset.gkey=tr.dataset.gkey;
      sel.style.pointerEvents='auto';
    });
  }

  // Stop the older row-level change listeners from rebuilding the entire outbound page.
  document.addEventListener('change',function(e){
    var sel=e.target && e.target.closest ? e.target.closest('#tab-outbound .outbound-select') : null;
    if(!sel) return;
    hydrate();
    if(commit(sel)){
      e.stopImmediatePropagation();
    }
  },true);

  // Opening the native dropdown should not trigger any app work.
  ['pointerdown','mousedown','touchstart','focus'].forEach(function(type){
    document.addEventListener(type,function(e){
      var sel=e.target && e.target.closest ? e.target.closest('#tab-outbound .outbound-select') : null;
      if(!sel) return;
      hydrate();
    },true);
  });

  // Any old delayed-render helper is now a no-op for this column.
  try{ window.scheduleDwellOutboundColumnRender=function(){}; }catch(e){}

  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',hydrate);
  else hydrate();

  var mo=new MutationObserver(function(){ hydrate(); });
  try{
    var tab=document.getElementById('tab-outbound');
    if(tab) mo.observe(tab,{childList:true,subtree:true});
  }catch(e){}
})();




</script>
