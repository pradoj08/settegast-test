/* ── ANALYTICS ── */
.an-section{margin-bottom:24px;}
.an-section-title{
  font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:2px;
  color:var(--text-muted);text-transform:uppercase;margin-bottom:12px;
  padding-bottom:6px;border-bottom:1px solid var(--border);
}
.an-kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.an-kpi{
  flex:1;min-width:130px;padding:14px 16px;border-radius:10px;
  background:var(--surface2);border:1px solid var(--border);
  box-shadow:inset 0 1px 0 rgba(255,255,255,.03);
}
.an-kpi-label{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--text-muted);font-family:var(--mono);text-transform:uppercase;margin-bottom:4px;}
.an-kpi-val{font-family:var(--mono);font-size:22px;font-weight:800;color:var(--text);}
.an-kpi-val.good{color:var(--green);}
.an-kpi-val.warn{color:var(--amber);}
.an-kpi-val.risk{color:var(--red);}
.an-kpi-sub{font-size:9px;color:var(--text-muted);font-family:var(--mono);margin-top:3px;}

.an-export-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:20px;}

.an-daily-summary{
  border-radius:12px;
  border:1px solid rgba(59,130,246,.18);
  background:linear-gradient(180deg, rgba(18,22,33,.92), rgba(13,16,24,.96));
  box-shadow:0 8px 24px rgba(0,0,0,.18), inset 0 1px 0 rgba(255,255,255,.03);
  overflow:hidden;
  margin-bottom:18px;
}
.an-daily-summary-head{
  padding:12px 14px;
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:12px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.an-daily-summary-title{
  font-family:var(--mono);
  font-size:10px;
  font-weight:800;
  letter-spacing:2px;
  text-transform:uppercase;
  color:#93c5fd;
}
.an-daily-summary-sub{
  margin-top:3px;
  font-size:11px;
  color:var(--text-muted);
  font-family:var(--sans);
  line-height:1.45;
}
.an-daily-summary-body{
  padding:12px 14px 14px;
  display:grid;
  gap:10px;
}
.an-daily-summary-par{
  font-family:var(--sans);
  font-size:12px;
  line-height:1.6;
  color:var(--text-dim);
}
.an-daily-summary-par strong{
  color:var(--text);
  font-weight:700;
}
.an-daily-summary-grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(0,1fr));
  gap:8px;
}
.an-daily-summary-mini{
  padding:8px 9px 7px;
  border-radius:10px;
  background:rgba(255,255,255,.03);
  border:1px solid rgba(255,255,255,.06);
}
.an-daily-summary-mini .k{
  display:block;
  font-family:var(--mono);
  font-size:7px;
  letter-spacing:1.1px;
  text-transform:uppercase;
  color:var(--text-muted);
}
.an-daily-summary-mini .v{
  display:block;
  margin-top:3px;
  font-family:var(--mono);
  font-size:12px;
  font-weight:800;
  color:var(--text);
  font-variant-numeric:tabular-nums;
}
.an-daily-summary-mini.good .v{color:var(--green);}
.an-daily-summary-mini.warn .v{color:var(--amber);}
.an-daily-summary-mini.risk .v{color:var(--red);}
.an-daily-summary-list{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.an-daily-summary-list .item{
  padding:7px 9px;
  border-radius:9px;
  background:rgba(255,255,255,.025);
  border:1px solid rgba(255,255,255,.05);
  font-family:var(--sans);
  font-size:11px;
  line-height:1.45;
  color:var(--text-dim);
}
/* ── TREND PERIODS ── */
.an-trend-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;}
.an-trend-card{flex:1;min-width:160px;border-radius:10px;background:var(--surface2);border:1px solid var(--border);padding:14px 16px;position:relative;overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,.03);}
.an-trend-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:var(--border);}
.an-trend-card.up::before{background:var(--green);}
.an-trend-card.down::before{background:var(--red);}
.an-trend-card.flat::before{background:var(--amber);}
.an-trend-period{font-size:8px;font-weight:700;letter-spacing:2px;color:var(--text-muted);font-family:var(--mono);text-transform:uppercase;margin-bottom:6px;}
.an-trend-val{font-family:var(--mono);font-size:24px;font-weight:800;line-height:1;color:var(--text);margin-bottom:4px;}
.an-trend-val.good{color:var(--green);}.an-trend-val.warn{color:var(--amber);}.an-trend-val.risk{color:var(--red);}.an-trend-val.na{color:var(--text-muted);font-size:16px;}
.an-trend-sub{font-size:9px;font-family:var(--mono);color:var(--text-muted);margin-bottom:8px;}
.an-trend-delta{display:inline-flex;align-items:center;gap:3px;font-size:9px;font-weight:700;font-family:var(--mono);padding:2px 7px;border-radius:10px;}
.an-trend-delta.up{background:rgba(34,197,94,.12);color:var(--green);}
.an-trend-delta.down{background:rgba(239,68,68,.12);color:#fca5a5;}
.an-trend-delta.flat{background:rgba(245,158,11,.1);color:var(--amber);}
.an-trend-mini-chart{display:flex;align-items:flex-end;gap:2px;height:24px;margin-top:8px;}
.an-trend-bar{flex:1;border-radius:2px 2px 0 0;min-height:2px;}
.an-trend-bar.good{background:rgba(34,197,94,.45);}.an-trend-bar.warn{background:rgba(245,158,11,.45);}.an-trend-bar.risk{background:rgba(239,68,68,.45);}.an-trend-bar.na{background:rgba(255,255,255,.1);}
.an-trend-snaps{font-size:8px;color:var(--text-muted);font-family:var(--mono);margin-top:4px;}

.an-btn{
  padding:8px 18px;border-radius:6px;cursor:pointer;
  font-size:11px;font-weight:600;letter-spacing:.3px;
  font-family:var(--sans);transition:all .15s;
  border:1px solid var(--border);background:var(--surface3);color:var(--text-dim);
  box-shadow:0 1px 3px rgba(0,0,0,.3),inset 0 1px 0 rgba(255,255,255,.04);
}
.an-btn:hover{background:var(--surface2);color:var(--text);border-color:var(--border-bright);transform:translateY(-1px);}
.an-btn.primary{background:rgba(34,197,94,.18);color:var(--green);border-color:rgba(34,197,94,.4);}
.an-btn.primary:hover{background:rgba(34,197,94,.28);color:#fff;}
.an-btn.save{background:rgba(59,130,246,.18);color:var(--blue);border-color:rgba(59,130,246,.4);}
.an-btn.save:hover{background:rgba(59,130,246,.28);color:#fff;}

.an-snap-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.an-snap-tbl th{padding:7px 12px;font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text-muted);font-family:var(--mono);text-transform:uppercase;border-bottom:1px solid var(--border-bright);text-align:center;background:var(--surface3);}
.an-snap-tbl th:first-child{text-align:left;}
.an-snap-tbl td{padding:7px 12px;font-size:11px;font-family:var(--mono);color:var(--text-dim);border-bottom:1px solid var(--border);text-align:center;}
.an-snap-tbl td:first-child{text-align:left;color:var(--text);font-weight:600;}
.an-snap-tbl tbody tr:hover td{background:rgba(255,255,255,.03);}
.an-snap-tbl .good{color:var(--green);font-weight:700;}
.an-snap-tbl .warn{color:var(--amber);font-weight:700;}
.an-snap-tbl .risk{color:var(--red);font-weight:700;}
.an-snap-del{background:none;border:none;color:rgba(239,68,68,.4);cursor:pointer;font-size:13px;padding:0 4px;}
.an-snap-del:hover{color:var(--red);}

/* Trend bars */
.an-chart{padding:8px 0 4px;}
.an-bar-row{display:flex;align-items:center;gap:8px;margin-bottom:5px;}
.an-bar-label{font-size:9px;font-family:var(--mono);color:var(--text-muted);min-width:130px;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.an-bar-track{flex:1;height:16px;background:rgba(255,255,255,.04);border-radius:4px;overflow:hidden;position:relative;}
.an-bar-fill{height:100%;border-radius:4px;transition:width .4s ease;display:flex;align-items:center;justify-content:flex-end;padding-right:5px;}
.an-bar-fill.good{background:linear-gradient(90deg,rgba(34,197,94,.3),rgba(34,197,94,.5));}
.an-bar-fill.warn{background:linear-gradient(90deg,rgba(245,158,11,.3),rgba(245,158,11,.5));}
.an-bar-fill.risk{background:linear-gradient(90deg,rgba(239,68,68,.3),rgba(239,68,68,.5));}
.an-bar-val{font-size:9px;font-family:var(--mono);font-weight:700;color:var(--text-dim);min-width:36px;text-align:right;}
.an-empty{text-align:center;padding:48px;color:var(--text-muted);font-family:var(--mono);font-size:11px;letter-spacing:1px;}

/* ── RECONCILIATION ── */
.rc-form{background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:20px;margin-bottom:20px;}
.rc-form-title{font-size:10px;font-weight:700;letter-spacing:2px;color:var(--text-dim);font-family:var(--mono);text-transform:uppercase;margin-bottom:14px;padding-bottom:8px;border-bottom:1px solid var(--border);}
.rc-fields{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px;margin-bottom:14px;}
.rc-field label{display:block;font-size:8px;font-weight:700;letter-spacing:1.5px;color:var(--text-muted);font-family:var(--mono);text-transform:uppercase;margin-bottom:4px;}
.rc-field input,.rc-field select,.rc-field textarea{width:100%;padding:7px 10px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:border-color .15s;}
.rc-field input:focus,.rc-field select:focus,.rc-field textarea:focus{border-color:var(--green);}
.rc-field textarea{resize:vertical;min-height:60px;font-size:11px;}
.rc-field.wide{grid-column:1/-1;}
.rc-field select{width:100%;padding:7px 10px;border-radius:5px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--mono);font-size:12px;outline:none;transition:border-color .15s;color-scheme:dark;}
.rc-field select:focus{border-color:var(--green);}
.rc-submit{padding:9px 24px;border-radius:6px;border:none;cursor:pointer;background:var(--green-dim);color:#fff;font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1px;transition:background .15s;}
.rc-submit:hover{background:var(--green);}

.rc-tbl{width:100%;border-collapse:collapse;font-size:11px;}
.rc-tbl th{padding:7px 12px;font-size:9px;font-weight:700;letter-spacing:1px;color:var(--text-muted);font-family:var(--mono);text-transform:uppercase;border-bottom:1px solid var(--border-bright);text-align:center;background:var(--surface3);}
.rc-tbl th:first-child{text-align:left;}
.rc-tbl td{padding:8px 12px;font-size:11px;font-family:var(--mono);color:var(--text-dim);border-bottom:1px solid var(--border);text-align:center;}
.rc-tbl td:first-child{text-align:left;color:var(--text);font-weight:600;}
.rc-tbl tbody tr:hover td{background:rgba(255,255,255,.025);}
.rc-delta-good{color:var(--green);font-weight:700;}
.rc-delta-bad{color:#fca5a5;font-weight:700;}
.rc-delta-flat{color:var(--amber);}
.rc-del-btn{background:none;border:none;color:rgba(239,68,68,.35);cursor:pointer;font-size:13px;padding:0 4px;}
.rc-del-btn:hover{color:var(--red);}
.rc-notes-cell{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text-muted);font-size:10px;}

/* ── CAR HISTORY SUMMARY ── */
.an-hist-grid{display:flex;flex-direction:column;gap:8px;}
.an-hist-card{
  border-radius:8px;border:1px solid var(--border);
  background:var(--surface2);overflow:hidden;
  transition:border-color .15s;
}
.an-hist-card:hover{border-color:var(--border-bright);}
.an-hist-card.has-data{border-left:3px solid var(--green);}
.an-hist-card.has-data.warn{border-left-color:var(--amber);}
.an-hist-card.has-data.risk{border-left-color:var(--red);}
.an-hist-card.has-data.purple{border-left-color:#a78bfa;}
.an-hist-card.has-data.blue{border-left-color:var(--blue);}
.an-hist-card.has-data.red{border-left-color:var(--red);}
.an-hist-hdr{
  display:flex;align-items:center;gap:10px;padding:10px 14px;
  cursor:pointer;user-select:none;
}
.an-hist-title{
  font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:1px;
  color:var(--text-dim);text-transform:uppercase;flex:1;
}
.an-hist-card.has-data .an-hist-title{color:var(--text);}
.an-hist-badge{
  font-family:var(--mono);font-size:9px;font-weight:700;
  padding:2px 8px;border-radius:10px;
  background:rgba(255,255,255,.07);color:var(--text-muted);
}
.an-hist-card.has-data .an-hist-badge{background:rgba(34,197,94,.15);color:var(--green);}
.an-hist-card.has-data.warn .an-hist-badge{background:rgba(245,158,11,.15);color:var(--amber);}
.an-hist-card.has-data.risk .an-hist-badge{background:rgba(239,68,68,.15);color:#fca5a5;}
.an-hist-card.has-data.purple .an-hist-badge{background:rgba(167,139,250,.15);color:#c4b5fd;}
.an-hist-card.has-data.blue .an-hist-badge{background:rgba(59,130,246,.15);color:var(--blue);}
.an-hist-toggle{font-size:10px;color:var(--text-muted);font-family:var(--mono);}
.an-hist-body{display:none;padding:0 14px 12px;border-top:1px solid var(--border);}
.an-hist-body.open{display:block;}
.an-hist-meta{display:flex;gap:16px;margin-bottom:8px;padding-top:10px;}
.an-hist-meta span{font-size:10px;font-family:var(--mono);color:var(--text-muted);}
.an-hist-meta strong{color:var(--text-dim);}
.an-hist-trains{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:8px;}
.an-hist-train-pill{
  font-size:9px;font-family:var(--mono);font-weight:600;
  padding:2px 8px;border-radius:4px;
  background:var(--surface3);color:var(--text-dim);border:1px solid var(--border);
}
.an-hist-cars{
  max-height:120px;overflow-y:auto;
  font-size:10px;font-family:var(--mono);color:var(--text-muted);
  display:flex;flex-wrap:wrap;gap:4px;
}
.an-hist-car-id{
  padding:1px 6px;border-radius:3px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.06);
  color:var(--text-dim);
}
.an-hist-none{
  font-size:10px;font-family:var(--mono);color:var(--text-muted);
  padding:6px 0;font-style:italic;
}
.an-hist-separator{
  display:flex;align-items:center;gap:10px;margin:10px 0 6px;
}
.an-hist-separator span{
  font-size:8px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  font-family:var(--mono);color:var(--text-muted);white-space:nowrap;
}
.an-hist-separator::before,.an-hist-separator::after{
  content:'';flex:1;height:1px;background:var(--border);
}
.an-hist-preview{
  font-size:10px;font-family:var(--sans);color:var(--text-muted);
  line-height:1.5;padding:6px 14px 8px;border-top:1px solid rgba(255,255,255,.04);
}
.an-hist-card.has-data .an-hist-preview{color:var(--text-dim);}

/* Manual group note in consist */
.consist-manual-badge{
  display:inline-flex;align-items:center;gap:3px;
  font-size:8px;font-weight:700;letter-spacing:1px;
  background:rgba(167,139,250,.2);color:#c4b5fd;
  border:1px solid rgba(167,139,250,.3);border-radius:3px;
  padding:1px 5px;margin-top:3px;font-family:var(--mono);
}

/* ── TRAIN BANK MODAL ── */
#tb-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;}
#tb-modal.open{display:flex;}
#tb-box{background:var(--surface2);border:1px solid var(--border-bright);border-radius:10px;width:540px;max-height:82vh;display:flex;flex-direction:column;box-shadow:0 16px 48px rgba(0,0,0,.6);overflow:hidden;}
#tb-hdr{background:var(--surface3);color:var(--text);padding:14px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);}
#tb-hdr span{font-size:13px;font-weight:700;font-family:var(--mono);letter-spacing:1px;color:var(--green);}
#tb-hdr button{background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;padding:0 4px;}
#tb-hdr button:hover{color:var(--text);}
#tb-body{flex:1;overflow-y:auto;padding:14px;background:var(--surface2);}
#tb-add{display:flex;gap:8px;margin-bottom:14px;}
#tb-add input{border:1px solid var(--border);border-radius:5px;padding:7px 10px;font-size:12px;font-family:var(--mono);outline:none;background:var(--surface);color:var(--text);}
#tb-add input:focus{border-color:var(--green);}
#tb-name{flex:1;}
#tb-time{width:190px;}
#tb-add button{background:var(--green-dim);color:#fff;border:none;border-radius:5px;padding:7px 14px;cursor:pointer;font-size:12px;font-weight:600;white-space:nowrap;}
#tb-add button:hover{background:var(--green);}
#tb-list{display:flex;flex-direction:column;gap:5px;}
#tb-missing-banner{
  display:none;
  margin:0 0 12px;
  padding:11px 12px;
  border-radius:10px;
  border:1px solid rgba(245,158,11,.38);
  background:linear-gradient(135deg,rgba(245,158,11,.16),rgba(69,26,3,.24));
  box-shadow:0 10px 24px rgba(0,0,0,.22),inset 0 1px 0 rgba(255,255,255,.05);
}
#tb-missing-banner.show{display:block;}
.tb-missing-title{
  font-family:var(--mono);
  font-size:10px;
  font-weight:900;
  letter-spacing:1.8px;
  text-transform:uppercase;
  color:#fde68a;
  margin-bottom:5px;
}
.tb-missing-copy{font-size:11px;line-height:1.45;color:var(--text-dim);margin-bottom:8px;}
.tb-missing-chips{display:flex;flex-wrap:wrap;gap:6px;}
.tb-missing-chip{
  display:inline-flex;align-items:center;
  border:1px solid rgba(245,158,11,.34);
  background:rgba(245,158,11,.12);
  color:#fde68a;
  border-radius:999px;
  padding:3px 8px;
  font-family:var(--mono);
  font-size:9px;
  font-weight:800;
  letter-spacing:.4px;
}
.tb-item{display:flex;align-items:center;background:var(--surface3);border:1px solid var(--border);border-radius:5px;padding:7px 10px;gap:8px;}
.tb-item.tb-missing{border-color:rgba(245,158,11,.62);background:linear-gradient(90deg,rgba(245,158,11,.16),rgba(30,34,49,.96));box-shadow:inset 4px 0 0 #f59e0b,0 0 0 1px rgba(245,158,11,.08);}
.tb-item.tb-missing .ti-name{color:#fde68a;}
.tb-missing-badge{font-family:var(--mono);font-size:8px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:#fde68a;border:1px solid rgba(245,158,11,.35);background:rgba(245,158,11,.14);border-radius:999px;padding:2px 7px;white-space:nowrap;}
.tb-temp-badge{font-family:var(--mono);font-size:8px;font-weight:900;letter-spacing:.8px;text-transform:uppercase;color:#93c5fd;border:1px solid rgba(59,130,246,.35);background:rgba(59,130,246,.12);border-radius:999px;padding:2px 7px;white-space:nowrap;}
.tb-item.tb-missing input[data-temp="1"]{border-color:rgba(59,130,246,.42);background:rgba(59,130,246,.07);color:#bfdbfe;}
.tb-item .ti-name{font-weight:700;font-family:var(--mono);font-size:11px;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--text);}
.tb-item input[type=datetime-local]{border:1px solid var(--border);border-radius:4px;padding:3px 6px;font-size:11px;font-family:var(--mono);outline:none;background:var(--surface);color:var(--text);}
.tb-item input:focus{border-color:var(--green);}
.tb-item .ti-save{background:var(--green-dim);color:#fff;border:none;border-radius:3px;padding:3px 8px;cursor:pointer;font-size:11px;}
.tb-item.tb-missing .ti-save{background:linear-gradient(180deg,#2563eb,#1d4ed8);border:1px solid rgba(147,197,253,.35);font-weight:800;letter-spacing:.5px;white-space:nowrap;}
.tb-item .ti-del{background:none;border:none;color:var(--red);font-size:14px;cursor:pointer;padding:0 2px;}
.tb-empty{text-align:center;color:var(--text-muted);padding:28px;font-size:12px;}

/* ── STATUS BAR ── */
#status-bar{height:24px;background:var(--surface2);display:flex;align-items:center;padding:0 14px;gap:18px;flex-shrink:0;border-top:1px solid var(--border);}
#status-bar span{font-size:9px;letter-spacing:.5px;color:var(--text-muted);font-family:var(--mono);}
#status-bar strong{color:var(--text-dim);font-weight:600;}

/* ── TOAST ── */
#toast{position:fixed;bottom:34px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--surface3);color:var(--text);padding:7px 18px;border-radius:6px;font-size:11px;font-family:var(--mono);opacity:0;transition:all .2s;pointer-events:none;z-index:200;border:1px solid var(--border-bright);}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── ARRIVAL EDIT MODAL ── */
#arr-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:150;align-items:center;justify-content:center;}
#arr-modal.open{display:flex;}
#arr-box{
  background:var(--surface2);border:1px solid var(--border-bright);
  border-radius:10px;width:min(520px,92vw);overflow:hidden;
  box-shadow:0 16px 60px rgba(0,0,0,.6);
}
#arr-hdr{
  background:var(--surface3);padding:14px 18px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid rgba(255,255,255,.06);
}
#arr-hdr-title{font-family:var(--mono);font-size:11px;font-weight:700;letter-spacing:1.5px;color:var(--text-dim);text-transform:uppercase;}
#arr-hdr-train{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green);margin-top:2px;}
#arr-close{background:none;border:none;color:rgba(255,255,255,.4);font-size:16px;cursor:pointer;padding:0 2px;line-height:1;}
#arr-close:hover{color:#fff;}
#arr-body{padding:20px 18px;}
#arr-body label{
  display:block;font-size:9px;font-weight:700;letter-spacing:2px;
  color:var(--text-muted);font-family:var(--mono);text-transform:uppercase;margin-bottom:8px;
}
#arr-input{
  width:100%;padding:10px 12px;border-radius:6px;
  border:1px solid var(--border);background:var(--surface);
  color:var(--text);font-family:var(--mono);font-size:13px;outline:none;
  transition:border-color .15s;
}
#arr-input:focus{border-color:var(--green);}
#arr-footer{
  display:flex;gap:8px;padding:0 18px 18px;
}
#arr-save{
  flex:1;padding:9px;border-radius:6px;border:none;cursor:pointer;
  background:var(--green-dim);color:#fff;font-family:var(--mono);
  font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;
  transition:background .15s;
}
#arr-save:hover{background:var(--green);}
#arr-cancel{
  padding:9px 16px;border-radius:6px;cursor:pointer;
  background:var(--surface3);border:1px solid var(--border);
  color:var(--text-muted);font-family:var(--mono);font-size:11px;
  transition:all .15s;
}
#arr-cancel:hover{background:var(--surface);color:var(--text);}

/* ── SAVE TO BANK CONFIRM ── */
#bank-confirm{display:none;position:fixed;inset:0;background:rgba(0,0,0,.65);z-index:160;align-items:center;justify-content:center;}
#bank-confirm.open{display:flex;}
#bank-box{
  background:var(--surface2);border:1px solid var(--border-bright);
  border-radius:10px;width:340px;padding:24px;text-align:center;
  box-shadow:0 16px 60px rgba(0,0,0,.6);
}
#bank-box .bc-icon{font-size:28px;margin-bottom:10px;}
#bank-box .bc-msg{font-family:var(--sans);font-size:13px;color:var(--text-dim);line-height:1.5;margin-bottom:6px;}
#bank-box .bc-train{font-family:var(--mono);font-size:13px;font-weight:700;color:var(--green);margin-bottom:18px;}
#bank-box .bc-btns{display:flex;gap:8px;}
#bc-yes{
  flex:1;padding:9px;border-radius:6px;border:none;cursor:pointer;
  background:var(--green-dim);color:#fff;font-family:var(--mono);
  font-size:11px;font-weight:700;letter-spacing:1px;
}
#bc-yes:hover{background:#388e3c;}
#bc-no{
  flex:1;padding:9px;border-radius:6px;cursor:pointer;
  background:var(--surface3);border:1px solid var(--border);
  color:var(--text-muted);font-family:var(--mono);font-size:11px;
}
#bc-no:hover{background:var(--surface);color:var(--text);}

/* arrival cell edit affordance */
.td-arr-wrap{display:flex;align-items:center;gap:6px;justify-content:center;}
.td-arr-edit{
  opacity:0;width:18px;height:18px;border-radius:3px;
  border:1px solid rgba(76,175,80,.3);background:rgba(76,175,80,.1);
  color:#81c784;cursor:pointer;font-size:10px;
  display:flex;align-items:center;justify-content:center;
  transition:opacity .15s,background .15s;flex-shrink:0;
}
tr:hover .td-arr-edit{opacity:1;}
.td-arr-edit:hover{background:rgba(76,175,80,.3);}

/* ── FONT SIZE SLIDER ── */
.size-ctrl{display:flex;align-items:center;gap:7px;padding:0 4px;}
.size-ctrl label{font-size:9px;font-weight:700;letter-spacing:1.5px;color:var(--text-muted);font-family:var(--mono);text-transform:uppercase;white-space:nowrap;}
.size-ctrl .size-val{font-size:10px;font-family:var(--mono);color:var(--text-dim);min-width:22px;text-align:right;}
#font-slider{
  -webkit-appearance:none;appearance:none;
  width:80px;height:3px;border-radius:2px;
  background:var(--surface3);outline:none;cursor:pointer;
}
#font-slider::-webkit-slider-thumb{
  -webkit-appearance:none;width:12px;height:12px;border-radius:50%;
  background:#4caf50;cursor:pointer;box-shadow:0 0 6px rgba(76,175,80,.5);
  transition:background .15s;
}
#font-slider::-webkit-slider-thumb:hover{background:#69f0ae;}
#font-slider::-moz-range-thumb{width:12px;height:12px;border-radius:50%;background:#4caf50;border:none;cursor:pointer;}

/* ── MINI CONFIRM ── */
#mini-confirm{display:none;position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:180;align-items:center;justify-content:center;}
#mini-confirm.open{display:flex;}
#mini-box{
  background:var(--surface2);border:1px solid rgba(239,68,68,.3);
  border-radius:10px;width:300px;padding:22px;text-align:center;
  box-shadow:0 16px 48px rgba(0,0,0,.6);
}
#mini-box .mc-icon{font-size:24px;margin-bottom:10px;}
#mini-box .mc-msg{font-family:var(--sans);font-size:13px;color:var(--text-dim);line-height:1.5;margin-bottom:18px;}
#mini-box .mc-btns{display:flex;gap:8px;}
#mc-confirm{
  flex:1;padding:8px;border-radius:6px;border:none;cursor:pointer;
  background:#c62828;color:#fff;font-family:var(--mono);
  font-size:11px;font-weight:700;letter-spacing:1px;transition:background .15s;
}
#mc-confirm:hover{background:#e53935;}
#mc-cancel{
  flex:1;padding:8px;border-radius:6px;cursor:pointer;
  background:var(--surface3);border:1px solid var(--border);
  color:var(--text-muted);font-family:var(--mono);font-size:11px;transition:all .15s;
}
#mc-cancel:hover{background:var(--surface);color:var(--text);}

/* ── BACK TO TOP ── */
#btn-top{
  position:fixed;bottom:36px;left:50%;transform:translateX(-50%);z-index:300;
  width:36px;height:36px;border-radius:50%;
  background:var(--surface3);border:1px solid var(--border-bright);
  color:var(--green);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:16px;line-height:1;
  opacity:0;pointer-events:none;
  transition:opacity .2s,background .15s;
  box-shadow:0 4px 16px rgba(0,0,0,.4);
}
#btn-top.visible{opacity:1;pointer-events:auto;}
#btn-top:hover{background:var(--green-dim);color:#fff;}


/* Family rows: keep backgrounds uniform, only text changes */
.ob-tbl tbody tr.ss-zpbho td,
.ob-tbl tbody tr.ss-zlbho td,
.ob-panel.sel-panel .ob-tbl tbody tr.ss-zpbho td,
.ob-panel.sel-panel .ob-tbl tbody tr.ss-zlbho td{
  background:transparent !important;
}
.ob-tbl tbody tr.ss-zpbho td.td-train,
.ob-panel.sel-panel .ob-tbl tbody tr.ss-zpbho td.td-train{
  color:#f9a8d4 !important;
}
.ob-tbl tbody tr.ss-zlbho td.td-train,
.ob-panel.sel-panel .ob-tbl tbody tr.ss-zlbho td.td-train{
  color:#93c5fd !important;
}


/* Center expanded dropdown headers */
.exp-hdr td{
  text-align:center!important;
  justify-content:center!important;
}


/* Inner expanded table alignment */
.exp-hdr td table tr th,
.exp-inner-row td{
  text-align:center !important;
  vertical-align:middle !important;
}
.exp-hdr td table tr th:first-child,
.exp-inner-row td:first-child{
  text-align:center !important;
}
.exp-inner-row td{
  padding:0 6px !important;
}
.exp-car-id{
  text-align:center !important;
}
.seq-head-runtime,
.seq-cell-runtime{
  width:34px !important;
  min-width:34px !important;
  text-align:center !important;
  font-family:var(--mono) !important;
  font-weight:700 !important;
  color:#cbd5e1 !important;
}


/* Final inner-table alignment pass */
.exp-hdr td table,
.exp-row .exp-inner-row{
  table-layout:fixed !important;
  width:100% !important;
  border-collapse:collapse !important;
}
.exp-hdr td table tr th,
.exp-row .exp-inner-row td{

  <main class="app">
    <section class="topbar">

  <script>
    const STORAGE_KEY = 'inbound-summary-app-v1';
    const SIZE_KEY = 'inbound-summary-table-size-v1';


    function applyTableSize(value){
      const safe = Math.min(1.35, Math.max(0.75, Number(value) || 1));
      document.documentElement.style.setProperty('--table-scale', String(safe));
      const slider = document.getElementById('sizeSlider');
      const label = document.getElementById('sizeValue');
      if(slider) slider.value = String(safe);
      if(label) label.textContent = `${Math.round(safe * 100)}%`;
      localStorage.setItem(SIZE_KEY, String(safe));
    }

    const sampleTrain = {
      id: crypto.randomUUID(),
      train: 'ZLBHO 22',
      dateTime: '5/25/26 2:15',
      shift: 'DAY SHIFT',
      ups: '',
      rows: [
        { id: crypto.randomUUID(), block: 'RAMP', cars: '', loads: '', mty: '', wt: '', ft: 3297 },
        { id: crypto.randomUUID(), block: 'DUDS', cars: '', loads: '', mty: '', wt: '', ft: 77 },
        { id: crypto.randomUUID(), block: 'RAMP', cars: '', loads: '', mty: '', wt: '', ft: 3297 },
        { id: crypto.randomUUID(), block: 'DUDS', cars: '', loads: '', mty: '', wt: '', ft: 77 }
      ]
    };

    let trains = loadState().map(t => ({...t, shift: t.shift || guessShift(t.dateTime), ups: t.ups || ''}));
    if(autoPopulateZpbhoPlus2({createMissing:true})) saveState();

    function cloneSample(){
      return {
        id: crypto.randomUUID(),
        train: 'ZLBHO 22',
        dateTime: '5/25/26 2:15',
        shift: 'DAY SHIFT',
        ups: '',
        rows: sampleTrain.rows.map(r => ({...r, id: crypto.randomUUID()}))
      };
    }

    function loadState(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(raw){
          const parsed = JSON.parse(raw);
          if(Array.isArray(parsed) && parsed.length) return parsed;
        }
      }catch(err){ console.warn('Local load failed', err); }
      return [cloneSample()];
    }

    function saveState(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(trains));
    }

    function parseNum(value){
      if(value === null || value === undefined || value === '') return '';
      const clean = String(value).replace(/,/g,'').trim();
      if(clean === '') return '';
      const n = Number(clean);
      return Number.isFinite(n) ? n : '';
    }

    function fmt(value){
      const n = Number(value || 0);
      return n.toLocaleString('en-US');
    }

    function numericValue(value){
      if(value === null || value === undefined || value === '') return 0;
      const clean = String(value).replace(/,/g,'').trim();
      const n = Number(clean);
      return Number.isFinite(n) ? n : 0;
    }

    function trainTotalFt(train){
      return train.rows.reduce((sum, row) => sum + numericValue(row.ft), 0);
    }


    function isZpbhoTrain(train){
      return /\bZPBHO\b/i.test(String(train?.train || ''));
    }

    function dayOffsetFromToday(date){
      if(!date) return null;
      const today = startOfDay(new Date());
      const inboundDay = startOfDay(date);
      return Math.round((inboundDay - today) / 86400000);
    }

    function dayOffset(train){
      return dayOffsetFromToday(parseInboundDate(train?.dateTime));
    }

    function formatInboundDateForDay(baseDay, minutesFromMidnight){
      const d = startOfDay(baseDay);
      d.setMinutes(Number(minutesFromMidnight) || 0);
      const month = d.getMonth() + 1;
      const day = d.getDate();
      const year = String(d.getFullYear()).slice(-2);
      let hour = d.getHours();
      const minute = String(d.getMinutes()).padStart(2,'0');
      const ampm = hour >= 12 ? 'PM' : 'AM';
      hour = hour % 12;
      if(hour === 0) hour = 12;
      return `${month}/${day}/${year} ${hour}:${minute} ${ampm}`;
    }

    function averageZpbhoForecastSources(targetDate){
      const targetStart = startOfDay(targetDate);
      return trains
        .filter(train => isZpbhoTrain(train) && !train.autoZpbhoPlus2)
        .map(train => ({ train, parsed: parseInboundDate(train.dateTime), totalFt: trainTotalFt(train) }))
        .filter(item => item.parsed && item.parsed < targetStart && item.totalFt > 0)
        .filter(item => item.parsed.getHours() >= 4 && item.parsed.getHours() < 12)
        .sort((a,b) => b.parsed - a.parsed)
        .slice(0,2);
    }

    function autoPopulateZpbhoPlus2(options = {}){
      const createMissing = options.createMissing !== false;
      if(!Array.isArray(trains)) return false;
      const targetDate = startOfDay(new Date());
      targetDate.setDate(targetDate.getDate() + 2);
      const sources = averageZpbhoForecastSources(targetDate);
      if(sources.length < 2) return false;

      const avgMinutes = Math.round(sources.reduce((sum, item) => sum + item.parsed.getHours() * 60 + item.parsed.getMinutes(), 0) / sources.length);
      const avgFt = Math.round(sources.reduce((sum, item) => sum + item.totalFt, 0) / sources.length);
      const sourceLabel = sources.map(item => `${item.train.train || 'ZPBHO'} ${fmt(item.totalFt)}ft @ ${item.parsed.toLocaleTimeString([], {hour:'numeric', minute:'2-digit'})}`).join(' + ');

      let target = trains.find(train => isZpbhoTrain(train) && dayOffset(train) === 2);
      if(!target){
        if(!createMissing) return false;
        target = { id: crypto.randomUUID(), train: 'ZPBHO +2', dateTime: '', shift: 'DAY SHIFT', ups: '', rows: [], autoZpbhoPlus2: true };
        trains.push(target);
      }

      const nextDateTime = formatInboundDateForDay(targetDate, avgMinutes);
      const nextShift = guessShift(nextDateTime);
      const priorFirstRow = target.rows && target.rows[0] ? target.rows[0] : {};
      const nextRows = [{
        id: priorFirstRow.id || crypto.randomUUID(),
        block: 'AVG ZPBHO',
        cars: priorFirstRow.cars || '',
        loads: priorFirstRow.loads || '',
        mty: priorFirstRow.mty || '',
        wt: priorFirstRow.wt || '',
        ft: avgFt
      }];

      const changed = target.dateTime !== nextDateTime || target.shift !== nextShift || trainTotalFt(target) !== avgFt || !target.autoZpbhoPlus2 || target.autoNote !== sourceLabel;
      target.train = target.train && /ZPBHO/i.test(target.train) ? target.train : 'ZPBHO +2';
      target.dateTime = nextDateTime;
      target.shift = nextShift;
      target.rows = nextRows;
      target.autoZpbhoPlus2 = true;
      target.autoNote = sourceLabel;
      return changed;
    }

    function parseInboundDate(value){
      const raw = String(value || '').trim();
      if(!raw) return null;
      const direct = new Date(raw);
      if(!Number.isNaN(direct.getTime())) return direct;

      // Supports compact Excel-style dates like 5/25/26 2:15.
      const match = raw.match(/(\d{1,2})\/(\d{1,2})\/(\d{2,4})(?:\s+(\d{1,2})(?::(\d{2}))?\s*(AM|PM)?)?/i);
      if(!match) return null;
      let [, month, day, year, hour='0', minute='0', ampm=''] = match;
      let y = Number(year);
      if(y < 100) y += 2000;
      let h = Number(hour);
      if(ampm){
        const tag = ampm.toUpperCase();
        if(tag === 'PM' && h < 12) h += 12;
        if(tag === 'AM' && h === 12) h = 0;
      }
      const parsed = new Date(y, Number(month) - 1, Number(day), h, Number(minute));
      return Number.isNaN(parsed.getTime()) ? null : parsed;
    }

    function startOfDay(date){
      return new Date(date.getFullYear(), date.getMonth(), date.getDate());
    }

    function dayKey(train){
      const parsed = parseInboundDate(train.dateTime);
      if(!parsed) return 'NO DATE';

      const today = startOfDay(new Date());
      const inboundDay = startOfDay(parsed);
      const dayDiff = Math.round((inboundDay - today) / 86400000);

      if(dayDiff === 0) return 'TODAY';
      if(dayDiff === 1) return 'TOMORROW';
      if(dayDiff === 2) return 'DAY AFTER TOMORROW';

      return parsed.toLocaleDateString('en-US', {month:'numeric', day:'numeric', year:'2-digit'});
    }



    function rollupDayLabel(train){
      const parsed = parseInboundDate(train.dateTime);
      if(!parsed) return 'NO DATE';
      const today = startOfDay(new Date());
      const inboundDay = startOfDay(parsed);
      const dayDiff = Math.round((inboundDay - today) / 86400000);
      if(dayDiff === 0) return 'TODAY';
      if(dayDiff === 1) return '+1 DAY';
      if(dayDiff === 2) return '+2 DAY';
      if(dayDiff > 2) return `+${dayDiff} DAY`;
      if(dayDiff < 0) return `${dayDiff} DAY`;
      return 'TODAY';
    }

    function toneClassForDay(label){
      if(label === 'TODAY') return 'tone-today';
      if(label === '+1 DAY') return 'tone-plus1';
      return 'tone-plus2';
    }

    function guessShift(value){
      const parsed = parseInboundDate(value);
      if(!parsed) return 'DAY SHIFT';
      const hour = parsed.getHours();
      if(hour >= 18 || hour < 4) return 'NIGHT SHIFT';
      return 'DAY SHIFT';
    }

    function totalFtRule(total){
      // Total footage shading follows the supplied Excel-style rules.
      // Because 7,001-10,000 overlaps with < 9,000, the green middle range takes priority.
      if(total > 10001) return {className:'heavy', tag:'HEAVY'};
      if(total >= 7001 && total <= 10000) return {className:'light', tag:'LIGHT'};
      if(total < 9000) return {className:'low', tag:'LOW'};
      return {className:'light', tag:'LIGHT'};
    }


    function shouldShowUps(train){
      const name = String(train?.train || '').toUpperCase();
      return name.includes('ZPBHO') && dayKey(train) === 'TODAY';
    }

    function formatUps(train){
      const value = String(train?.ups ?? '').trim();
      if(value === '') return '';
      return `${escapeHtml(value)} UPS`;
    }

    function renderRollup(){
      const panel = document.getElementById('rollupPanel');
      if(!panel) return;
      if(!trains.length){
        panel.innerHTML = '<div class="rollup-empty">No inbound tables to summarize yet.</div>';
        return;
      }
      const sorted = [...trains].sort((a,b) => sortValue(a) - sortValue(b) || String(a.train || '').localeCompare(String(b.train || '')));
      const groups = [];
      for(const train of sorted){
        const label = rollupDayLabel(train);
        let group = groups.find(g => g.label === label);
        if(!group){
          group = {label, trains: []};
          groups.push(group);
        }
        group.trains.push(train);
      }

      const body = groups.map(group => {
        const total = group.trains.reduce((sum, train) => sum + trainTotalFt(train), 0);
        const totalRule = totalFtRule(total);
        const totalClass = totalRule.className;
        const totalTag = totalRule.tag;
        const dayTone = toneClassForDay(group.label);
        return group.trains.map((train, idx) => {
          const first = idx === 0;
          const ft = trainTotalFt(train);
          return `<tr class="${first ? 'group-start' : ''}">
            ${first ? `<td class="day-cell ${dayTone}" rowspan="${group.trains.length}">${escapeHtml(group.label)}</td>` : ''}
            <td class="inbound-cell ${dayTone}">${escapeHtml(train.train || '')}</td>
            <td class="arrival-cell ${dayTone}">${escapeHtml(train.dateTime || '')}</td>
            <td class="shift-cell ${dayTone}">${escapeHtml(train.shift || guessShift(train.dateTime))}</td>
            <td class="ft-cell-rollup ${dayTone}">${fmt(ft)}</td>
            <td class="ups-cell-rollup ${dayTone}">${formatUps(train)}</td>
            ${first ? `<td class="total-cell" rowspan="${group.trains.length}"><div class="total-box ${totalClass}"><div class="total-tag">${totalTag}</div><div class="total-value">${fmt(total)}</div></div></td>` : ''}
          </tr>`;
        }).join('');
      }).join('');

      panel.innerHTML = `<table class="rollup-table">
        <thead><tr><th>Day</th><th>Inbound</th><th>Arrival</th><th>Shift</th><th>FT</th><th>UPS</th><th>Total FT</th></tr></thead>
        <tbody>${body}</tbody>
      </table>`;
    }

    function sortValue(train){
      const parsed = parseInboundDate(train.dateTime);
      return parsed ? parsed.getTime() : Number.MAX_SAFE_INTEGER;
    }

    function applyDefaultInboundSort(){
      trains.sort((a, b) => {
        const av = sortValue(a);
        const bv = sortValue(b);
        if(av !== bv) return av - bv;
        return String(a.train || '').localeCompare(String(b.train || ''));
      });
    }

    function updateTotalDisplays(tIndex){
      const total = fmt(trainTotalFt(trains[tIndex]));
      document.querySelectorAll(`[data-total-display][data-index="${tIndex}"]`).forEach(el => {
        el.textContent = total;
      });
    }

    function render(){
      const zpbhoChanged = autoPopulateZpbhoPlus2({createMissing:true});
      applyDefaultInboundSort();
      saveState();
      renderRollup();
      const stack = document.getElementById('trainStack');
      if(!trains.length){
        stack.innerHTML = '<div class="empty">No inbound summaries yet. Click <b>Add Inbound</b> to create a table.</div>';
        return;
      }

      let previousDay = null;
      stack.innerHTML = trains.map((train, tIndex) => {
        const currentDay = dayKey(train);
        const separator = currentDay !== previousDay
          ? `<div class="day-separator"><span>${escapeHtml(currentDay)}</span></div>`
          : '';
        previousDay = currentDay;
        return `${separator}
        <article class="train-card" data-train-id="${train.id}">
          <div class="train-header">
            <div class="head-field">
              <div class="head-label">Inbound</div>
              <input class="head-input" value="${escapeHtml(train.train)}" data-action="train-field" data-index="${tIndex}" data-field="train" />
            </div>
            <div class="head-field">
              <div class="head-label">Date / Time</div>
              <input class="head-input" value="${escapeHtml(train.dateTime)}" data-action="train-field" data-index="${tIndex}" data-field="dateTime" />
            </div>
            <div class="head-field">
              <div class="head-label">Shift</div>
              <input class="head-input" value="${escapeHtml(train.shift || guessShift(train.dateTime))}" data-action="train-field" data-index="${tIndex}" data-field="shift" />
            </div>
            <div class="head-field ups-field" style="${shouldShowUps(train) || train.ups ? '' : 'display:none;'}">
              <div class="head-label">UPS</div>
              <input class="head-input" inputmode="numeric" value="${escapeHtml(train.ups || '')}" data-action="train-field" data-index="${tIndex}" data-field="ups" placeholder="#" />
            </div>
            <div class="head-field">
              <div class="head-label">Total FT</div>
              <div class="head-value" data-total-display data-index="${tIndex}">${fmt(trainTotalFt(train))}</div>
            </div>
            <div class="toolbar-row">
              <button class="btn icon small" title="Move table up" data-action="move-train-up" data-index="${tIndex}" ${tIndex === 0 ? 'disabled' : ''}>↑</button>
              <button class="btn icon small" title="Move table down" data-action="move-train-down" data-index="${tIndex}" ${tIndex === trains.length - 1 ? 'disabled' : ''}>↓</button>
              <button class="btn small" data-action="add-row" data-index="${tIndex}">+ Row</button>
              <button class="btn small danger" data-action="delete-train" data-index="${tIndex}">Delete</button>
            </div>
            ${train.autoZpbhoPlus2 ? `<div class="auto-note"><span>AUTO ZPBHO +2: avg of last two morning ZPBHOs</span><span>${escapeHtml(train.autoNote || '')}</span></div>` : ''}
          </div>

          <div class="table-wrap">
            <table aria-label="Inbound summary table">
              <thead>
                <tr>
                  <th>Block Name</th>
                  <th>Cars</th>
                  <th>Loads</th>
                  <th>Empties</th>
                  <th>Weight</th>
                  <th style="text-align:right;">Length</th>
                  <th style="text-align:right;">EDIT</th>
                </tr>
              </thead>
              <tbody>
                ${train.rows.map((row, rIndex) => `
                  <tr>
                    <td><input class="cell-input block-input" value="${escapeHtml(row.block)}" data-action="row-field" data-tindex="${tIndex}" data-rindex="${rIndex}" data-field="block" /></td>
                    <td><input class="cell-input number-input" value="${escapeHtml(row.cars)}" data-action="row-field" data-tindex="${tIndex}" data-rindex="${rIndex}" data-field="cars" /></td>
                    <td><input class="cell-input number-input" value="${escapeHtml(row.loads)}" data-action="row-field" data-tindex="${tIndex}" data-rindex="${rIndex}" data-field="loads" /></td>
                    <td><input class="cell-input number-input" value="${escapeHtml(row.mty)}" data-action="row-field" data-tindex="${tIndex}" data-rindex="${rIndex}" data-field="mty" /></td>
                    <td><input class="cell-input number-input" value="${escapeHtml(row.wt)}" data-action="row-field" data-tindex="${tIndex}" data-rindex="${rIndex}" data-field="wt" /></td>
                    <td class="ft-cell"><input class="cell-input number-input" value="${escapeHtml(row.ft)}" data-action="row-field" data-tindex="${tIndex}" data-rindex="${rIndex}" data-field="ft" /></td>
                    <td class="actions-cell">
                      <button class="btn icon small" title="Edit row" data-action="focus-row" data-tindex="${tIndex}" data-rindex="${rIndex}">✎</button>
                      <button class="btn icon small danger" title="Delete row" data-action="delete-row" data-tindex="${tIndex}" data-rindex="${rIndex}">×</button>
                    </td>
                  </tr>
                `).join('')}
              </tbody>
            </table>
          </div>
          <div class="table-footer">
            <button class="btn small" data-action="add-row" data-index="${tIndex}">+ Add Row</button>
            <div class="footer-total"><span>Total FT</span><span class="total-pill" data-total-display data-index="${tIndex}">${fmt(trainTotalFt(train))}</span></div>
          </div>
        </article>`;
      }).join('');
    }

    function escapeHtml(value){
      return String(value ?? '')
        .replaceAll('&','&amp;')
        .replaceAll('<','&lt;')
        .replaceAll('>','&gt;')
        .replaceAll('"','&quot;')
        .replaceAll("'",'&#039;');
    }

    function newRow(){
      return { id: crypto.randomUUID(), block: '', cars: '', loads: '', mty: '', wt: '', ft: '' };
    }

    document.addEventListener('input', (e) => {
      const el = e.target;
      const action = el.dataset.action;
      if(action === 'train-field'){
        const i = Number(el.dataset.index);
        trains[i][el.dataset.field] = el.value;
        if(el.dataset.field === 'dateTime' && !trains[i].shift){
          trains[i].shift = guessShift(el.value);
        }
        if(autoPopulateZpbhoPlus2({createMissing:false})) saveState();
        saveState();
        renderRollup();
        // Do not full-render on header input; preserve cursor.
      }
      if(action === 'row-field'){
        const t = Number(el.dataset.tindex);
        const r = Number(el.dataset.rindex);
        const field = el.dataset.field;

        // Preserve the active input while typing. Re-rendering here was causing
        // the FT box to lose focus after every digit. Store the raw value and
        // update only the visible total instead of rebuilding the whole table.
        trains[t].rows[r][field] = field === 'block' ? el.value.toUpperCase() : el.value;
        if(autoPopulateZpbhoPlus2({createMissing:false})) saveState();
        saveState();
        if(field === 'ft'){
          updateTotalDisplays(t);
          renderRollup();
        }
      }
    });

    document.addEventListener('change', (e) => {
      const el = e.target;
      const action = el.dataset.action;
      if(action === 'train-field' || action === 'row-field'){
        if(autoPopulateZpbhoPlus2({createMissing:true})){
          saveState();
          render();
        }
      }
    });

    document.addEventListener('change', (e) => {
      const el = e.target;
      if(el?.dataset?.action === 'train-field' && (el.dataset.field === 'dateTime' || el.dataset.field === 'train')){
        applyDefaultInboundSort();
        saveState();
        render();
      }
    });

    document.addEventListener('click', (e) => {
      const btn = e.target.closest('button[data-action]');
      if(!btn) return;
      const action = btn.dataset.action;

      if(action === 'add-row'){
        trains[Number(btn.dataset.index)].rows.push(newRow());
        saveState(); render();
      }
      if(action === 'delete-train'){
        const i = Number(btn.dataset.index);
        trains.splice(i,1);
        saveState(); render();
      }
      if(action === 'delete-row'){
        const t = Number(btn.dataset.tindex);
        const r = Number(btn.dataset.rindex);
        trains[t].rows.splice(r,1);
        saveState(); render();
      }
      if(action === 'move-train-up'){
        const i = Number(btn.dataset.index);
        if(i > 0){
          [trains[i - 1], trains[i]] = [trains[i], trains[i - 1]];
          saveState(); render();
        }
      }
      if(action === 'move-train-down'){
        const i = Number(btn.dataset.index);
        if(i < trains.length - 1){
          [trains[i + 1], trains[i]] = [trains[i], trains[i + 1]];
          saveState(); render();
        }
      }
      if(action === 'focus-row'){
        const tr = btn.closest('tr');
        const input = tr?.querySelector('input');
        input?.focus();
        input?.select();
      }
    });

    document.getElementById('sizeSlider').addEventListener('input', (e) => {
      applyTableSize(e.target.value);
    });

    document.getElementById('addTrainBtn').addEventListener('click', () => {
      trains.unshift({
        id: crypto.randomUUID(),
        train: 'NEW INBOUND',
        dateTime: new Date().toLocaleString([], {month:'numeric', day:'numeric', year:'2-digit', hour:'numeric', minute:'2-digit'}),
        shift: 'DAY SHIFT',
        ups: '',
        rows: [newRow()]
      });
      saveState(); render();
    });


    document.getElementById('clearBtn').addEventListener('click', () => {
      if(confirm('Clear all inbound summaries from this browser?')){
        trains = [];
        saveState(); render();
      }
    });

    applyTableSize(localStorage.getItem(SIZE_KEY) || '1');
    render();
  </script>

<script id="future-inbound-default-ss-patch">

      <button id="dep-modal-close" style="background:none;border:none;color:var(--text-muted);font-size:18px;cursor:pointer;">✕</button>

      <div>

        <input id="dep-ihosa-time" type="datetime-local" style="width:100%;padding:8px 12px;border-radius:6px;border:1px solid var(--border);background:var(--surface);color:var(--text);font-family:var(--mono);font-size:13px;outline:none;">

function toast(msg, duration){
  duration = duration || 2400;
  var existing = document.getElementById('_toast');
  if(existing) existing.remove();
  var t = document.createElement('div');
  t.id = '_toast';
  t.textContent = msg;
  t.style.cssText = [
    'position:fixed','bottom:24px','left:50%','transform:translateX(-50%)',
    'background:#1e2435','color:#f1f5f9','border:1px solid rgba(255,255,255,.15)',
    'border-radius:8px','padding:9px 18px','font-family:\'JetBrains Mono\',monospace',

    'box-shadow:0 6px 24px rgba(0,0,0,.5)','z-index:9999',
    'opacity:0','transition:opacity .18s ease','pointer-events:none'
  ].join(';');
  document.body.appendChild(t);
  requestAnimationFrame(function(){ t.style.opacity = '1'; });
  setTimeout(function(){
    t.style.opacity = '0';
    setTimeout(function(){ if(t.parentNode) t.remove(); }, 220);
  }, duration);
}

function addDailyNote(text){

/* Fast outbound-column interaction: keep dropdown response instant and debounce the heavy table rebuild. */

function getTrainDisplayName(carOrTrain){

function getTrainColorIndex(trainName){
  const t=String(trainName||'').trim().toUpperCase();
  if(!t) return -1;
  let hash=0;
  for(let i=0;i<t.length;i++) hash=((hash*31)+t.charCodeAt(i))>>>0;
  return hash % 10;

function fmtNoteTime(ts){
  const d=new Date(ts);
  const h=d.getHours();
  const m=String(d.getMinutes()).padStart(2,'0');
  const ampm=h>=12?'PM':'AM';
  const h12=((h+11)%12)+1;
  return `${h12}:${m} ${ampm}`;
}
function stickyNoteHue(ts){
  // Deterministic hue 0-360 from the note's timestamp, so each note keeps
  // the same color across re-renders. Skips the dingy yellow-green band.
  const n=Math.abs(parseInt(ts,10)||0);
  // 7 fixed sticky-note palettes, picked by ts modulo. Each is a tuple
  // [bg, border, tape] tuned to read on the dark drawer background.
  const palettes=[
    {bg:'#fde68a', bd:'#facc15', tp:'rgba(202,138,4,.55)'},   // amber
    {bg:'#fbcfe8', bd:'#ec4899', tp:'rgba(190,24,93,.55)'},   // pink
    {bg:'#bbf7d0', bd:'#22c55e', tp:'rgba(21,128,61,.55)'},   // green
    {bg:'#bfdbfe', bd:'#3b82f6', tp:'rgba(29,78,216,.55)'},   // blue
    {bg:'#ddd6fe', bd:'#8b5cf6', tp:'rgba(91,33,182,.55)'},   // purple
    {bg:'#fed7aa', bd:'#fb923c', tp:'rgba(154,52,18,.55)'},   // orange
    {bg:'#a5f3fc', bd:'#06b6d4', tp:'rgba(14,116,144,.55)'},  // cyan
  ];
  return palettes[n % palettes.length];
}
function renderNotesPanel(){
  const panel=document.getElementById('daily-notes-panel');
  if(!panel) return;
  const key=getLocalDateKey();
  const notes=getDailyNotes(key);
  const count=document.getElementById('daily-notes-count');
  const list=document.getElementById('daily-notes-list');
  const input=document.getElementById('daily-notes-input');
  if(count) count.textContent=`${notes.length} note${notes.length===1?'':'s'}`;
  if(input && input.dataset.prefill!=='1'){
    input.value='';
    input.dataset.prefill='1';
  }
  if(!list) return;
  if(!notes.length){
    list.innerHTML='<div class="daily-notes-empty">No notes yet for today.</div>';
    return;
  }
  // Newest first so the freshest sticky is on top.
  // Slight rotation per card adds the hand-stuck feel; rotation is
  // deterministic from the timestamp so cards don't jiggle on re-render.
  list.innerHTML=notes.slice().sort((a,b)=>b.ts-a.ts).map(n=>{
    const c=stickyNoteHue(n.ts);
    const rot=((parseInt(n.ts,10)||0) % 7) - 3; // -3 to +3 degrees
    const txt=String(n.text).replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return `<div class="daily-note-item sticky-card" style="background:${c.bg};border-color:${c.bd};--sticky-tape:${c.tp};transform:rotate(${rot}deg);">
      <div class="sticky-tape"></div>
      <button class="daily-note-del sticky-del" title="Delete note" data-del="${n.ts}">×</button>
      <div class="daily-note-text sticky-text">${txt}</div>
    </div>`;
  }).join('');
  list.querySelectorAll('[data-del]').forEach(btn=>{
    btn.addEventListener('click',()=>{
      deleteDailyNote(btn.dataset.del);
      renderNotesPanel();
      if(document.getElementById('tab-analytics')?.classList.contains('active')) renderAnalytics();
    });
  });
}
function buildDailyNotesSection(){
  const sec=document.createElement('div');
  sec.className='an-section';
  const key=getLocalDateKey();
  const notes=getDailyNotes(key).slice().sort((a,b)=>a.ts-b.ts);

  if(!notes.length){
    sec.innerHTML+='<div class="an-empty">No notes saved for today.</div>';

    list.appendChild(item);
  });
  sec.appendChild(list);
  return sec;
}

function buildInboundOutboundProjectionCards(){
  /* Boss-facing analytics summary: Today/Tomorrow × IHOSA/MHOAS.
     Shows source inbounds used, weighted net dwell, over-goal explanation,
     and the biggest driver by footage-weighted over-goal contribution. */
  const sec=document.createElement('div');
  sec.className='an-section boss-analytics-section';
  sec.innerHTML='<div class="an-section-title">Boss Summary — IHOSA / MHOAS Dwell Drivers</div>';

  const GOAL=24;
  const safeEsc=v=>{
    try{ return (typeof esc==='function')?esc(v):String(v==null?'':v).replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    catch(e){ return String(v==null?'':v); }
  };
  const fmtFt=n=>{
    try{ return (typeof fmtN==='function')?fmtN(n):String(Math.round(n||0).toLocaleString()); }
    catch(e){ return String(Math.round(n||0).toLocaleString()); }
  };
  const fmtHr=h=>(h===null || !isFinite(h))?'—':h.toFixed(1)+'H';
  const fmtDep=d=>{
    if(!d) return '—';
    try{ return (typeof fmtDT==='function')?fmtDT(d):d.toLocaleString(undefined,{month:'numeric',day:'numeric',hour:'2-digit',minute:'2-digit'}); }
    catch(e){ return String(d); }
  };
  const dwellClass=h=>{
    if(h===null || !isFinite(h)) return 'na';
    if(h<GOAL) return 'good';
    if(h<30) return 'warn';
    return 'risk';
  };
  const normTrain=v=>{
    try{ return (typeof normalizeOutboundTrain==='function')?normalizeOutboundTrain(v):String(v||'').trim().toUpperCase(); }
    catch(e){ return String(v||'').trim().toUpperCase(); }
  };
  const getArrSafe=train=>{ try{ return (typeof getArrival==='function')?getArrival(train):null; }catch(e){ return null; } };
  const parseArrSafe=v=>{
    try{ return (typeof parseManualArrivalDate==='function')?parseManualArrivalDate(v):(v?new Date(v):null); }
    catch(e){ return v?new Date(v):null; }
  };

  const BOSS_EDIT_STORE='dwellBossAnalyticsRowEditsV1';
  const loadBossRowEdits=()=>{ try{return JSON.parse(localStorage.getItem(BOSS_EDIT_STORE)||'{}')||{};}catch(e){return{};} };
  const bossRowKey=(scope,r)=>{
    const raw=[scope,r&&r.source,r&&r.track].map(x=>String(x==null?'':x).trim().toUpperCase()).join('||');
    return raw.replace(/[^A-Z0-9|_-]/g,'_').slice(0,180);
  };
  const applyBossOverrides=(scope,records)=>{
    const edits=loadBossRowEdits();
    return (records||[]).map(r=>{
      const key=bossRowKey(scope,r);
      const ov=edits[key];
      if(!ov) return {...r,_bossScope:scope,_bossKey:key};
      const ft=parseFloat(ov.ft);
      const dwell=parseFloat(ov.dwell);
      const rr={...r,_bossScope:scope,_bossKey:key};
      if(String(ov.source||'').trim()) rr.source=String(ov.source).trim().toUpperCase();
      if(String(ov.track||'').trim()) rr.track=String(ov.track).trim();
      if(isFinite(ft)) rr.ft=ft;
      if(isFinite(dwell)) rr.dwell=dwell;
      rr.overImpact=(rr.dwell!==null && isFinite(rr.dwell) && rr.dwell>GOAL) ? (rr.dwell-GOAL)*(rr.ft||1) : 0;
      rr._bossEdited=true;
      return rr;
    });
  };

  let ihosaGroups=[], mhoasGroups=[];
  try{
    const depDt=(typeof getIHOSA==='function')?getIHOSA():null;
    const selGroups=(typeof getSelectedGroups==='function')?getSelectedGroups(depDt):[];
    const trainForGroup=g=>{
      if(!g) return '';
      if(g.isManual) return normTrain(g.outbound || g._saTrain || (typeof getRideTrainValue==='function'?getRideTrainValue(g.key):'') || (typeof getOutboundSelValue==='function'?getOutboundSelValue(g.key):''));
      if(g.isForecast) return normTrain((typeof getRideTrainValue==='function'?getRideTrainValue(g.key):'') || (typeof getOutboundSelValue==='function'?getOutboundSelValue(g.key):'') || g.outbound);
      return normTrain((typeof getRideTrainValue==='function'?getRideTrainValue(g.key):'') || (typeof getOutboundSelValue==='function'?getOutboundSelValue(g.key):''));
    };
    ihosaGroups=(selGroups||[]).filter(g=>trainForGroup(g)==='IHOSA');
    mhoasGroups=(selGroups||[]).filter(g=>trainForGroup(g)==='MHOAS');
  }catch(e){ ihosaGroups=[]; mhoasGroups=[]; }

  const carExcl=(typeof carExclusions!=='undefined')?carExclusions:{};
  const activeCarsForGroup=g=>{
    const excl=(carExcl && carExcl[g.key]) || new Set();
    return (g.cars||[]).filter(car=>car && !(excl.has && excl.has(car.equipId)));
  };
  const carNet=(g,car,dep)=>{
    if(!g || !car || !dep) return null;
    let arr=null;
    if(g.isForecast) arr=g.forecastArrival || null;
    else if(g._manualArrDt) arr=g._manualArrDt;
    else arr=getArrSafe(g.train);
    if(!arr) return null;
    try{ return (typeof calcCarDwellWithSSState==='function')?calcCarDwellWithSSState(arr,dep,car,g):((dep-arr)/3600000); }
    catch(e){ return null; }
  };
  const recordsFromGroups=(groups,dep)=>{
    const out=[];
    (groups||[]).forEach(g=>{
      let ft=0,wt=0,tot=0,maxCar=null;
      const cars=[];
      if(g.isForecast){
        const d=(typeof calcGroupDwell==='function')?calcGroupDwell(g,dep):null;
        ft=parseFloat(g.totalLn)||0;
        if(d!==null && isFinite(d) && ft>0){ wt=d*ft; tot=ft; }
        cars.push({id:g.train||'FORECAST', ft:ft, dwell:d});
      }else{
        activeCarsForGroup(g).forEach(car=>{
          const cft=parseFloat(car.ln)||0;
          const w=cft||1;
          const d=carNet(g,car,dep);
          ft+=cft;
          if(d!==null && isFinite(d)){ wt+=d*w; tot+=w; cars.push({id:car.equipId||car.id||'', ft:cft, dwell:d}); if(!maxCar || d>maxCar.dwell) maxCar={id:car.equipId||car.id||'', ft:cft, dwell:d}; }
        });
      }
      const avg=tot>0?wt/tot:null;
      const over=avg!==null && avg>GOAL ? (avg-GOAL)*(ft||tot||1) : 0;
      const arr=g._manualArrDt || (g.isForecast ? (g.forecastArrival||null) : getArrSafe(g.train));
      out.push({
        source:g.train || g.key || 'UNKNOWN',
        track:g.track || g.outTrack || '—',
        ft:ft,
        dwell:avg,
        overImpact:over,
        cars:cars,
        maxCar:maxCar,
        arrival:arr
      });
    });
    return out;
  };
  const tomorrowRecords=(TRAIN)=>{
    let blocks=[];
    try{
      const all=(typeof window.loadManualAfterBlocks==='function'?window.loadManualAfterBlocks():(typeof loadManualAfterBlocks==='function'?loadManualAfterBlocks():[]))||[];
      blocks=all.filter(b=>{
        if(!b) return false;
        const isFuture=String(b.kind||b.type||'').toLowerCase()==='futureinbound';
        if(!isFuture) return false;
        const norm=(typeof normalizeFutureInboundBlockSafe==='function')
          ? normalizeFutureInboundBlockSafe(b.futureBlock || b.block || '')
          : ((typeof normalizeFutureInboundBlock==='function')?normalizeFutureInboundBlock(b.futureBlock || b.block || ''):String(b.futureBlock || b.block || '').trim().toUpperCase());
        return norm===TRAIN;
      });
    }catch(e){ blocks=[]; }
    return blocks.map(b=>{
      const ft=parseFloat(b.ft)||0;
      let nd=null;
      try{ nd=(typeof computeFutureInboundDwellPreview==='function')?computeFutureInboundDwellPreview(b.arrival, TRAIN):((typeof computeManualFutureNetDwell==='function')?computeManualFutureNetDwell(b):null); }
      catch(e){ nd=null; }
      const over=nd!==null && isFinite(nd) && nd>GOAL ? (nd-GOAL)*(ft||1) : 0;
      return {source:String(b.train||b.id||'FUTURE INBOUND'), track:String(b.outTrack||b.track||'—'), ft:ft, dwell:(nd!==null&&isFinite(nd))?nd:null, overImpact:over, cars:[], maxCar:null, arrival:parseArrSafe(b.arrival)};
    });
  };
  const weightedAvg=records=>{
    let wt=0,tot=0;
    (records||[]).forEach(r=>{ if(r.dwell===null || !isFinite(r.dwell)) return; const w=r.ft||1; wt+=r.dwell*w; tot+=w; });
    return tot>0?wt/tot:null;
  };
  const totalFt=records=>(records||[]).reduce((a,r)=>a+(parseFloat(r.ft)||0),0);
  const avgAge=records=>{
    const now=new Date(); let wt=0,tot=0;
    (records||[]).forEach(r=>{ if(!r.arrival || isNaN(new Date(r.arrival).getTime())) return; const age=(now-new Date(r.arrival))/3600000; if(!isFinite(age)) return; const w=r.ft||1; wt+=age*w; tot+=w; });
    return tot>0?wt/tot:null;
  };
  const sourceChips=records=>{
    if(!records.length) return '<span class="boss-chip muted">NO INBOUNDS SELECTED</span>';
    return records.slice(0,8).map(r=>'<span class="boss-chip">'+safeEsc(r.source)+' <b>['+safeEsc(r.track)+']</b></span>').join('')+(records.length>8?'<span class="boss-chip muted">+'+(records.length-8)+' MORE</span>':'');
  };
  const biggestDriver=records=>{
    const ranked=(records||[]).filter(r=>r.overImpact>0).sort((a,b)=>b.overImpact-a.overImpact);
    return ranked[0] || null;
  };
  const overWhy=(avg,records)=>{
    if(avg===null || !isFinite(avg)) return 'No dwell calculation available yet. Add/select cars or future inbound blocks.';
    if(avg<GOAL) return 'Under goal. No over-goal explanation needed.';
    const driver=biggestDriver(records);
    if(!driver) return 'Over goal because the weighted average is above 24H, but no single source has a clean driver value.';
    const carTxt=driver.maxCar ? ' Oldest/highest car: '+driver.maxCar.id+' at '+fmtHr(driver.maxCar.dwell)+'.' : '';
    return 'Over goal mainly because '+driver.source+' is carrying '+fmtFt(driver.ft)+' ft at '+fmtHr(driver.dwell)+'.'+carTxt;
  };
  const rowsHtml=(records,scope)=>{
    if(!records.length) return '<div class="boss-empty">No source inbounds found for this outbound.</div>';
    const sorted=records.slice().sort((a,b)=>(b.overImpact||0)-(a.overImpact||0));
    return '<div class="boss-detail-table"><div class="boss-detail-head"><span>Inbound source</span><span>Track</span><span>Ft</span><span>Dwell</span><span>Impact</span><span>Edit</span></div>'+sorted.map(r=>{
      const impact=r.overImpact>0?('+'+(r.overImpact/1000).toFixed(1)+'k ft-hr'):'—';
      const key=r._bossKey || bossRowKey(scope,r);
      return '<div class="boss-detail-row '+(r.overImpact>0?'over':'')+(r._bossEdited?' edited':'')+'" data-boss-row-key="'+safeEsc(key)+'" data-boss-scope="'+safeEsc(scope)+'" data-boss-source="'+safeEsc(r.source)+'" data-boss-track="'+safeEsc(r.track)+'" data-boss-ft="'+safeEsc(r.ft)+'" data-boss-dwell="'+safeEsc(r.dwell)+'"><span>'+safeEsc(r.source)+(r._bossEdited?' <b class="boss-edited-badge">EDITED</b>':'')+'</span><span>'+safeEsc(r.track)+'</span><span>'+fmtFt(r.ft)+'</span><span class="'+dwellClass(r.dwell)+'">'+fmtHr(r.dwell)+'</span><span>'+impact+'</span><span><button class="boss-row-edit-btn" type="button" title="Edit analytics row">✎</button></span></div>';
    }).join('')+'</div>';
  };
  const makeCard=(cfg)=>{
    const scope=(cfg.day+' '+cfg.train).trim().toUpperCase();
    cfg={...cfg,records:applyBossOverrides(scope,cfg.records)};
    const avg=weightedAvg(cfg.records);
    const ft=totalFt(cfg.records);
    const driver=biggestDriver(cfg.records);
    const status=avg===null?'NO DATA':(avg<GOAL?'UNDER GOAL':'OVER GOAL');
    const cls=dwellClass(avg);
    return '<details class="boss-train-card '+cfg.dayClass+' '+cfg.train.toLowerCase()+' '+cls+'" open>'+ 
      '<summary>'+ 
        '<div class="boss-card-top"><div><div class="boss-day">'+cfg.day+'</div><div class="boss-train">'+cfg.train+'</div></div><div class="boss-status '+cls+'">'+status+'</div></div>'+ 
        '<div class="boss-main-metrics"><div><span>WT NET DWELL</span><b class="'+cls+'">'+fmtHr(avg)+'</b></div><div><span>FOOTAGE</span><b>'+fmtFt(ft)+'</b></div><div><span>SOURCES</span><b>'+cfg.records.length+'</b></div></div>'+ 
        '<div class="boss-dep">DEP '+fmtDep(cfg.dep)+' · AVG AGE/ETA '+fmtHr(avgAge(cfg.records))+'</div>'+ 
        '<div class="boss-source-line">'+sourceChips(cfg.records)+'</div>'+ 
        '<div class="boss-why"><span>WHY / BIGGEST FACTOR</span>'+safeEsc(overWhy(avg,cfg.records))+'</div>'+ 
        (driver?'<div class="boss-driver">BIGGEST DRIVER: <b>'+safeEsc(driver.source)+'</b> · '+fmtFt(driver.ft)+' FT · '+fmtHr(driver.dwell)+'</div>':'')+
      '</summary>'+rowsHtml(cfg.records,scope)+'</details>';
  };

  let depTodayIHOSA=null, depTodayMHOAS=null, depTomIHOSA=null, depTomMHOAS=null;
  try{
    depTodayIHOSA=(typeof fixedProjectedDeparture==='function')?fixedProjectedDeparture('IHOSA',0):null;
    depTodayMHOAS=(typeof fixedProjectedDeparture==='function')?fixedProjectedDeparture('MHOAS',0):null;
    depTomIHOSA=(typeof getManualFutureReleaseDate==='function')?getManualFutureReleaseDate('IHOSA'):null;
    depTomMHOAS=(typeof getManualFutureReleaseDate==='function')?getManualFutureReleaseDate('MHOAS'):null;
    if(!depTomIHOSA && typeof fixedProjectedDeparture==='function') depTomIHOSA=fixedProjectedDeparture('IHOSA',1);
    if(!depTomMHOAS && typeof fixedProjectedDeparture==='function') depTomMHOAS=fixedProjectedDeparture('MHOAS',1);
  }catch(e){}

  const todayI=recordsFromGroups(ihosaGroups,depTodayIHOSA);
  const todayM=recordsFromGroups(mhoasGroups,depTodayMHOAS);
  const tomI=tomorrowRecords('IHOSA');
  const tomM=tomorrowRecords('MHOAS');
  const all=[...todayI,...todayM,...tomI,...tomM];
  const globalDriver=biggestDriver(all);
  const header=document.createElement('div');
  header.className='boss-overview';
  header.innerHTML='<div><div class="boss-overview-title">What drove dwell today?</div><div class="boss-overview-sub">Uses selected cars for today and Future Inbound blocks for tomorrow. Goal target: under 24H weighted net dwell.</div></div>'+ 
    '<div class="boss-overview-driver">'+(globalDriver?('BIGGEST FACTOR: <b>'+safeEsc(globalDriver.source)+'</b> · '+fmtHr(globalDriver.dwell)+' · '+fmtFt(globalDriver.ft)+' FT'):'BIGGEST FACTOR: —')+'</div>';
  sec.appendChild(header);

  const grid=document.createElement('div');
  grid.className='boss-train-grid';
  grid.innerHTML=
    makeCard({day:'TODAY',dayClass:'today',train:'IHOSA',dep:depTodayIHOSA,records:todayI})+
    makeCard({day:'TODAY',dayClass:'today',train:'MHOAS',dep:depTodayMHOAS,records:todayM})+
    makeCard({day:'TOMORROW',dayClass:'tomorrow',train:'IHOSA',dep:depTomIHOSA,records:tomI})+
    makeCard({day:'TOMORROW',dayClass:'tomorrow',train:'MHOAS',dep:depTomMHOAS,records:tomM});
  sec.appendChild(grid);
  return sec;
}


function addForecastRow(targetTrain){
  const id=Date.now()+Math.floor(Math.random()*100000);
  const nowIso = new Date().toISOString();
  const out=normalizeOutboundTrain(targetTrain) || getCarPickerTargetTrain() || normalizeOutboundTrain(departure) || 'IHOSA';
  const key=`FORECAST||${id}`;
  forecastRows.push({
    id,
    train:`HYP ${forecastRows.length+1}`,
    track:'',
    ft:'',
    arrival: nowIso,
    outbound: out
  });
  setOutboundSelValue(key,out);
  setRideTrainValue(key,out);
  saveForecastRows();
  return id;
}
function updateForecastRow(id, patch){
  const row=forecastRows.find(r=>String(r.id)===String(id));
  if(!row) return;
  Object.assign(row, patch||{});
  if(patch && ('outbound' in patch || 'departureTrain' in patch)){
    const out=normalizeOutboundTrain(patch.outbound || patch.departureTrain);
    const key=`FORECAST||${id}`;
    if(out){ setOutboundSelValue(key,out); setRideTrainValue(key,out); row.outbound=out; }
  }
  saveForecastRows();
}
function deleteForecastRow(id){
  const key=`FORECAST||${id}`;
  delete outboundSelStore[key];
  delete rideTrainStore[key];
  saveOutboundSelStore();
  saveRideTrainStore();
  forecastRows=forecastRows.filter(r=>String(r.id)!==String(id));
  saveForecastRows();
}
function getForecastGroups(depDt){
  return forecastRows.map((r,idx)=>{
    const ft=parseFloat(r.ft);
    const totalLn=isNaN(ft)?0:ft;
    const arr=new Date(r.arrival || Date.now());
    return {
      key:`FORECAST||${r.id}`,
      train:(r.train||`HYP ${idx+1}`).trim() || `HYP ${idx+1}`,
      track:(r.track||'').trim(),
      cars:[],
      totalLn,
      totalTons:0,
      isForecast:true,
      forecastId:r.id,
      forecastArrival:arr,
      forecastDeparture:depDt,
      outbound:normalizeOutboundTrain(r.outbound)
    };
  });
}
function getSelectedGroups(depDt){
  const baseGroups=buildGroups()
    .filter(g=>rideSet.has(g.key))
    .map(g=>{
      // SA-picked cars stay visible in the dropdown, but are removed from the parent ride group
      // so they only count under their IHOSA/MHOAS SA consist.
      const selectedOnTrack=manualSel[g.track]||{};
      const selectedIds=new Set(Object.keys(selectedOnTrack));
      if(!selectedIds.size) return g;
      const cars=(g.cars||[]).filter(c=>!selectedIds.has(String(c.equipId||'')));
      return {
        ...g,
        cars,
        totalLn:cars.reduce((a,c)=>a+(parseFloat(c.ln)||0),0),
        totalTons:cars.reduce((a,c)=>a+(parseFloat(c.tons)||0),0)
      };
    })
    .filter(g=>(g.cars||[]).length || g.isForecast);

  return [
    ...baseGroups,
    ...getManualGroups(),
    ...getForecastGroups(depDt)
  ];
}

const MHOAS_BLOCKS=new Set(['ALS','DEDS','DUDS','G4DS','KCDS','MNDS','MQPG','OADS','SCDS','SEDS']);

function getSelectedTrainWarnings(groups, depName){
  const warnings=[];
  const dep=(depName||'').toUpperCase();
  const oppBlocks=dep==='IHOSA' ? MHOAS_BLOCKS : dep==='MHOAS' ? IHOSA_BLOCKS : null;
  const selected=(Array.isArray(groups)?groups:[]).filter(g=>!g.isForecast);
  const getActiveCars=g=>{
    const excl=carExclusions[g.key]||new Set();
    return (g.cars||[]).filter(car=>car && !excl.has(car.equipId));
  };

  const getSeq=(g, idx)=>idx+1;
  const fmtTrack=(trk)=>`TRACK ${trk||'—'}`;
  const fmtRange=(nums)=>{
    const a=[...new Set(nums)].sort((x,y)=>x-y);
    if(!a.length) return '';
    const parts=[];
    let s=a[0], p=a[0];
    for(let i=1;i<a.length;i++){
      const n=a[i];
      if(n===p+1){ p=n; continue; }
      parts.push(s===p?`${s}`:`${s}-${p}`);
      s=p=n;
    }
    parts.push(s===p?`${s}`:`${s}-${p}`);
    return parts.join(',');
  };
  const fmtLocGroup=(items)=>{
    const byTrack=new Map();
    items.forEach(it=>{
      const key=String(it.track||'—');
      if(!byTrack.has(key)) byTrack.set(key, []);
      byTrack.get(key).push(it);
    });
    return [...byTrack.entries()].map(([trk, arr])=>{
      const byBlk=new Map();
      arr.forEach(it=>{
        const key=String(it.blk||'').trim().toUpperCase() || '';
        if(!byBlk.has(key)) byBlk.set(key, []);
        byBlk.get(key).push(it.seq);
      });
      const pieces=[...byBlk.entries()].map(([blk, seqs])=>{
        const range=fmtRange(seqs);
        return blk ? `${fmtTrack(trk)} SEQ ${range} [${blk}]` : `${fmtTrack(trk)} SEQ ${range}`;
      });
      return pieces.join('; ');
    }).join(' | ');
  };

  const seen=new Map();
  const dupHits=[];
  selected.forEach(g=>{
    const activeCars=getActiveCars(g);
    if(!activeCars.length) return;
    activeCars.forEach((car,idx)=>{
      const id=String(car?.equipId||'').trim();
      if(!id) return;
      const ref={train:g.train||'—', track:g.track||'—', seq:getSeq(g, idx)};
      if(seen.has(id)){
        dupHits.push({id, first:seen.get(id), second:ref});
      }else{
        seen.set(id, ref);
      }
    });
  });
  if(dupHits.length){
    const sample=dupHits.slice(0,2).map(d=>`${d.id} @ ${fmtTrack(d.first.track)} · SEQ ${d.first.seq} / ${fmtTrack(d.second.track)} · SEQ ${d.second.seq}`).join('; ');
    warnings.push({
      level:'red',
      title:'Duplicate cars selected',
      text:`${dupHits.length} duplicate car${dupHits.length===1?'':'s'} are already on the consist${sample?` — ${sample}${dupHits.length>2?'…':''}`:''}.`,
      loc:fmtLocGroup([
        {track:dupHits[0]?.first.track, seq:dupHits[0]?.first.seq},
        {track:dupHits[0]?.second.track, seq:dupHits[0]?.second.seq},
        ...dupHits.slice(1).flatMap(d=>[
          {track:d.first.track, seq:d.first.seq},
          {track:d.second.track, seq:d.second.seq}
        ])
      ])
    });
  }

  // BO detection: manual boSet dropdown OR car BK data contains BO only
  const boCarItems=[];
  selected.forEach(g=>{
    const manualBO=boSet.has(g.key);
    const activeCars=getActiveCars(g);
    if(!activeCars.length) return;
    activeCars.forEach((car,idx)=>{
      const bk1=String(car.bk1||'').toUpperCase().trim();
      const bk2=String(car.bk2||'').toUpperCase().trim();
      const yd=String(car.ydBlock||'').toUpperCase().trim();
      const tih=String(car.timeInHold||'').toUpperCase().trim();
      const isBO=manualBO||bk2.includes('BO')||bk1.includes('BO')||yd.includes('BO');
      if(isBO) boCarItems.push({blk:bk2||bk1||yd||'BO', track:g.track, seq:getSeq(g,idx)});
    });
  });
  if(boCarItems.length){
    warnings.push({
      level:'red',
      title:'Bad order / hold requiring service',
      text:`${boCarItems.length} car${boCarItems.length===1?'':'s'} flagged BO — verify status and confirm clearance before departure.`,
      loc:fmtLocGroup(boCarItems)
    });
  }

  if(oppBlocks){
    const bad=[];
    selected.forEach(g=>{
      const activeCars=getActiveCars(g);
      if(!activeCars.length) return;
      activeCars.forEach((car,idx)=>{
        const blk=getCarBlock(car);
        if(oppBlocks.has(blk)) bad.push({blk, track:g.track, seq:getSeq(g, idx)});
      });
    });
    if(bad.length){
      warnings.push({
        level:'yellow',
        title:`${dep==='IHOSA'?'MHOAS':'IHOSA'} blocks on ${dep} train`,
        text:`${bad.length} car${bad.length===1?'':'s'} carry opposite-family blocks.`,
        loc:fmtLocGroup(bad)
      });
    }
  }

  return warnings;
}
if(typeof window._ignoredWarnings==='undefined') window._ignoredWarnings=new Set();

function renderTrainWarnings(groups, depName){
  const all=getSelectedTrainWarnings(groups, depName);
  const active=all.filter(w=>!window._ignoredWarnings.has(w.title));
  const ignoredCount=all.length-active.length;
  if(!active.length){
    if(ignoredCount){
      return `<div class="train-warn-wrap"><div style="font-family:var(--mono);font-size:9px;color:#475569;padding:4px 0;">
        ${ignoredCount} warning${ignoredCount>1?'s':''} hidden
        <span class="train-warn-unignore" data-unignore-all="1">Show all</span>
      </div></div>`;
    }
    return '';
  }
  return `<div class="train-warn-wrap">
    ${active.map(w=>`
      <div class="train-warn-card ${w.level}" data-wid="${encodeURIComponent(w.title)}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;">
          <div class="train-warn-title">${w.title}</div>
          <button class="train-warn-ignore" data-ignore="${encodeURIComponent(w.title)}">Ignore</button>
        </div>
        <div class="train-warn-text">${w.text}</div>
        ${w.loc ? `<span class="train-warn-loc">${w.loc}</span>` : ''}
      </div>`).join('')}
    ${ignoredCount?`<div style="font-family:var(--mono);font-size:9px;color:#475569;padding:2px 0;">
      ${ignoredCount} warning${ignoredCount>1?'s':''} hidden
      <span class="train-warn-unignore" data-unignore-all="1">Show all</span>
    </div>`:''}
  </div>`;
}

function wireWarningIgnoreButtons(container){
  container.querySelectorAll('.train-warn-ignore').forEach(btn=>{
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      const id=decodeURIComponent(btn.dataset.ignore||'');
      if(id) window._ignoredWarnings.add(id);
      renderOB();
    });
  });
  container.querySelectorAll('[data-unignore-all]').forEach(el=>{
    el.addEventListener('click',e=>{
      e.stopPropagation();
      window._ignoredWarnings.clear();
      renderOB();
    });
  });
}
