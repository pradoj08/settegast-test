    return wrap;
  }

  const strip=document.createElement('div');strip.className='consist-strip';
  const sorted=groups.slice().sort((a,b)=>(a.isForecast?1:0)-(b.isForecast?1:0)||(parseInt(a.track)||0)-(parseInt(b.track)||0)||a.train.localeCompare(b.train));

  // Calc total active footage for percent bars
  const totalActiveFt=sorted.reduce((sum,g)=>{
    if(g.isForecast) return sum + (parseFloat(g.totalLn)||0);
    const excl=carExclusions[g.key]||new Set();
    return sum+g.cars.filter(c=>!excl.has(c.equipId)).reduce((s,c)=>s+(parseFloat(c.ln)||0),0);
  },0);

  sorted.forEach((g,idx)=>{
    const excl=carExclusions[g.key]||new Set();
    const activeCars=g.cars.filter(c=>!excl.has(c.equipId));
    const activeFt=g.isForecast ? (parseFloat(g.totalLn)||0) : activeCars.reduce((s,c)=>s+(parseFloat(c.ln)||0),0);
    const dwell=calcGroupDwell(g,depDt);
    const ssTotal=calcGroupSS(g);
    const {dt:arrDt,source:_src}=getArrivalInfo(g.train);
    const statusCls=dwell===null?'na':dwell<=21?'good':dwell<=24?'warn':'risk';
    const statusTxt=dwell===null?'N/A':dwell<=21?'GOOD':dwell<=24?'WATCH':'RISK';
    const carCount=activeCars.length;
    const exclCount=g.cars.length-activeCars.length;
    const pct=totalActiveFt>0?Math.round((activeFt/totalActiveFt)*100):0;

    const card=document.createElement('div');
    card.className=`consist-car ${statusCls}`;

    card.innerHTML=`
      <div class="consist-body">
        <div class="consist-top">
          <div class="consist-title">
            <div class="consist-train">${g.train||'—'}</div>
            <div class="consist-track">TRK ${g.track||'—'} · ${carCount} CAR${carCount===1?'':'S'}</div>
          </div>
          <div class="consist-pill ${statusCls}">${statusTxt}</div>
        </div>

        <div class="consist-meta">
          <div class="consist-mini">
            <span class="label"></span>
            <span class="value">${fmtN(activeFt)}</span>
          </div>
          <div class="consist-mini ${statusCls}">
            <span class="label">Dwell</span>
            <span class="value">${fmtDwell(dwell)}</span>
          </div>
          <div class="consist-mini">
            <span class="label">SS Total</span>
            <span class="value">${fmtDwell(ssTotal)}</span>
          </div>
          <div class="consist-mini">
            <span class="label">Cars</span>
            <span class="value">${carCount}</span>
          </div>
        </div>

        ${(() => { const hist=getOutboundHistoryTextForGroup(g,depDt); return hist ? `<div class="consist-history"><span class="hist-label">CAR HISTORY</span>${hist}</div>` : ''; })()}

        <div class="consist-pct-wrap">
          <div class="consist-pct-bar-bg">
            <div class="consist-pct-bar-fill" style="width:${pct}%"></div>
          </div>
          <div class="consist-pct-label">${pct}%</div>
        </div>

        <div class="consist-foot">
          ${arrDt ? 'ARR ' + fmtDT(arrDt) : 'ARR —'}${exclCount ? ' · ' + exclCount + ' excl.' : ''}
        </div>
      </div>
    `;

    strip.appendChild(card);
    if(idx<sorted.length-1){
      const coup=document.createElement('div');
      coup.className='consist-coupler';
      strip.appendChild(coup);
    }
  });

  wrap.appendChild(strip);
  return wrap;
}


if(typeof window._obOpenExpIds === 'undefined') window._obOpenExpIds = new Set();

function setExpandedRowsVisibility(tbl, expId, open){
  if(!tbl || !expId) return;
  if(open){ window._obOpenExpIds.add(expId); } else { window._obOpenExpIds.delete(expId); }
  tbl.querySelectorAll('.'+expId).forEach(r=>{
    const isRow = r.classList.contains('exp-row') || r.classList.contains('exp-hdr') || r.classList.contains('exp-total-row');
    if(!isRow) return;
    if(open){
      r.classList.remove('hidden');
      r.style.display='table-row';
    }else{
      r.classList.add('hidden');
      r.style.display='none';
    }
  });
}


function toggleExpandedRowSelection(chk, row, car, groupKey, isSelPanel){
  const selected = !!chk.checked;
  if(selected){
    if(!carExclusions[groupKey]) carExclusions[groupKey] = new Set();
    carExclusions[groupKey].delete(car.equipId);
  }else{
    if(!carExclusions[groupKey]) carExclusions[groupKey] = new Set();
    carExclusions[groupKey].add(car.equipId);
  }
  if(row) row.classList.toggle('row-selected', selected);
  if(isSelPanel && typeof renderOB === 'function') renderOB();
}

function wireConsistBlankRowButton(wrap){

      }else{
        deselectAllCarsForGroup(g);
        if(isSel && consistName && getOutboundSelValue(g.key)===consistName) setOutboundSelValue(g.key, '');
      }

    });
    if(g.isManual){

    tdR.appendChild(chR);tr.appendChild(tdR);

    // OUTBOUND
    const tdO=mk('td','td-outbound');
    const outSel=document.createElement('select');
    outSel.className='outbound-select';
    outSel.dataset.gkey=g.key||'';

      outSel.appendChild(o);
    });
    outSel.addEventListener('change',()=>{
      // Changing OUTBOUND sets the target for the NEXT user action only for normal grouped rows.

    const tnWrap=mk('div','td-train-wrap');

    const activeLn=()=>{const ex=carExclusions[g.key]||new Set();return g.cars.filter(c=>!ex.has(c.equipId)).reduce((a,c)=>a+c.ln,0);};
    const tdFt=mk('td','td-ft');tdFt.textContent=fmtN(activeLn());tr.appendChild(tdFt);

    const tdD=mk('td',dwCls);

    // SS Start, SS End — inline editable inputs
    // Auto-detect SS: BK2 contains "SS" → TIME IN HOLD is the compact start timestamp
    // Pick the earliest SS start across all cars in the group
    if(!ssStore[g.key]){
      const earliest=getGroupAutoSSStart(g);
      if(earliest)ssStore[g.key]={start:earliest,end:null,autoDetected:true};
    }

    const ssEntry=ssStore[g.key]||{start:null,end:null};
    const isAutoDetected=ssEntry.autoDetected&&!ssEntry.end;
    const ssTotalFinal=getSSTotalValue(g);

    function makeSSInput(field, current, autoFlag){
      const td=mk('td');td.style.cssText='white-space:nowrap;';

      // Pill element — shows time or placeholder, click to edit inline
      const pill=mk('span','ss-pill'+(current?' has-val':'')+(autoFlag&&field==='start'?' auto-detected':''));
      const icon=mk('i');icon.className='ti ti-clock';icon.style.fontSize='11px';icon.setAttribute('aria-hidden','true');

      pill.appendChild(icon);
      pill.appendChild(pillTxt);
      if(autoFlag&&field==='start'){
        const ab=mk('span','ss-auto-badge');ab.textContent='AUTO';pill.appendChild(ab);
        pill.title='Auto-detected from TIME IN HOLD — click to confirm or edit';
      }

      pill.addEventListener('click',()=>{
        // Switch pill to editing mode

        inp.placeholder='MM/DD/YYYY HH:MM';
        inp.value=current?fmtDT(current):'';
        pill.appendChild(inp);
        inp.focus();inp.select();

        function commit(){
          const val=inp.value.trim();
          const dt=parseSSDt(val);
          if(!ssStore[g.key])ssStore[g.key]={start:null,end:null};
          if(val===''||val==='—'){
            ssStore[g.key][field]=null;ssStore[g.key].autoDetected=false;
            current=null;
          } else if(dt){
            ssStore[g.key][field]=dt;ssStore[g.key].autoDetected=false;
            current=dt;
          } else {
            toast('Invalid — use MM/DD/YYYY HH:MM');
            current=ssStore[g.key][field];
          }
          // Rebuild pill display
          pill.className='ss-pill'+(current?' has-val':'');
          pill.innerHTML='';
          const ic2=mk('i');ic2.className='ti ti-clock';ic2.style.fontSize='11px';ic2.setAttribute('aria-hidden','true');

        inp.addEventListener('blur',commit);

          if(nextState && (selectedTrain==='IHOSA' || selectedTrain==='MHOAS')){

      carRow.addEventListener('mousedown',e=>{

function applyOutboundFilter(tblWrap, groups){
  if(!tblWrap)return;
  const rows=tblWrap.querySelectorAll('tbody tr');
  if(!rows.length)return;

  rows.forEach(tr=>{
    // Only process main data rows (have data-track stamped on them)
    if(!tr.dataset.track&&!tr.dataset.gkey){
      // expand/hdr rows — leave as-is (hidden by expand toggle)
      return;
    }
    const track=parseInt(tr.dataset.track)||0;
    let show=true;
    if(outboundFilter==='working') show=track>=801&&track<=809;
    tr.style.display=show?'':'none';
    // Also hide expand rows for this group when row is hidden
    const expBtn=tr.querySelector('.td-expand-btn');
    if(expBtn&&expBtn.dataset.target){
      const expId=expBtn.dataset.target;
      tblWrap.querySelectorAll('.'+expId).forEach(r=>{
        r.style.display=show?r.classList.contains('hidden')?'none':'':'none';
      });
      if(!show&&expBtn.classList.contains('open')){
        expBtn.classList.remove('open');expBtn.textContent='▸';
      }
    }
  });
}

function getManualSelectionMeta(track, carId){
  const entry = manualSel?.[track]?.[carId];
  const train = String(entry?._saTrain || entry?._group?.train || entry?.train || '').trim();
  const upper = train.toUpperCase();
  return {
    selected: !!entry,
    train,
    sa: !!entry && (upper === 'IHOSA' || upper === 'MHOAS')
  };
}

function getGroupRideTrain(group){
  if(!group) return '';
  return getRideTrainValue(group.key);
}
function getGroupTargetTrain(group){
  if(!group) return '';
  // In the Car Picker, the header IHOSA/MHOAS selector is the active assignment target.
  // The per-group OUTBOUND dropdown remains a fallback only when no Car Picker target is chosen.
  // This prevents a stale row dropdown value from assigning IHOSA-picked cars as MHOAS / AS.
  return getCarPickerTargetTrain() || getOutboundTargetTrain(group.key);
}
function getGroupOutboundTrain(group){
  return getGroupRideTrain(group);
}

function getCarSelectionMeta(track, carId, group){
  const manual=getManualSelectionMeta(track, carId);
  if(manual.selected) return {...manual, source:'manual'};
  const gTrain=getGroupOutboundTrain(group);
  const gKey=group?.key || '';
  const excluded=!!(gKey && carExclusions[gKey] && carExclusions[gKey].has(carId));
  if(gKey && rideSet.has(gKey) && gTrain && !excluded){
    return {selected:true, train:gTrain, sa:true, source:'group'};
  }
  return {selected:false, train:'', sa:false, source:''};
}

function setManualCarSelection(track, car, group, assignedTrain){
  const carId=String(car?.equipId||'').trim();
  if(!track || !carId) return;
  const train=String(assignedTrain || getGroupOutboundTrain(group) || departure || group?.train || 'UNKNOWN').trim().toUpperCase();
  const isSaTrain=train==='IHOSA' || train==='MHOAS';
  if(!manualSel[track]) manualSel[track]={};
  manualSel[track][carId]={
    ...car,
    _group:{...(group||car?._group||{}), train:train || (group?.train) || 'UNKNOWN', track, key:group?.key},
    _sa:isSaTrain,
    _saTrain:train || (group?.train) || 'UNKNOWN'
  };
}

function removeManualCarSelection(track, carId){
  if(manualSel[track] && manualSel[track][carId]){
    delete manualSel[track][carId];
    if(!Object.keys(manualSel[track]).length) delete manualSel[track];
  }
}


function removeManualSelectionsForGroup(group){
  if(!group || !manualSel) return;
  const groupKey=String(group.key||'');
  const groupTrack=String(group.track||'');
  const carIds=new Set((group.cars||[]).map(c=>String(c?.equipId||'').trim()).filter(Boolean));
  Object.keys(manualSel).forEach(track=>{
    const carMap=manualSel[track]||{};
    Object.keys(carMap).forEach(carId=>{
      const entry=carMap[carId]||{};
      const entryKey=String(entry?._group?.key||'');
      const sameGroupKey=groupKey && entryKey===groupKey;
      const sameTrackCar=String(track)===groupTrack && carIds.has(String(carId).trim());
      if(sameGroupKey || sameTrackCar){
        delete carMap[carId];
      }
    });
    if(!Object.keys(carMap).length) delete manualSel[track];
  });
}

function deselectAllCarsForGroup(group){
  if(!group) return;
  if(group.key){
    rideSet.delete(group.key);
    clearRideTrainValue(group.key);
  }
  if(group.key && carExclusions[group.key]) delete carExclusions[group.key];
  removeManualSelectionsForGroup(group);
}

function getManualGroups(){
  // Manual Car Picker selections must populate the consist in the same physical format
  // as DWELL TURNOVER (GROUPED): inbound train + track + BK1/BK2/Yard Block status
  // + directly adjacent TRACK SEQ. The assigned outbound (IHOSA/MHOAS) is metadata,
  // not the displayed inbound train name.
  const rows=[];
  Object.entries(manualSel||{}).forEach(([track,carMap])=>{
    Object.values(carMap||{}).forEach(car=>{
      const outbound=normalizeOutboundTrain(car?._saTrain || car?._group?.outbound || car?._group?.train || car?.outbound || '');
      if(outbound!=='IHOSA' && outbound!=='MHOAS') return;
      const inbound=String(car?.train || car?._inboundTrain || car?._group?.inboundTrain || car?._group?.originalTrain || 'UNKNOWN').trim() || 'UNKNOWN';
      const trk=String(car?.track || track || car?._group?.track || '').trim();
      const seq=seqNumValue(car?.trackSeq);
      rows.push({
        outbound,
        train:inbound,
        track:trk,
        seq,
        rowIndex:Number.isFinite(parseInt(car?._rowIndex,10)) ? parseInt(car._rowIndex,10) : rows.length,
        blockToken:physicalBlockToken(car),
        car
      });
    });
  });

  rows.sort((a,b)=>{
    const ao=a.outbound.localeCompare(b.outbound); if(ao) return ao;
    const at=parseInt(a.track,10), bt=parseInt(b.track,10);
    const ta=Number.isFinite(at)?at:999999;
    const tb=Number.isFinite(bt)?bt:999999;
    if(ta!==tb) return ta-tb;
    const as=a.seq!==null?a.seq:a.rowIndex;
    const bs=b.seq!==null?b.seq:b.rowIndex;
    if(as!==bs) return as-bs;
    const tn=a.train.localeCompare(b.train); if(tn) return tn;
    return a.rowIndex-b.rowIndex;
  });

  const groups=[];
  let cur=null, last=null;
  const finish=()=>{
    if(!cur) return;
    cur.totalLn=cur.cars.reduce((a,c)=>a+(parseFloat(c.ln)||0),0);
    cur.totalTons=cur.cars.reduce((a,c)=>a+(parseFloat(c.tons)||0),0);
    const first=cur.cars[0]||{};
    const lastCar=cur.cars[cur.cars.length-1]||first;
    const firstSeq=seqNumValue(first.trackSeq);
    const lastSeq=seqNumValue(lastCar.trackSeq);
    cur.seqStart=firstSeq!==null ? firstSeq : cur.firstRow+1;
    cur.seqEnd=lastSeq!==null ? lastSeq : cur.lastRow+1;
    cur.seqLabel=makeGroupSequenceLabel(cur);
    cur.key=['MANUAL',cur.outbound,cur.train,cur.track,'SEQ',cur.seqStart,cur.seqEnd,'R',cur.firstRow,cur.lastRow].join('||');
    groups.push(cur);
    cur=null;
  };

  rows.forEach(item=>{
    const sameOutbound=cur && item.outbound===cur.outbound;
    const sameTrainTrack=cur && item.train===cur.train && item.track===cur.track;
    const samePhysicalBlock=cur && item.blockToken===cur.blockToken;
    const bothSeq=last && item.seq!==null && last.seq!==null;
    const adjacentSeq=bothSeq ? item.seq===last.seq+1 : (last ? item.rowIndex===last.rowIndex+1 : false);
    const keepTogether=!!(sameOutbound && sameTrainTrack && samePhysicalBlock && adjacentSeq);
    if(!keepTogether){
      finish();
      cur={
        key:'',
        outbound:item.outbound,
        train:item.train,
        track:item.track,
        cars:[],
        totalLn:0,
        totalTons:0,
        firstRow:item.rowIndex,
        lastRow:item.rowIndex,
        blockToken:item.blockToken,
        blockLabel:item.blockToken==='NO_BLOCK' ? '' : item.blockToken,
        seqStart:null,
        seqEnd:null,
        seqLabel:'',
        isManual:true
      };
    }
    cur.cars.push(item.car);
    cur.lastRow=item.rowIndex;
    last=item;
  });
  finish();

  return groups.map(g=>{
    const {dt:arrDt}=getArrivalInfo(g.train);
    return {...g,_manualArrDt:arrDt};
  });
}





// Tracks which track sections the user has expanded in the car picker —
// persisted across renderOB() rebuilds so toggling a car doesn't collapse the panel.
// Inline arrival editor that saves directly to the train bank
function showCpArrEdit(anchorSpan, trainName){
  // If already showing an editor, close it
  const existing = anchorSpan.querySelector('.cp-arr-editor');
  if(existing){ existing.remove(); return; }

  const editor = document.createElement('div');
  editor.className = 'cp-arr-editor';
  editor.style.cssText = 'display:inline-flex;align-items:center;gap:4px;margin-left:4px;';
  editor.addEventListener('click', e=>e.stopPropagation());

  const key = trainName.trim().toUpperCase();
  const found = Object.keys(trainBank).find(k=>k.toUpperCase()===key);
  const currentIso = found ? trainBank[found] : '';

  const inp = document.createElement('input');
  inp.type = 'datetime-local';
  inp.value = currentIso ? currentIso.slice(0,16) : '';
  inp.style.cssText = 'background:#0d0f14;border:1px solid rgba(251,191,36,.4);border-radius:3px;color:#fbbf24;font-family:var(--mono);font-size:10px;padding:2px 5px;width:148px;color-scheme:dark;';

  const saveBtn = document.createElement('button');
  saveBtn.textContent = '✓';
  saveBtn.title = 'Save to bank';
  saveBtn.style.cssText = 'background:rgba(251,191,36,.15);border:1px solid rgba(251,191,36,.4);border-radius:3px;color:#fbbf24;font-family:var(--mono);font-size:11px;font-weight:700;padding:1px 6px;cursor:pointer;';
  saveBtn.addEventListener('click', e=>{
    e.stopPropagation();
    const name = found || trainName.trim();
    trainBank[name] = inp.value ? new Date(inp.value).toISOString() : '';
    saveTB();
    toast(name + ' arrival saved to bank');
    renderOB();
  });

  const cancelBtn = document.createElement('button');
  cancelBtn.textContent = '✕';
  cancelBtn.title = 'Cancel';
  cancelBtn.style.cssText = 'background:transparent;border:1px solid rgba(255,255,255,.1);border-radius:3px;color:#64748b;font-family:var(--mono);font-size:11px;padding:1px 5px;cursor:pointer;';
  cancelBtn.addEventListener('click', e=>{ e.stopPropagation(); editor.remove(); });

  inp.addEventListener('keydown', e=>{
    if(e.key==='Enter') saveBtn.click();
    if(e.key==='Escape') cancelBtn.click();
  });

  editor.append(inp, saveBtn, cancelBtn);
  // Clear the span and show just the editor
  anchorSpan.innerHTML = '';
  anchorSpan.appendChild(editor);
  requestAnimationFrame(()=>inp.focus());
}

if(typeof window._cpOpenTracks === 'undefined') window._cpOpenTracks = new Set();
if(typeof window._cpDefaultWorkingExpandedApplied === 'undefined') window._cpDefaultWorkingExpandedApplied = false;
if(typeof window._cpTrackFilter === 'undefined') window._cpTrackFilter = 'working';

function buildCarPicker(groups){
  const wrap=document.createElement('div');wrap.className='cp-wrap';

  // header
  const hdr=document.createElement('div');hdr.className='cp-header';
  const title=document.createElement('span');title.className='cp-title';title.textContent='CAR PICKER';
  const totalSel=Object.values(manualSel).reduce((a,m)=>a+Object.keys(m).length,0) + groups.reduce((a,g)=>{
    const train=getGroupOutboundTrain(g);
    if(!(rideSet.has(g.key)&&train)) return a;
    const ex=carExclusions[g.key]||new Set();
    return a+(g.cars||[]).filter(c=>!ex.has(String(c.equipId||'').trim())).length;
  },0);
  const sub=document.createElement('span');sub.className=totalSel?'cp-sel-badge':'cp-subtitle';
  sub.textContent=totalSel>0?`${totalSel} car${totalSel===1?'':'s'} selected`:'Pick individual cars below';
  const clearBtn=document.createElement('button');clearBtn.className='cp-clear-btn';clearBtn.textContent='CLEAR ALL';
  const collapseBtn=document.createElement('button');collapseBtn.className='cp-collapse-btn';
  if(typeof window._cpPickerCollapsed==='undefined') window._cpPickerCollapsed=false;
  let pickerCollapsed=window._cpPickerCollapsed;
  collapseBtn.textContent=pickerCollapsed?'EXPAND':'COLLAPSE';

  clearBtn.addEventListener('click',()=>{
    manualSel={};
    rideSet.clear();
    carExclusions={};
    renderOB();
    toast('All car selections cleared');
  });

  hdr.appendChild(title);hdr.appendChild(sub);

  // ── Car Picker outbound target ──
  // This sets the assignment target for the next individual car/range selections made
  // from the car picker header. It does not reassign already-selected cars.
  const targetBar=document.createElement('div');
  targetBar.className='cp-target-group';
  const targetLabel=document.createElement('span');
  targetLabel.className='cp-target-label';
  targetLabel.textContent='SEND TO';
  targetBar.appendChild(targetLabel);
  const targetBtns={};
  ['IHOSA','MHOAS'].forEach(train=>{
    const btn=document.createElement('button');
    btn.type='button';
    btn.className='cp-target-btn '+train.toLowerCase();
    btn.textContent=train;
    btn.title='Set car picker selection target to '+train;
    targetBtns[train]=btn;
    btn.addEventListener('click',e=>{
      e.stopPropagation();
      setCarPickerTargetTrain(train);
      Object.entries(targetBtns).forEach(([name,b])=>b.classList.toggle('active',name===getCarPickerTargetTrain()));
      toast('Car Picker target set to '+train);
    });
    targetBar.appendChild(btn);
  });
  Object.entries(targetBtns).forEach(([name,b])=>b.classList.toggle('active',name===getCarPickerTargetTrain()));
  hdr.appendChild(targetBar);

  // ── Filter buttons ──
  const filterBar=document.createElement('div');
  filterBar.style.cssText='display:flex;gap:4px;margin-left:8px;';
  const cpFilters=[
    {val:'working', label:'WORKING 801–809'},
    {val:'all',     label:'ALL TRACKS'},
    {val:'ss',      label:'SS ONLY'},
  ];
  const filterBtnMap={};
  cpFilters.forEach(f=>{
    const fb=document.createElement('button');
    fb.style.cssText='padding:3px 10px;border-radius:4px;border:1px solid rgba(255,255,255,.12);font-size:9px;font-weight:700;letter-spacing:.7px;text-transform:uppercase;cursor:pointer;font-family:var(--mono);transition:all .15s;background:transparent;color:rgba(255,255,255,.35);';
    fb.textContent=f.label;
    filterBtnMap[f.val]=fb;
    const setActive=()=>{
      Object.values(filterBtnMap).forEach(b=>{
        b.style.background='transparent';b.style.color='rgba(255,255,255,.35)';b.style.borderColor='rgba(255,255,255,.12)';
      });
      fb.style.background='rgba(34,197,94,.18)';fb.style.color='#4ade80';fb.style.borderColor='rgba(34,197,94,.4)';
    };
    fb.addEventListener('click',()=>{
      window._cpTrackFilter=f.val;
      setActive();
      // show/hide sections without full re-render
      body.querySelectorAll('.cp-track-section').forEach(sec=>{
        const t=sec.dataset.track||'';
        const tNum=parseInt(t)||0;
        const hasSSInSec=sec.dataset.hasSs==='1';
        let show=true;
        if(window._cpTrackFilter==='working') show=tNum>=801&&tNum<=809;
        else if(window._cpTrackFilter==='ss') show=hasSSInSec;
        sec.style.display=show?'':'none';
      });
    });
    filterBar.appendChild(fb);
  });
  // Set initial active state
  const _initActive=filterBtnMap[window._cpTrackFilter]||filterBtnMap['working'];
  _initActive.style.background='rgba(34,197,94,.18)';_initActive.style.color='#4ade80';_initActive.style.borderColor='rgba(34,197,94,.4)';

  hdr.appendChild(filterBar);

  // ── Quick-expand buttons for working tracks 801-809 ──
  const quickBar=document.createElement('div');
  quickBar.style.cssText='display:flex;gap:3px;margin-left:4px;flex-wrap:wrap;';
  for(let t=801;t<=809;t++){
    const tb=document.createElement('button');
    const tStr=String(t);
    const isOpen=window._cpOpenTracks.has(tStr);
    tb.textContent=tStr;
    tb.dataset.qtrack=tStr;
    tb.style.cssText=`padding:2px 7px;border-radius:4px;border:1px solid ${isOpen?'rgba(34,197,94,.4)':'rgba(255,255,255,.08)'};font-size:9px;font-weight:800;letter-spacing:.5px;cursor:pointer;font-family:var(--mono);transition:all .12s;background:${isOpen?'rgba(34,197,94,.15)':'rgba(255,255,255,.03)'};color:${isOpen?'#4ade80':'#475569'};`;
    tb.addEventListener('click',()=>{
      const nowOpen=window._cpOpenTracks.has(tStr);
      const sec=body.querySelector(`.cp-track-section[data-track="${tStr}"]`);
      if(sec){
        const secBody=sec.querySelector('.cp-track-body');
        const secHdr=sec.querySelector('.cp-track-hdr');
        if(nowOpen){
          window._cpOpenTracks.delete(tStr);
          if(secBody) secBody.classList.add('collapsed');
          if(secHdr){const tog=secHdr.querySelector('.cp-track-toggle');if(tog)tog.textContent='▾';}
          tb.style.background='rgba(255,255,255,.03)';tb.style.color='#475569';tb.style.borderColor='rgba(255,255,255,.08)';
        } else {
          window._cpOpenTracks.add(tStr);
          if(secBody) secBody.classList.remove('collapsed');
          if(secHdr){const tog=secHdr.querySelector('.cp-track-toggle');if(tog)tog.textContent='▴';}
          tb.style.background='rgba(34,197,94,.15)';tb.style.color='#4ade80';tb.style.borderColor='rgba(34,197,94,.4)';
        }
        // Also make the section visible if filter is hiding it
        if(window._cpTrackFilter==='working'||window._cpTrackFilter==='all') sec.style.display='';
      } else {
        // section not rendered yet (picker collapsed or filtered out) — just toggle state
        if(nowOpen) window._cpOpenTracks.delete(tStr);
        else window._cpOpenTracks.add(tStr);
      }
    });
    quickBar.appendChild(tb);
  }
  hdr.appendChild(quickBar);
  hdr.appendChild(clearBtn);hdr.appendChild(collapseBtn);
  wrap.appendChild(hdr);

  const body=document.createElement('div');
  body.className='cp-body';
  wrap.appendChild(body);

  body.classList.toggle('collapsed', pickerCollapsed);

  collapseBtn.addEventListener('click',()=>{
    pickerCollapsed=!pickerCollapsed;
    window._cpPickerCollapsed=pickerCollapsed;
    body.classList.toggle('collapsed',pickerCollapsed);
    collapseBtn.textContent=pickerCollapsed?'EXPAND':'COLLAPSE';
  });

  if(!groups.length){
    const em=document.createElement('div');em.style.cssText='padding:24px;text-align:center;color:var(--text-muted);font-family:var(--mono);font-size:11px;';
    em.textContent='NO DATA — PASTE DATA IN INPUT TAB FIRST';
    body.appendChild(em);return wrap;
  }

  // Group all cars by track
  const byTrack={};
  groups.forEach(g=>{
    g.cars.forEach(car=>{
      const t=g.track||'—';
      if(!byTrack[t])byTrack[t]=[];
      byTrack[t].push({...car,_group:g});
    });
  });

  // Default view: open every working track (801-809) when the car picker first builds.
  // After that, user collapse/expand choices are preserved through renderOB() refreshes.
  if(!window._cpDefaultWorkingExpandedApplied){
    Object.keys(byTrack).forEach(t=>{
      const n=parseInt(t)||0;
      if(n>=801&&n<=809) window._cpOpenTracks.add(t);
    });
    window._cpDefaultWorkingExpandedApplied = true;
  }

  Object.keys(byTrack).sort((a,b)=>(parseInt(a)||0)-(parseInt(b)||0)).forEach(track=>{
    const cars=byTrack[track];
    const selMap=manualSel[track]||{};
    const selCount=cars.filter(c=>getCarSelectionMeta(track, c.equipId, c._group||{}).selected).length;

    const section=document.createElement('div');section.className='cp-track-section';

    // Track header
    const thdr=document.createElement('div');thdr.className='cp-track-hdr';
    const trackFt=cars.reduce((a,c)=>a+(parseFloat(c.ln)||0),0);
    const ssInTrack=cars.filter(c=>(c.bk2||'').toUpperCase().includes('SS')).length;
    thdr.innerHTML=`
      <span class="cp-track-label">TRACK ${track}</span>
      <span class="cp-track-ft">${fmtN(trackFt)} ft</span>
      <span class="cp-track-count">${cars.length} cars${ssInTrack?` · <span style="color:#fca5a5">${ssInTrack} SS</span>`:''}</span>
      ${selCount?`<span class="cp-track-sel-count">${selCount} selected</span>`:''}
      <span class="cp-track-toggle">${window._cpOpenTracks.has(track)?'▴':'▾'}</span>`;
    if(selCount) thdr.classList.add('has-sel');

    const tbody=document.createElement('div');
    const _trackOpen=window._cpOpenTracks.has(track);
    tbody.className='cp-track-body'+(_trackOpen?'':' collapsed');
    // Column headers
    const colHdr=document.createElement('div');colHdr.className='cp-col-hdr';
    colHdr.innerHTML=`
      <span class="cp-col-lbl"></span>
      <span class="cp-col-lbl">YD</span>
      <span class="cp-col-lbl">TRACK</span>
      <span class="cp-col-lbl">SEQ</span>
      <span class="cp-col-lbl">EQUIP ID</span>
      <span class="cp-col-lbl" style="text-align:right;">TONS</span>
      <span class="cp-col-lbl" style="text-align:right;">LN</span>
      <span class="cp-col-lbl">BK1</span>
      <span class="cp-col-lbl">BK2</span>
      <span class="cp-col-lbl">TIME IN HOLD</span>
      <span class="cp-col-lbl">ARRIVAL TO SS</span>
      <span class="cp-col-lbl">TRAIN</span>
      <span class="cp-col-lbl">ARRIVAL</span>
      <span class="cp-col-lbl">YD BLOCK</span>`;
    tbody.appendChild(colHdr);
    thdr.addEventListener('click',()=>{
      tbody.classList.toggle('collapsed');
      if(tbody.classList.contains('collapsed')){window._cpOpenTracks.delete(track);}
      else{window._cpOpenTracks.add(track);}
      thdr.querySelector('.cp-track-toggle').textContent=tbody.classList.contains('collapsed')?'▾':'▴';
    });

    // Car rows — click, shift+click range select, or drag across rows to select/unselect
    const rowEls=[];
    let lastClickIdx=null;
    let cpDragActive=false;
    let cpDragTarget=null;
    let cpDragStartIdx=null;
    let cpBatchSelecting=false;

    cars.forEach((car,ci)=>{
      const groupForCar=car._group || {};
      const selMeta=getCarSelectionMeta(track, car.equipId, groupForCar);
      const isChecked=!!selMeta.selected;
      const selTrain=String(selMeta.train || '').trim().toUpperCase();
      const isSaSelected=(selTrain==='IHOSA' || selTrain==='MHOAS');
      const row=document.createElement('div');
      row.dataset.cpIndex=String(ci);
      const trainNameForColor=getTrainDisplayName(car);
      const trainColorClass=getTrainColorClass(trainNameForColor);
      row.className='cp-car-row '+trainColorClass+(isChecked?' selected':'')+(isSaSelected ? (selTrain==='MHOAS'?' sa-mhoas':' sa-ihosa') : '');
      rowEls.push(row);

      const bk=car.bk1||car.bk2||car.ydBlock||'—';
      const holdInfo=car.holdDay>=1?`${car.holdDay}d ${car.holdHr}h`:'';
      const isSSCar=(car.bk2||'').toUpperCase().includes('SS');
      const _bk1=(car.bk1||'').toUpperCase();
      const _bk2=(car.bk2||'').toUpperCase();
      const _yd=(car.ydBlock||'').toUpperCase();
      const _isBO=_bk2.includes('BO')||_bk1.includes('BO')||_yd.includes('BO');
      const _isSS=isCarInSSStatus(car);
      const _tihHours=(_isBO||_isSS)?(car.holdDay||0)*24+(car.holdHr||0):0;
      const _tihDisplay=(_isBO||_isSS)
        ?`<span style="color:${_isBO?'#fca5a5':'#fcd34d'};font-weight:700;">${_tihHours.toFixed(1)}h</span>`
        :'<span style="color:#475569;">0</span>';
      const _arrToSS=getCarArrToSSValue(car, groupForCar);
      const _arrToNow=getCarArrivalToNowValue(car, groupForCar);
      const _displayArrVal=(_arrToSS!==null && _arrToSS!==undefined) ? _arrToSS : _arrToNow;
      const _arrValHtml=(_displayArrVal===null || _displayArrVal===undefined)
        ? '<span style="color:#475569;">—</span>'
        : `<span class="${getArrToSSClass(_displayArrVal)}">${_displayArrVal.toFixed(1)}h</span>`;
      const _arrToSSDisplay=!_isSS
        ? `<span class="arr-ss-wrap">${_arrValHtml}${getNoSSFlagHtml()}</span>`
        : _arrValHtml;

      const saBadge = isSaSelected ? `<span class="sa-flag ${selTrain==='MHOAS'?'mhoas':'ihosa'}" title="Assigned to ${selTrain}">${selTrain==='MHOAS'?'AS':'SA'}</span>` : '';
      row.innerHTML=`
        <input type="checkbox" class="cp-car-chk" ${isChecked?'checked':''}>
        <span class="cp-car-yd">${car.yd||'—'}</span>
        <span class="cp-car-track">${car.track||track||'—'}</span>
        <span class="cp-car-seq">${car.trackSeq||String(ci+1)}</span>
        <span class="cp-car-id">${car.equipId||'—'}${saBadge}</span>
        <span class="cp-car-tons">${car.tons!=null&&car.tons!==''?car.tons:'—'}</span>
        <span class="cp-car-ln">${car.ln||'—'}</span>
        <span class="cp-car-bk1">${car.bk1||'—'}</span>
        <span class="cp-car-bk2">${car.bk2||'—'}</span>
        <span class="cp-car-tih">${_tihDisplay}</span>
        <span class="cp-car-a2s">${_arrToSSDisplay}</span>
        <span class="cp-car-train cp-train-chip ${trainColorClass}">${trainNameForColor||'—'}</span>`;

      // Arrival: use bank if available, else show inline add-to-bank control
      const trainName = car.train||car._group?.train||'';
      const {dt:arrDt, source:arrSrc} = getArrivalInfo(trainName);
      const arrSpan = document.createElement('span');
      arrSpan.className = 'cp-car-arr';
      arrSpan.style.minWidth = '160px';

      if(arrDt){
        // Show bank/column arrival with a small source badge
        arrSpan.innerHTML = `<span style="color:${arrSrc==='bank'?'#fbbf24':'#94a3b8'}">${fmtDT(arrDt)}</span>`+
          (arrSrc==='bank'?`<span style="font-size:8px;color:#78716c;margin-left:4px;font-family:var(--mono);">BANK</span>`:'');
        // Click to edit the bank value
        arrSpan.style.cursor = 'pointer';
        arrSpan.title = 'Click to edit in bank';

          e.stopPropagation();
          showCpArrEdit(arrSpan, trainName);

        const addBtn = document.createElement('button');

        addBtn.addEventListener('click', e=>{
          e.stopPropagation();
          showCpArrEdit(arrSpan, trainName);
        });
        arrSpan.appendChild(addBtn);
      }
      row.appendChild(arrSpan);

      row.innerHTML += `<span class="cp-car-bk">${car.ydBlock||bk||'—'}</span>`;

      function toggleCar(idx,toChecked){
        const c=cars[idx]; const r=rowEls[idx];
        const carId=String(c?.equipId||'').trim();
        const group=c?._group || {};
        const assignedTrain = normalizeOutboundTrain(getGroupTargetTrain(group));
        const isSaTrain = assignedTrain==='IHOSA' || assignedTrain==='MHOAS';

        if(toChecked && !isSaTrain){
          toast('Choose IHOSA or MHOAS in OUTBOUND before selecting cars');
          const cb=r.querySelector('.cp-car-chk'); if(cb) cb.checked=false;
          return;
        }

        if(toChecked){
          if(group.key && rideSet.has(group.key) && getGroupRideTrain(group)){
            if(!carExclusions[group.key]) carExclusions[group.key]=new Set();
            carExclusions[group.key].delete(carId);
            removeManualCarSelection(track, carId);
          }else{
            setManualCarSelection(track, c, group, assignedTrain);
          }
          r.classList.add('selected');
          r.classList.remove('sa-ihosa','sa-mhoas');
          if(isSaTrain) r.classList.add(assignedTrain==='MHOAS'?'sa-mhoas':'sa-ihosa');
          const cb=r.querySelector('.cp-car-chk'); if(cb) cb.checked=true;
        }else{
          if(group.key && rideSet.has(group.key) && isSaTrain){
            if(!carExclusions[group.key]) carExclusions[group.key]=new Set();
            if(carId) carExclusions[group.key].add(carId);
          }
          removeManualCarSelection(track, carId);
          r.classList.remove('selected','sa-ihosa','sa-mhoas');
          const cb=r.querySelector('.cp-car-chk'); if(cb) cb.checked=false;
        }
        // update consist
        const manualTotal=Object.values(manualSel).reduce((a,m)=>a+Object.keys(m).length,0);
        const groupTotal=groups.reduce((a,gg)=>{
          const train=getGroupOutboundTrain(gg);
          if(!(rideSet.has(gg.key)&&train)) return a;
          const ex=carExclusions[gg.key]||new Set();
          return a+(gg.cars||[]).filter(cc=>!ex.has(String(cc.equipId||'').trim())).length;
        },0);
        const selTotal=manualTotal+groupTotal;
        const newSubText=selTotal>0?(selTotal+' car'+(selTotal===1?'':'s')+' selected'):'Pick individual cars below';
        sub.textContent=newSubText;
        sub.className=selTotal?'cp-sel-badge':'cp-subtitle';

        if(!cpBatchSelecting) renderOB();
      }


      row.querySelector('.cp-car-chk').addEventListener('click',e=>{
        e.stopPropagation();
        toggleCar(ci,e.target.checked);
      });

      row.addEventListener('click',e=>{
        if(row.dataset.dragHandled==='1'){delete row.dataset.dragHandled; return;}
        if(e.target.tagName==='INPUT')return;
        const isShift=e.shiftKey;
        const currentMeta=getCarSelectionMeta(track, String(car.equipId||'').trim(), car._group || {});
        const currentlyChecked=!!currentMeta.selected;
        if(isShift && lastClickIdx!==null){
          const [a,b]=[lastClickIdx,ci].sort((x,y)=>x-y);
          const targetState=!currentlyChecked;
          for(let i=a;i<=b;i++) toggleCar(i,targetState);
        }else{
          toggleCar(ci,!currentlyChecked);
        }
        lastClickIdx=ci;
      });

      row.addEventListener('mousedown',e=>{
        if(e.button!==0 || e.shiftKey || e.target.closest('input,button,select,textarea')) return;
        e.preventDefault();
        const currentMeta=getCarSelectionMeta(track, String(car.equipId||'').trim(), car._group || {});
        cpDragActive=true;
        cpDragTarget=!currentMeta.selected;
        cpDragStartIdx=ci;
        row.dataset.dragHandled='1';
        row.classList.add('row-selected');
        document.addEventListener('mouseup',ev=>{
          let endIdx=ci;
          const hit=document.elementFromPoint(ev.clientX,ev.clientY);
          const hitRow=hit&&hit.closest ? hit.closest('.cp-car-row') : null;
          if(hitRow && hitRow.dataset.cpIndex!=null) endIdx=parseInt(hitRow.dataset.cpIndex,10);
          if(Number.isNaN(endIdx)) endIdx=ci;
          const lo=Math.min(cpDragStartIdx,endIdx), hi=Math.max(cpDragStartIdx,endIdx);
          cpBatchSelecting=true;
          for(let i=lo;i<=hi;i++){
            if(rowEls[i]){
              rowEls[i].dataset.dragHandled='1';
              rowEls[i].classList.add('row-selected');
            }
            toggleCar(i,cpDragTarget);
          }
          cpBatchSelecting=false;
          renderOB();
          setTimeout(()=>rowEls.forEach(r=>r.classList.remove('row-selected')),350);
          lastClickIdx=endIdx;
          cpDragActive=false; cpDragTarget=null; cpDragStartIdx=null;
        },{once:true});
      });
      row.addEventListener('mouseenter',()=>{
        if(!cpDragActive) return;
        row.dataset.dragHandled='1';
        row.classList.add('row-selected');
      });

      tbody.appendChild(row);
    });

    section.appendChild(thdr);
    section.appendChild(tbody);

    // Stamp for filter targeting
    const tNum=parseInt(track)||0;
    const hasSSInSection=cars.some(c=>(c.bk2||'').toUpperCase().includes('SS'));
    section.dataset.track=track;
    section.dataset.hasSs=hasSSInSection?'1':'0';
    // Apply current filter
    let _show=true;
    if(window._cpTrackFilter==='working') _show=tNum>=801&&tNum<=809;
    else if(window._cpTrackFilter==='ss') _show=hasSSInSection;
    if(!_show) section.style.display='none';

    body.appendChild(section);
  });

  // Sync quick-expand button styles to match actual open state
  quickBar.querySelectorAll('button[data-qtrack]').forEach(tb=>{
    const tStr=tb.dataset.qtrack;
    const open=window._cpOpenTracks.has(tStr);
    tb.style.background=open?'rgba(34,197,94,.15)':'rgba(255,255,255,.03)';
    tb.style.color=open?'#4ade80':'#475569';
    tb.style.borderColor=open?'rgba(34,197,94,.4)':'rgba(255,255,255,.08)';
  });

  return wrap;
}

function getSnapshots(){try{return JSON.parse(localStorage.getItem('dwellSnapshots')||'[]');}catch{return[];}}

function saveSnapshot(){
  const depDt=getDepDt();
  const groups=buildGroups().sort((a,b)=>(parseInt(a.track)||0)-(parseInt(b.track)||0));
  const selGroups=getSelectedGroups(depDt);
  if(!selGroups.length){toast('No selected groups to snapshot');return;}
  const wt=wtAvg(selGroups,depDt);
  const sim=simpleAvg(selGroups,depDt);
  const snap={
    ts:new Date().toISOString(),
    dep:departure,
    depDt:depDt.toISOString(),
    groups:selGroups.length,
    ft:selGroups.reduce((a,g)=>a+g.totalLn,0),
    wtAvg:wt?parseFloat(wt.toFixed(2)):null,
    simAvg:sim?parseFloat(sim.toFixed(2)):null,
    rows:selGroups.map(g=>({
      train:g.train,
      track:g.track,
      ft:g.totalLn,
      dwell:calcGroupDwell(g,depDt)?parseFloat(calcGroupDwell(g,depDt).toFixed(2)):null
    }))
  };
  const snaps=getSnapshots();
  snaps.unshift(snap);
  saveSnapshots(snaps.slice(0,120)); // keep last 120
  toast('Snapshot saved — '+new Date(snap.ts).toLocaleDateString());
  renderAnalytics();
}

function exportOutbound(){

    return[g.train,g.track,g.totalLn,d?d.toFixed(2):'',ss?ss.toFixed(2):'',arr?fmtDT(arr):'',fmtDT(depDt)].join(',');

}



function summarizeDailyHistory(groups, depDt, selGroups, wt, sim){
  const all = Array.isArray(selGroups) && selGroups.length ? selGroups : [];
  const allGroups = Array.isArray(groups) ? groups : [];
  const today = new Date(); today.setHours(0,0,0,0);

  const cats = { turnedToday:0, prevInboundSS:0, prevInboundNoSS:0, boHold:0, crossHaul:0, ssNear:0, ssOver:0 };

  all.forEach(g=>{
    const {dt:arrDt}=getArrivalInfo(g.train);
    const arrDay = arrDt ? new Date(arrDt) : null;
    if(arrDay) arrDay.setHours(0,0,0,0);

    const hasSS = (g.cars||[]).some(c => (c.bk2||'').toUpperCase().includes('SS'));
    const hasBO = boSet && boSet.has(g.key);
    const isCrossHaul = !/^(ZLBHO|ZPBHO)/i.test(g.train||'');

    if(arrDay && arrDay.getTime() === today.getTime()) cats.turnedToday++;
    else if(arrDay && arrDay.getTime() < today.getTime() && hasSS) cats.prevInboundSS++;
    else if(arrDay && arrDay.getTime() < today.getTime()) cats.prevInboundNoSS++;

    if(hasBO) cats.boHold++;
    if(isCrossHaul) cats.crossHaul++;

    const ss = getSSTotalValue(g);
    if(ss >= 24) cats.ssOver++;
    else if(ss >= 19) cats.ssNear++;
  });

  const totalCars = all.reduce((a,g)=>a+(g.cars||[]).length,0);
  const totalFt = all.reduce((a,g)=>a+(g.totalLn||0),0);
  const ihosa = all.filter(g=>/IHOSA/i.test(g.train||''));
  const mhoas = all.filter(g=>/MHOAS/i.test(g.train||''));
  const ihosaFt = ihosa.reduce((a,g)=>a+(g.totalLn||0),0);
  const mhoasFt = mhoas.reduce((a,g)=>a+(g.totalLn||0),0);
  const ihosaCars = ihosa.reduce((a,g)=>a+(g.cars||[]).length,0);
  const mhoasCars = mhoas.reduce((a,g)=>a+(g.cars||[]).length,0);

  const loadedCars = all.reduce((a,g)=>a+(g.cars||[]).filter(c=>(c.ln||0)>0).length,0);
  const remainingCars = Math.max(totalCars - loadedCars, 0);

  const fmtTrain = g => `${g.train || '—'}${g.track ? ` [${g.track}]` : ''}`;
  const fmtArr = dt => dt ? new Date(dt).toLocaleString([], {month:'numeric', day:'numeric', hour:'2-digit', minute:'2-digit'}) : '—';

  const highDwells = all.map(g=>{
    const dwell = calcGroupDwell(g, depDt);
    const {dt:arrDt}=getArrivalInfo(g.train);
    const impact = dwell===null ? null : dwell * (g.totalLn || 0);
    return {g,dwell,arrDt,impact};
  }).filter(x=>x.dwell!==null && x.dwell>=24).sort((a,b)=>(b.impact||0)-(a.impact||0)).slice(0,3);

  let goalJustification = 'The weighted average is staying controlled by a balanced mix of dwell and footage.';
  if(wt !== null){
    if(wt < 21){
      goalJustification = 'The weighted average is under goal because the consist is leaning on newer turns, lighter footage, and SS-protected exposure rather than old heavy dwell.';
    } else if(wt < 24){
      goalJustification = 'The weighted average is still under the 24-hour line because heavier groups are being offset by newer turns and SS-covered cars.';
    } else {
      goalJustification = 'The weighted average is above goal, driven by older dwell and heavier footage in the leading groups.';
    }
  }

  let driverText = 'No single group is dominating the weighted average yet.';
  if(highDwells.length){
    driverText = highDwells.map((x,i)=>{
      return `${i+1}) ${fmtTrain(x.g)} — ${fmtDwell(x.dwell)} dwell, ${fmtN(x.g.totalLn||0)} ft, contribution ${((x.impact||0)).toFixed(1)} dwell-footage units.`;
    }).join(' ');
  } else {
    const topDrivers = all.map(g=>{
      const dwell = calcGroupDwell(g, depDt);
      const impact = dwell===null ? null : dwell * (g.totalLn||0);
      return {g,dwell,impact};
    }).filter(x=>x.impact!==null).sort((a,b)=>(b.impact||0)-(a.impact||0)).slice(0,3);

    driverText = topDrivers.length
      ? topDrivers.map((x,i)=>`${i+1}) ${fmtTrain(x.g)} — ${fmtDwell(x.dwell)} dwell, ${fmtN(x.g.totalLn||0)} ft, contribution ${(x.impact||0).toFixed(1)} dwell-footage units.`).join(' ')
      : driverText;
  }

  const historySentence = [
    cats.turnedToday ? `${cats.turnedToday} group${cats.turnedToday!==1?'s':''} turned from today’s inbound` : 'no groups turned from today’s inbound',
    cats.prevInboundSS ? `${cats.prevInboundSS} prior-inbound SS group${cats.prevInboundSS!==1?'s':''}` : 'no prior-inbound SS groups',
    cats.prevInboundNoSS ? `${cats.prevInboundNoSS} prior-inbound group${cats.prevInboundNoSS!==1?'s':''} without SS` : 'no prior-inbound groups without SS',
    cats.boHold ? `${cats.boHold} BO-flagged group${cats.boHold!==1?'s':''}` : 'no BO-flagged groups',
    cats.crossHaul ? `${cats.crossHaul} cross-haul group${cats.crossHaul!==1?'s':''}` : 'no cross-haul groups'
  ].join('; ');

  const highDwellCards = highDwells.length ? highDwells.map(x=>{
    const nearby = allGroups
      .filter(o => o.key !== x.g.key)
      .map(o => {
        const {dt:adt} = getArrivalInfo(o.train);
        return {o, adt};
      })
      .filter(o => o.adt && x.arrDt && Math.abs(o.adt - x.arrDt) <= 12*3600000)
      .sort((a,b)=>Math.abs(a.adt - x.arrDt) - Math.abs(b.adt - x.arrDt));

    const nearbyHtml = nearby.length ? `
      <div class="an-hist-separator"><span>ARRIVED WITHIN 12 HOURS</span></div>
      <div class="an-hist-trains">
        ${nearby.slice(0,6).map(n=>`<span class="an-hist-train-pill" title="${fmtArr(n.adt)} · ${fmtN(n.o.totalLn||0)}">${n.o.train}${n.o.track ? ` [${n.o.track}]` : ''} · ${fmtN(n.o.totalLn||0)} ft</span>`).join('')}
      </div>
    ` : `<div class="an-hist-none">No other trains fell inside the ±12 hour window.</div>`;

    const sameDay = allGroups.filter(o => o.key !== x.g.key).map(o=>({o,adt:getArrivalInfo(o.train).dt})).filter(o=>o.adt && x.arrDt && o.adt.toDateString()===x.arrDt.toDateString());
    const sameDayNote = sameDay.length
      ? `Same-day traffic around this train: ${sameDay.slice(0,4).map(n=>`${n.o.train}${n.o.track ? ` [${n.o.track}]` : ''}`).join(', ')}.`
      : 'No same-day traffic beyond the train itself.';

    const priorityNote = nearby.length
      ? 'Priority pressure is likely from overlapping inbound windows: older arrivals and heavier-footage trains in the same ±12 hour band would have competed for the same working window, so this train may have been pushed behind them unless it had a stronger block or departure urgency.'
      : 'With no other trains inside the ±12 hour band, the dwell is more likely driven by this train’s own blockage, SS exposure, or BO/CU handling rather than calendar overlap.';

    return `
      <div class="an-hist-card has-data ${x.dwell>=30?'risk':x.dwell>=24?'warn':'blue'}">
        <div class="an-hist-hdr">
          <div class="an-hist-title">${fmtTrain(x.g)}</div>
          <div class="an-hist-badge">${fmtDwell(x.dwell)} dwell</div>
          <div class="an-hist-toggle">HIGH DWELL</div>
        </div>
        <div class="an-hist-body open">
          <div class="an-hist-meta">
            <span><strong>Arrived:</strong> ${fmtArr(x.arrDt)}</span>
            <span><strong>Footage:</strong> ${fmtN(x.g.totalLn||0)}</span>
            <span><strong>Impact:</strong> ${((x.impact||0)).toFixed(1)}</span>
          </div>
          <div class="an-hist-preview">${sameDayNote} ${priorityNote}</div>
          ${nearbyHtml}
        </div>
      </div>
    `;
  }).join('') : '<div class="an-empty">No dwell above the high-dwell threshold yet.</div>';

  return `
    <div class="an-section">
      <div class="an-section-title">Daily Summary</div>
      <div class="an-daily-summary">
        <div class="an-daily-summary-head">
          <div>
            <div class="an-daily-summary-title">Operational Overview</div>
            <div class="an-daily-summary-sub">What moved, what remained, where the dwell accumulated, and why the highest dwell groups likely overlapped with nearby arrivals.</div>
          </div>
        </div>
        <div class="an-daily-summary-body">
          <div class="an-daily-summary-par"><strong>Loaded vs. remaining:</strong> ${loadedCars} cars loaded, ${remainingCars} cars still remaining across ${totalCars} total cars and ${fmtN(totalFt)} total footage.</div>
          <div class="an-daily-summary-par"><strong>WT picture:</strong> Weighted average sits at ${wt!==null?wt.toFixed(1)+' hr':'—'} and simple average sits at ${sim!==null?sim.toFixed(1)+' hr':'—'}.</div>
          <div class="an-daily-summary-par"><strong>Departure family split:</strong> IHOSA contributes ${ihosaCars} cars / ${fmtN(ihosaFt)} ft, while MHOAS contributes ${mhoasCars} cars / ${fmtN(mhoasFt)} ft.</div>
          <div class="an-daily-summary-par"><strong>Why the goal moved the way it did:</strong> ${goalJustification}</div>
          <div class="an-daily-summary-par"><strong>Main dwell drivers:</strong> ${driverText}</div>
          <div class="an-daily-summary-par"><strong>Traffic overlap narrative:</strong> ${historySentence}</div>
        </div>
      </div>

      <div class="an-section-title">High Dwell Deep Dive</div>
      <div class="an-hist-grid">
        ${highDwellCards}
      </div>
    </div>`;
}


function buildTrendPeriods(snaps,currentWt){
  var sec=document.createElement('div');sec.className='an-section';
  sec.innerHTML='<div class="an-section-title">Dwell Trend Analysis</div>';
  var now=new Date();
  function snapAge(s){return (now-new Date(s.ts))/(1000*3600*24);}
  var periods=[
    {label:'3-DAY',days:3},
    {label:'7-DAY',days:7},
    {label:'30-DAY',days:30},
    {label:'ALL TIME',days:9999}
  ];
  var row=document.createElement('div');row.className='an-trend-row';
  periods.forEach(function(p){
    var pSnaps=snaps.filter(function(s){return snapAge(s)<=p.days&&s.wtAvg!==null;});
    var avg=pSnaps.length?pSnaps.reduce(function(a,s){return a+s.wtAvg;},0)/pSnaps.length:null;
    var minV=pSnaps.length?Math.min.apply(null,pSnaps.map(function(s){return s.wtAvg;})):null;
    var maxV=pSnaps.length?Math.max.apply(null,pSnaps.map(function(s){return s.wtAvg;})):null;
    var deltaVal=null,deltaCls='flat';
    if(avg!==null&&currentWt!==null){deltaVal=currentWt-avg;deltaCls=deltaVal<-0.5?'up':deltaVal>0.5?'down':'flat';}
    var avgCls=avg===null?'na':avg<=21?'good':avg<=24?'warn':'risk';
    var card=document.createElement('div');card.className='an-trend-card '+deltaCls;
    var inner='<div class="an-trend-period">'+p.label+'</div>'+
      '<div class="an-trend-val '+avgCls+'">'+(avg!==null?avg.toFixed(1)+' hr':'No data')+'</div>'+
      '<div class="an-trend-sub">'+(pSnaps.length?pSnaps.length+' snapshot'+(pSnaps.length!==1?'s':''):'Save snapshots to build history')+'</div>';
    if(deltaVal!==null){
      inner+='<span class="an-trend-delta '+deltaCls+'">'+(deltaCls==='up'?'&#8595; Better':deltaCls==='down'?'&#8593; Worse':'&#8594; Similar')+' '+Math.abs(deltaVal).toFixed(1)+'hr</span>';
    }
    card.innerHTML=inner;
    if(pSnaps.length>=2){
      var recent=pSnaps.slice(-10);
      var chartMax=Math.max.apply(null,recent.map(function(s){return s.wtAvg||0;}));
      var mini=document.createElement('div');mini.className='an-trend-mini-chart';
      recent.forEach(function(s){
        var pct=chartMax>0?Math.max(8,Math.round((s.wtAvg/chartMax)*100)):8;
        var bcls=s.wtAvg<=21?'good':s.wtAvg<=24?'warn':'risk';
        var b=document.createElement('div');b.className='an-trend-bar '+bcls;b.style.height=pct+'%';
        mini.appendChild(b);
      });
      card.appendChild(mini);
      if(minV!==null){var note=document.createElement('div');note.className='an-trend-snaps';note.textContent='Low '+minV.toFixed(1)+' hr  ·  High '+maxV.toFixed(1)+' hr';card.appendChild(note);}
    }
    row.appendChild(card);
  });
  sec.appendChild(row);
  return sec;
}

function buildPreviewText(cat,matches,trains,ft,depDt){
  var n=matches.length;
  var trainList=trains.slice(0,3).join(", ")+(trains.length>3?" +more":"");
  if(cat.id==="turned")
    return n+" car"+(n!==1?"s":"")+" from today's inbound"+(trains.length?" ("+trainList+")":"")+" are being turned directly. Dwell clock is actively running with no SS protection.";
  if(cat.id==="prev_ss")
    return n+" car"+(n!==1?"s":"")+" from prior inbound"+(trains.length>1?"s":"")+" ("+trainList+") are in SS hold. Cars with 24+ hrs are dwell-protected; others are still aging.";
  if(cat.id==="prev_no_ss")
    return n+" car"+(n!==1?"s":"")+" from previous inbound ("+trainList+") carry no active hold. Full dwell from arrival is counting against the KPI.";
  if(cat.id==="ss_high"){
    var dwells=matches.map(function(e){return e.dwell;}).filter(function(d){return d!==null;});
    var avgD=dwells.length?dwells.reduce(function(a,b){return a+b;},0)/dwells.length:0;
    return n+" SS car"+(n!==1?"s":"")+" already exceed 21 hrs dwell (avg "+avgD.toFixed(1)+" hr). Highest KPI exposure on the consist.";
  }
  if(cat.id==="crosshaul")
    return n+" car"+(n!==1?"s":"")+" from non-standard inbound ("+trainList+"). May be prescheduled cross-haul — confirm billing and block assignment.";
  if(cat.id==="bo")
    return n+" car"+(n!==1?"s":"")+" flagged under BO. Verify status and confirm clearance before departure.";
  return cat.desc;
}
function buildCarHistorySummary(selGroups,depDt){
  const sec=document.createElement('div');sec.className='an-section';
  sec.innerHTML='<div class="an-section-title">Car History Summary</div>';
  const grid=document.createElement('div');grid.className='an-hist-grid';

  const today=new Date();today.setHours(0,0,0,0);
  const tomorrow=new Date(today);tomorrow.setDate(today.getDate()+1);

  // Flatten all cars from selected groups with their group context
  const allCars=[];
  selGroups.forEach(g=>{
    const {dt:arrDt}=getArrivalInfo(g.train);
    const dwell=calcGroupDwell(g,depDt);
    g.cars.forEach(car=>{
      const isSSCar=(car.bk2||'').toUpperCase().includes('SS');
      const isBO=(car.bk2||'').toUpperCase().includes('BO');
      const arrDay=arrDt?new Date(arrDt):null;
      if(arrDay)arrDay.setHours(0,0,0,0);
      const arrivedToday=arrDay&&arrDay.getTime()===today.getTime();
      const isPrevInbound=arrDay&&arrDay.getTime()<today.getTime();
      const isMainInbound=/^(ZLBHO|ZPBHO)/i.test(g.train);
      const isCrossHaul=!isMainInbound;
      allCars.push({
        car,g,arrDt,dwell,isSSCar,isBO,
        arrivedToday,isPrevInbound,isMainInbound,isCrossHaul
      });
    });
  });

  const categories=[
    {
      id:'turned',
      label:'TURNED INBOUND THAT ARRIVED TODAY',
      color:'',
      desc:'Cars whose inbound train arrived today and are being turned for the outbound.',
      filter:e=>e.arrivedToday
    },
    {
      id:'prev_ss',
      label:'USED CARS FROM PREVIOUS INBOUND IN SS',
      color:'warn',
      desc:'Cars from a prior inbound currently in an SS hold.',
      filter:e=>e.isPrevInbound&&e.isSSCar
    },
    {
      id:'prev_no_ss',
      label:'USED CARS FROM PREVIOUS INBOUND NO SS',
      color:'blue',
      desc:'Cars from a prior inbound with no active SS hold.',
      filter:e=>e.isPrevInbound&&!e.isSSCar&&!e.isBO
    },
    {
      id:'ss_high',
      label:'USED SS CARS FROM PREVIOUS TRAIN — HIGH DWELL',
      color:'risk',
      desc:'SS cars from a prior inbound with dwell already exceeding 21 hrs.',
      filter:e=>e.isPrevInbound&&e.isSSCar&&e.dwell!==null&&e.dwell>21
    },
    {
      id:'crosshaul',
      label:'PRESCHEDULED CARS FROM CROSS HAUL',
      color:'purple',
      desc:'Cars arriving from non-standard inbounds (not ZLBHO/ZPBHO).',
      filter:e=>e.isCrossHaul
    },
    {
      id:'bo',
      label:'BAD ORDER REQUIRING SERVICING',
      color:'red',
      desc:'Cars flagged as BO or manually marked BO.',
      filter:e=>e.isBO||(car=>boSet.has(e.g.key))(e)
    }
  ];

  // Split into applies vs not
  const withMatches=[], withoutMatches=[];
  categories.forEach(cat=>{
    const matches=allCars.filter(cat.filter);
    (matches.length?withMatches:withoutMatches).push({cat,matches});
  });

  function buildCard(cat,matches){
    const ft=matches.reduce((a,e)=>a+(parseFloat(e.car.ln)||0),0);
    const trains=[...new Set(matches.map(e=>e.g.train))];

    const card=document.createElement('div');
    card.className='an-hist-card'+(matches.length?' has-data '+cat.color:'');

    // Header
    const hdr=document.createElement('div');hdr.className='an-hist-hdr';
    hdr.innerHTML=
      '<span class="an-hist-title">'+cat.label+'</span>'+
      '<span class="an-hist-badge">'+(matches.length||'0')+' cars'+(ft?' · '+fmtN(ft)+' ft':'')+'</span>'+
      '<span class="an-hist-toggle">'+(matches.length?'▾':'')+'</span>';
    card.appendChild(hdr);

    // Preview text (always visible)
    if(matches.length){
      const preview=document.createElement('div');preview.className='an-hist-preview';
      preview.textContent=buildPreviewText(cat,matches,trains,ft,depDt);
      card.appendChild(preview);
    }

    // Expandable body
    const body=document.createElement('div');body.className='an-hist-body';
    if(matches.length){
      const meta=document.createElement('div');meta.className='an-hist-meta';
      meta.innerHTML=
        '<span><strong>'+matches.length+'</strong> cars</span>'+
        '<span><strong>'+fmtN(ft)+'</strong> ft</span>'+
        '<span><strong>'+trains.length+'</strong> inbound'+(trains.length!==1?'s':'')+'</span>';
      body.appendChild(meta);

      if(trains.length){
        const trainWrap=document.createElement('div');trainWrap.className='an-hist-trains';
        trains.forEach(t=>{
          const pill=document.createElement('span');pill.className='an-hist-train-pill';pill.textContent=t;
          trainWrap.appendChild(pill);
        });
        body.appendChild(trainWrap);
      }

      const carsWrap=document.createElement('div');carsWrap.className='an-hist-cars';
      matches.forEach(e=>{
        const chip=document.createElement('span');chip.className='an-hist-car-id';
        chip.textContent=e.car.equipId||'—';
        carsWrap.appendChild(chip);
      });
      body.appendChild(carsWrap);

      hdr.style.cursor='pointer';
      hdr.addEventListener('click',()=>{
        body.classList.toggle('open');
        hdr.querySelector('.an-hist-toggle').textContent=body.classList.contains('open')?'▴':'▾';
      });
    } else {
      body.innerHTML='<div class="an-hist-none">Does not apply to this consist.</div>';
    }
    card.appendChild(body);
    return card;
  }

  // Render applies first
  withMatches.forEach(({cat,matches})=>grid.appendChild(buildCard(cat,matches)));

  // Separator
  if(withMatches.length&&withoutMatches.length){
    const sep=document.createElement('div');sep.className='an-hist-separator';
    sep.innerHTML='<span>Does not apply</span>';
    grid.appendChild(sep);
  }

  // Render non-applicable
  withoutMatches.forEach(({cat,matches})=>grid.appendChild(buildCard(cat,matches)));

  sec.appendChild(grid);
  return sec;
}

function toLocalDateTimeInput(dt){
  if(!dt) return '';
  const d=new Date(dt);
  const offset=d.getTimezoneOffset();
  const local=new Date(d.getTime()-offset*60000);
  return local.toISOString().slice(0,16);
}

function renderAnalytics(){
  const view=document.getElementById('analytics-view');
  if(!view)return;
  view.innerHTML='';

  const topActions=document.createElement('div');
  topActions.className='an-section';

  const wt=wtAvg(selGroups,depDt);
  const sim=simpleAvg(selGroups,depDt);
  const totalFt=selGroups.reduce((a,g)=>a+g.totalLn,0);
  const wtCls=wt===null?'':wt<=21?'good':wt<=24?'warn':'risk';
  const simCls=sim===null?'':sim<=21?'good':sim<=24?'warn':'risk';

    '<div class="an-kpi"><div class="an-kpi-label">WT AVG DWELL</div><div class="an-kpi-val '+wtCls+'">'+(wt!==null?wt.toFixed(1)+' hr':'—')+'</div><div class="an-kpi-sub">Weighted by footage</div></div>'+
    '<div class="an-kpi"><div class="an-kpi-label">SIMPLE AVG</div><div class="an-kpi-val '+simCls+'">'+(sim!==null?sim.toFixed(1)+' hr':'—')+'</div><div class="an-kpi-sub">Unweighted</div></div>'+
    '<div class="an-kpi"><div class="an-kpi-label">FOOTAGE</div><div class="an-kpi-val">'+fmtN(totalFt)+'</div><div class="an-kpi-sub">Selected groups</div></div>'+
    '<div class="an-kpi"><div class="an-kpi-label">GROUPS</div><div class="an-kpi-val">'+selGroups.length+'</div></div>'+
    '<div class="an-kpi"><div class="an-kpi-label">DEPARTURE</div><div class="an-kpi-val">'+departure+'</div><div class="an-kpi-sub">'+fmtDT(depDt)+'</div></div>';
  kpiDiv.appendChild(kpiRow);

  // ── PROJECTED DWELL BY OUTBOUND (4 cards: Today + Tomorrow × IHOSA + MHOAS) ──
  try{ view.appendChild(buildInboundOutboundProjectionCards()); }catch(e){ console.error('Inbound/outbound cards failed', e); }

  // ── DAILY NOTES ──
  view.appendChild(buildDailyNotesSection());

  // ── TREND ──
  view.appendChild(buildTrendPeriods(snaps,wt));

  // ── EXPORT & SAVE ──
  const exportDiv=document.createElement('div');exportDiv.className='an-section';
  exportDiv.innerHTML='<div class="an-section-title">Export &amp; Save</div>';
  const btnRow=document.createElement('div');btnRow.className='an-export-row';
  const bExport=document.createElement('button');bExport.className='an-btn primary';bExport.textContent='Export Outbound CSV';
  bExport.addEventListener('click',exportOutbound);
  const bSnap=document.createElement('button');bSnap.className='an-btn save';bSnap.textContent='Save Snapshot';
  bSnap.addEventListener('click',saveSnapshot);
  const bClear=document.createElement('button');bClear.className='an-btn';bClear.textContent='Clear History';
  bClear.addEventListener('click',()=>{miniConfirm('Clear all saved snapshots?','Clear',()=>{saveSnapshots([]);renderAnalytics();toast('History cleared');});});
  btnRow.appendChild(bExport);btnRow.appendChild(bSnap);btnRow.appendChild(bClear);
  exportDiv.appendChild(btnRow);
  view.appendChild(exportDiv);

  // ── CAR HISTORY SUMMARY ──
  view.appendChild(buildCarHistorySummary(selGroups,depDt));

  // ── SNAPSHOT HISTORY ──
  const histDiv=document.createElement('div');histDiv.className='an-section';
  histDiv.innerHTML='<div class="an-section-title">Snapshot History ('+snaps.length+')</div>';
  if(!snaps.length){
    histDiv.innerHTML+='<div class="an-empty">No snapshots yet — click Save Snapshot to begin.</div>';
  } else {
    const tbl=document.createElement('table');tbl.className='an-snap-tbl';
    tbl.innerHTML='<thead><tr><th>DATE / TIME</th><th>TRAIN</th><th>GROUPS</th><th>FOOTAGE</th><th>WT AVG</th><th>SIMPLE AVG</th><th></th></tr></thead>';
    const tbody=document.createElement('tbody');
    snaps.forEach((s,i)=>{
      const d=new Date(s.ts);
      const wc=s.wtAvg===null?'':s.wtAvg<=21?'good':s.wtAvg<=24?'warn':'risk';
      const sc2=s.simAvg!==null?(s.simAvg<=21?'good':s.simAvg<=24?'warn':'risk'):'';
      const tr=document.createElement('tr');
      tr.innerHTML=
        '<td>'+d.toLocaleDateString()+' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'})+'</td>'+
        '<td>'+(s.dep||'—')+'</td><td>'+s.groups+'</td><td>'+fmtN(s.ft)+'</td>'+
        '<td class="'+wc+'">'+(s.wtAvg!==null?s.wtAvg+' hr':'—')+'</td>'+
        '<td class="'+sc2+'">'+(s.simAvg!==null?s.simAvg+' hr':'—')+'</td>'+

        const ss=getSnapshots();ss.splice(i,1);saveSnapshots(ss);renderAnalytics();
      });
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);histDiv.appendChild(tbl);
  }
  view.appendChild(histDiv);

  // ── TREND CHART ──
  if(snaps.length>=2){
    const last30=snaps.slice(0,30).reverse();
    const maxD=Math.max(...last30.map(s=>s.wtAvg||0),24);
    const chartDiv=document.createElement('div');chartDiv.className='an-section';
    chartDiv.innerHTML='<div class="an-section-title">WT Avg Trend (last '+last30.length+' snapshots)</div><div class="an-chart" id="an-chart-inner"></div>';
    view.appendChild(chartDiv);
    setTimeout(()=>{
      const inner=document.getElementById('an-chart-inner');
      if(!inner)return;
      last30.forEach(s=>{
        const pct=Math.max(2,Math.round(((s.wtAvg||0)/maxD)*100));
        const cls2=s.wtAvg<=21?'good':s.wtAvg<=24?'warn':'risk';
        const d=new Date(s.ts);
        const row2=document.createElement('div');row2.className='an-bar-row';
        row2.innerHTML=
          '<div class="an-bar-label">'+d.toLocaleDateString()+' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'})+'</div>'+
          '<div class="an-bar-track"><div class="an-bar-fill '+cls2+'" style="width:'+pct+'%"></div></div>'+
          '<div class="an-bar-val">'+(s.wtAvg!==null?s.wtAvg+' hr':'—')+'</div>';
        inner.appendChild(row2);
      });
    },50);
  }
  // ── RECONCILIATION (EMBEDDED) ──
  const reconSection=document.createElement('div');
  reconSection.className='an-section';
  reconSection.id='analytics-recon-section';
  reconSection.innerHTML='<div class="an-section-title">Reconciliation</div>';
  const reconHost=document.createElement('div');
  reconHost.id='analytics-recon-host';
  reconSection.appendChild(reconHost);
  view.appendChild(reconSection);
  renderRecon('analytics-recon-host');

}

function renderRecon(targetId='recon-view'){
  const view=document.getElementById(targetId);
  if(!view)return;
  try{
  view.innerHTML='';
  const records=getReconRecords();

  // ── ENTRY FORM ──
  const form=document.createElement('div');form.className='rc-form';
  form.innerHTML='<div class="rc-form-title">Post Reconciliation Entry</div>';
  const fields=document.createElement('div');fields.className='rc-fields';
  const fieldDefs=[
    {id:'rc-date',label:'Date',type:'date',span:false},
    {id:'rc-shift',label:'Shift',type:'select',options:['Day','Night'],span:false},
    {id:'rc-day-hc',label:'Day Headcount',type:'number',ph:'e.g. 8'},
    {id:'rc-night-hc',label:'Night Headcount',type:'number',ph:'e.g. 6'},
    {id:'rc-train',label:'Daily WT Average',type:'text',ph:'e.g. IHOSA'},
    {id:'rc-forecast-wt',label:'Forecasted WT Avg (hr)',type:'number',ph:'e.g. 19.6'},
    {id:'rc-actual-wt',label:'Actual WT Avg (hr)',type:'number',ph:'e.g. 21.2'},
    {id:'rc-forecast-dep',label:'Forecasted Departure',type:'datetime-local',span:false},
    {id:'rc-actual-dep',label:'Actual Departure',type:'datetime-local',span:false},
  ];
  fieldDefs.forEach(function(f){
    var wrap=document.createElement('div');wrap.className='rc-field'+(f.span===false?'':' ');
    if(f.type==='select'){
      wrap.innerHTML='<label>'+f.label+'</label><select id="'+f.id+'">'+f.options.map(function(o){return '<option value="'+o+'">'+o+'</option>';}).join('')+'</select>';
    } else {
      wrap.innerHTML='<label>'+f.label+'</label><input id="'+f.id+'" type="'+f.type+'"'+(f.ph?' placeholder="'+f.ph+'"':'')+'>';
    }
    fields.appendChild(wrap);
  });
  // Notes field
  var noteWrap=document.createElement('div');noteWrap.className='rc-field wide';
  noteWrap.innerHTML='<label>Notes</label><textarea id="rc-notes" placeholder="e.g. Delayed by SS holds on track 807, 2 cars bad ordered late..."></textarea>';
  fields.appendChild(noteWrap);
  form.appendChild(fields);

  const saveBtn=document.createElement('button');
  saveBtn.className='rc-submit';
  saveBtn.textContent='Save Entry';
  saveBtn.addEventListener('click',()=>{
    const date=document.getElementById('rc-date').value;
    const shift=document.getElementById('rc-shift').value;
    const dayHC=parseFloat(document.getElementById('rc-day-hc').value);
    const nightHC=parseFloat(document.getElementById('rc-night-hc').value);
    const train=document.getElementById('rc-train').value.trim();
    const fwt=parseFloat(document.getElementById('rc-forecast-wt').value);
    const awt=parseFloat(document.getElementById('rc-actual-wt').value);
    const fdep=document.getElementById('rc-forecast-dep').value;
    const adep=document.getElementById('rc-actual-dep').value;
    const notes=document.getElementById('rc-notes').value.trim();
    if(!date||!train){toast('Date and train are required');return;}
    var rec={id:Date.now(),date,shift,dayHC:isNaN(dayHC)?null:dayHC,nightHC:isNaN(nightHC)?null:nightHC,train,forecastWt:isNaN(fwt)?null:fwt,actualWt:isNaN(awt)?null:awt,
      forecastDep:fdep||null,actualDep:adep||null,notes};
    var recs=getReconRecords();recs.unshift(rec);saveReconRecords(recs);
    renderRecon(targetId);toast('Reconciliation entry saved');
  });
  form.appendChild(saveBtn);
  view.appendChild(form);

  // Today defaults
  var now=new Date();
  var pad=n=>String(n).padStart(2,'0');
  document.getElementById('rc-date').value=now.toISOString().slice(0,10);
  document.getElementById('rc-shift').value='Day';
  document.getElementById('rc-day-hc').value='';
  document.getElementById('rc-night-hc').value='';
  document.getElementById('rc-train').value=departure;

  // ── RECORDS TABLE ──
  var tblSec=document.createElement('div');tblSec.className='an-section';
  tblSec.innerHTML='<div class="an-section-title">Reconciliation Log ('+records.length+')</div>';
  if(!records.length){
    tblSec.innerHTML+='<div class="an-empty">No entries yet — add your first reconciliation above.</div>';
  } else {
    var tbl=document.createElement('table');tbl.className='rc-tbl';
    tbl.innerHTML='<thead><tr><th>DATE</th><th>SHIFT</th><th>DAY HC</th><th>NIGHT HC</th><th>TRAIN</th><th>FCST WT</th><th>ACTUAL WT</th><th style="background:linear-gradient(180deg,#991b1b 0%, #450a0a 100%);color:#fee2e2;border-color:#7f1d1d;text-align:center !important;" style="background:linear-gradient(180deg,#991b1b 0%, #450a0a 100%);color:#fee2e2;border-color:#7f1d1d;text-align:center !important;">DELTA</th><th>FCST DEP</th><th>ACTUAL DEP</th><th>NOTES</th><th></th></tr></thead>';
    var tbody=document.createElement('tbody');
    records.forEach(function(r,i){
      var delta=r.actualWt!==null&&r.forecastWt!==null?r.actualWt-r.forecastWt:null;
      var deltaCls=delta===null?'':delta<-0.5?'rc-delta-good':delta>0.5?'rc-delta-bad':'rc-delta-flat';
      var deltaStr=delta===null?'—':(delta>0?'+':'')+delta.toFixed(1)+' hr';
      var tr=document.createElement('tr');
      tr.innerHTML='<td>'+r.date+'</td>'+        '<td>'+(r.shift||'—')+'</td>'+        '<td>'+(r.dayHC!==null&&r.dayHC!==undefined?r.dayHC:'—')+'</td>'+        '<td>'+(r.nightHC!==null&&r.nightHC!==undefined?r.nightHC:'—')+'</td>'+        '<td>'+r.train+'</td>'+        '<td>'+(r.forecastWt!==null?r.forecastWt+' hr':'—')+'</td>'+        '<td>'+(r.actualWt!==null?r.actualWt+' hr':'—')+'</td>'+        '<td class="'+deltaCls+'">'+deltaStr+'</td>'+        '<td>'+(r.forecastDep?fmtDT(new Date(r.forecastDep)):'—')+'</td>'+        '<td>'+(r.actualDep?fmtDT(new Date(r.actualDep)):'—')+'</td>'+        '<td class="rc-notes-cell" title="'+(r.notes||'')+'">'+(r.notes||'—')+'</td>'+        '<td><button class="rc-del-btn">✕</button></td>';
      tr.querySelector('.rc-del-btn').addEventListener('click',function(){
        var recs=getReconRecords();recs.splice(i,1);saveReconRecords(recs);renderRecon(targetId);
      });
      tbody.appendChild(tr);
    });
    tbl.appendChild(tbody);tblSec.appendChild(tbl);

    // Summary stats
    var validPairs=records.filter(function(r){return r.actualWt!==null&&r.forecastWt!==null;});
    if(validPairs.length){
      var avgFcst=validPairs.reduce(function(a,r){return a+r.forecastWt;},0)/validPairs.length;
      var avgActual=validPairs.reduce(function(a,r){return a+r.actualWt;},0)/validPairs.length;
      var avgDelta=avgActual-avgFcst;
      var summaryDiv=document.createElement('div');summaryDiv.className='an-kpi-row';summaryDiv.style.marginTop='16px';
      summaryDiv.innerHTML=
        '<div class="an-kpi"><div class="an-kpi-label">Avg Forecast WT</div><div class="an-kpi-val">'+(avgFcst.toFixed(1))+' hr</div></div>'+        '<div class="an-kpi"><div class="an-kpi-label">Avg Actual WT</div><div class="an-kpi-val '+(avgActual<=21?'good':avgActual<=24?'warn':'risk')+'">'+avgActual.toFixed(1)+' hr</div></div>'+        '<div class="an-kpi"><div class="an-kpi-label">Avg Delta</div><div class="an-kpi-val '+(avgDelta<-0.5?'good':avgDelta>0.5?'warn':'')+'">'+( avgDelta>0?'+':'')+avgDelta.toFixed(1)+' hr</div></div>'+        '<div class="an-kpi"><div class="an-kpi-label">Entries</div><div class="an-kpi-val">'+validPairs.length+'</div></div>';
      tblSec.appendChild(summaryDiv);
    }
  }
  view.appendChild(tblSec);
  renderSSBanner();
  renderSSBanner();
  }catch(err){
    console.error('renderRecon failed', err);
    view.innerHTML='<div class="an-empty">Reconciliation failed to load. Check the console for details.</div>';
  }
}

<script>
/* Runtime sequence column injection for expanded car dropdowns */
(function(){
  function applySeqColumns(){
    document.querySelectorAll('.exp-row').forEach(function(row){
      if(row.dataset.seqApplied==='1') return;

      const cells=row.querySelectorAll('td');
      if(cells.length >= 2){
        const seq=document.createElement('td');
        seq.className='seq-cell-runtime';
        const prev=row.previousElementSibling;
        let seqNum=1;

        // Count previous exp rows in same block
        let walk=row.previousElementSibling;
        while(walk){
          if(walk.classList && walk.classList.contains('exp-row')) seqNum++;
          else if(!(walk.classList && (walk.classList.contains('exp-hdr') || walk.classList.contains('exp-total-row')))) break;
          walk=walk.previousElementSibling;
        }

        seq.textContent=seqNum;
        row.prepend(seq);
        row.dataset.seqApplied='1';
      }
    });

    document.querySelectorAll('.exp-hdr').forEach(function(hdr){
      if(hdr.dataset.seqApplied==='1') return;
      hdr.dataset.seqApplied='1';
    });
  }

  const observer=new MutationObserver(applySeqColumns);
  observer.observe(document.body,{childList:true,subtree:true});

  setInterval(applySeqColumns,800);
  window.addEventListener('load',applySeqColumns);
})();
</script>
